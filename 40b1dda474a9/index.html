 достижение стратегических целей командой\n- Участвовать в найме, адаптировать новых сотрудников, повышать качество работы сотрудников, работать с их мотивацией и развитием\n- Выстраивать процесс поставки ценностей, контролировать сроки и прозрачность работы для стейкхолдеров\n- Развивать data-driven-подход в продуктовой команде\n\nТребования:\n- Знаете SQL на продвинутом уровне\n- Отлично разбираетесь в математической статистике и теории вероятностей, работали с А/B-тестами, знаете разные статистические методы и критерии\n- Реализовывали изменения в бизнесе и управляли ими в условиях высокой доли неопределенности — адаптировались и создавали win-win-решения\n- Используете в работе инструменты управления: делегирование, целеполагание, мотивация, встречи one-to-one\n- Умеете выбирать продуктовые и бизнес-метрики, декомпозировать их и строить дерево метрик", "date": "2026-07-02", "org": "tbank", "match_percent": 40, "match_fit": "Хорошо совпадает управленческая часть: делегирование, целеполагание, 1-2-1, мотивация и найм, реализация изменений в бизнесе в условиях высокой неопределённости, построение дерева метрик, работа со стейкхолдерами и data-driven подход.", "match_gaps": "Ядро всё же — лид аналитической команды с продвинутым hands-on SQL и глубокой математической статистикой как основным требованием. Кандидат — продуктовый руководитель, а не лид аналитики; такой аналитической глубины как основной роли нет."}, {"title": "Лид продуктовой аналитики в экосистемный онбординг", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lead-product-analytics-in-ecosystem-onboarding/c927f517-3b81-484d-b277-34e98a7dbde0/", "description": "Описание:\nКоманда экосистемного онбординга отвечает за активацию новых клиентов-физлиц в разных продуктах Т-Банка: от дебетовых и кредитных карт до накопительного счета, кредита наличными и других.…\n\nОбязанности:\n- Управлять командой продуктовой аналитики: участвовать в найме, развивать и мотивировать сотрудников\n- Активно участвовать в формировании долгосрочных планов направления, выстраивать аналитическую стратегию, которая будет поддерживать продуктовые процессы\n- Погружаться в текущие продуктовые процессы, челленджить идеи, искать новые точки роста\n- Внедрять best-practice в рутинную работу аналитиков для повышения эффективности\n\nТребования:\n- У вас есть опыт работы продуктовым аналитиком от двух лет\n- Есть опыт в роли руководителя команды или ментора младших коллег от года\n- Уверенно знаете статистику и умеете проверять гипотезы\n- Будет плюсом практический опыт с ML", "date": "2026-07-02", "org": "tbank", "match_percent": 40, "match_fit": "Банковский домен (онбординг физлиц в продукты Т-Банка), управление и развитие команды, найм, формирование долгосрочных планов и аналитической стратегии, поиск точек роста и челлендж идей — управленческая часть знакома. Планка по опыту ниже других вакансий.", "match_gaps": "Ядро — руководство командой именно продуктовых аналитиков с уверенной статистикой и проверкой гипотез, а кандидат продуктовый руководитель, а не аналитический лид. Роль по масштабу заметно ниже уровня Head of Product и уже его целевых руководящих ролей."}, {"title": "Лид аналитики в клиентский опыт Origination", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lead-analytics-in-origination-customer-experience/757df6bb-8d0c-40e7-bac0-974794bd35ee/", "description": "Описание:\nМы команда аналитиков Origination. Origination — это процесс от интереса клиента на форме до утилизации. Мы оптимизируем процесс и постоянно улучшаем опыт, который получают клиенты при оформлении банковских продуктов Т-Банка.…\n\nОбязанности:\n- Управлять командой продуктовой аналитики\n- Улучшать метрики заявочного процесса Origination, в том числе клиентский опыт\n- Участвовать в развитии отчетности направления\n- Взаимодействовать с продуктовыми командами, помогать в выявлении точек роста продуктов и улучшении клиентского опыта\n\nТребования:\n- Опыт работы продуктовым аналитиком от 3 лет\n- Опыт работы руководителем команды от года\n- Обучали и менторили младших коллег — продуктовых аналитиков\n- Ваши хард-скиллы не ниже уровня middle+, включая проведение A/B-тестов и исследований\n- Обладаете критическим мышлением\n- Хотите и умеете взаимодействовать с большой командой заказчиков, отстаивать свою точку зрения и внедрять data-driven-подход в командах\n- Умеете выделять продуктовые метрики и определять взаимосвязи между ними. Хотите не только рассчитывать показатели, но и искать возможности влияния на них", "date": "2026-07-02", "org": "tbank", "match_percent": 38, "match_fit": "Банковский домен (Т-Банк) полностью релевантен 7,7 годам в Сбере, а data-driven подход, A/B-тесты, работа с продуктовыми метриками и большими командами заказчиков — сильные стороны кандидата. Улучшение метрик клиентского пути близко к его продуктовому опыту.", "match_gaps": "Ядро — руководство командой продуктовой аналитики и работа именно как продуктовый аналитик (требование от 3 лет), тогда как кандидат — продуктовый руководитель, а не аналитик-практик. Роль по уровню ниже его целевой позиции Head of Product."}, {"title": "Лид продуктовой аналитики в команду главного экрана приложения Т‑Банка", "url": "https://www.tbank.ru/career/it/vacancy/moscow/analytics-team-lead-for-apps-main-screen-team/cfcfe14e-23ba-448f-a56d-ae9c4f06bb95/", "description": "Описание:\nМы — команда продуктовой аналитики, тесно работающая с бизнесом. Отвечаем за ключевые интерфейсы главной страницы банковского приложения и личного кабинета в веб-версии.…\n\nОбязанности:\n- Руководить командой из 6+ человек, которые разделены по подкомандам\n- Развивать сотрудников и улучшать процессы в команде\n- Выстраивать целеполагание команды аналитиков и бизнес-команд, в которых работают аналитики\n- Развивать интерфейсы за счет аналитики команды: строить дерево метрик и отчетность, повышать прозрачность\n- Погружаться во все продукты компании, работать с внешними командами, например ревьюить тесты на плейсментах, которые принадлежат нам\n- Вести большие аналитические проекты: редизайны, тоглы на Главной, встраивание ML\n- Плотно общаться с командой DWH, Statist, А/B-платформой и другими коллегами, от которых зависит результат работы вашей команды\n\nТребования:\n- У вас есть опыт реализации изменений в бизнесе и управления ими в условиях высокой доли неопределенности\n- Есть опыт управления командой аналитиков\n- Знаете и применяете инструменты управления: делегирование, целеполагание, мотивацию, встречи one-to-one и так далее\n- Совершенствуете применяемые инструменты управления\n- Знаете SQL на продвинутом уровне\n- Знаете Python\n- Экспертно разбираетесь в математической статистике и теории вероятностей, применении А/B-тестов, разных статистических методах и критериях\n- Умеете разрабатывать стратегии выбора целевых метрик бизнеса или продукта, декомпозировать и строить дерево метрик\n- Будет плюсом знание ML", "date": "2026-07-02", "org": "tbank", "match_percent": 37, "match_fit": "Сильный банковский/финтех-домен (главный экран банковского приложения), опыт управления командами, построение деревьев метрик и целеполагание, работа с A/B и data-driven-культурой. Управленческие инструменты (делегирование, 1-2-1, мотивация) подтверждены.", "match_gaps": "Ядро — лид команды аналитиков с ЭКСПЕРТНЫМ уровнем матстатистики, продвинутым SQL и Python, чего у кандидата на уровне аналитика-эксперта нет; он продуктовый руководитель, а не head of analytics. Роль поддерживает бизнес-команды аналитикой, а продакт — отдельная фигура."}, {"title": "Лид продуктовой аналитики в команду роста Mass сегмента", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lid-produktovoj-analitiki-v-komandu-rosta-mass-segmenta/391ffb70-7464-4732-ae7e-0768959121a7/", "description": "Описание:\nКоманда аналитики роста массового сегмента отвечает за развитие продуктов для физических лиц и помогает находить точки роста для всей экосистемы Т-Банка.…\n\nОбязанности:\n- Развивать команду продуктовых аналитиков: организовывать работу, развивать экспертизу и поддерживать профессиональный рост сотрудников\n- Выстраивать партнерские отношения с Growth-менеджерами и бизнес-командами, искать новые точки роста и оценивать риски\n- Проводить сложные кросс-командные исследования с использованием A/B-тестирования, ML-подходов и эконометрики\n- Формировать понятную для бизнеса систему отчетности и развивать подходы к работе с ad-hoc-запросами\n- Помогать продуктовым командам принимать решения на основе данных и аналитических исследований\n- Развивать аналитические процессы и повышать качество продуктовой аналитики в направлении\n\nТребования:\n- У вас есть опыт руководства командой продуктовой аналитики от 3 человек в финтехе, банке или scale-up компании\n- Разбираетесь в продуктовой аналитике: воронках, продуктовых метриках, LTV и когортном анализе\n- Уверенно работаете с SQL и инструментами визуализации данных: Tableau, Power BI, Superset или аналогичными\n- У вас есть опыт работы с B2B-продуктами, кредитованием и финансовыми метриками\n- Вдохновляете команду, ставите понятные цели и развиваете сотрудников через регулярную обратную связь\n- Мыслите стратегически и умеете видеть взаимосвязь между аналитикой, продуктом и бизнесом\n- Выстраиваете эффективную коммуникацию с заинтересованными сторонами и понятно презентуете свои решения", "date": "2026-07-02", "org": "tbank", "match_percent": 33, "match_fit": "Финтех-домен, data-driven подход (SQL, A/B, метрики), стратегическое мышление и связка аналитики с продуктом и бизнесом. Есть опыт стейкхолдер-менеджмента и развития команд.", "match_gaps": "Ядро — руководство командой продуктовых аналитиков в B2C mass-сегменте с фокусом на воронки, LTV, когортный анализ, Tableau/Superset. Кандидат не был аналитическим лидом; B2C-рост физлиц — новый домен, а требуемая инструментальная глубина аналитики выходит за рамки продуктовой роли."}, {"title": "Лид продуктовой аналитики", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lid-produktovoj-analitiki/a6aed8b1-1962-4a9f-b643-e2d832fd3b07/", "description": "Описание:\nТ‑Бизнес — крупная бизнес‑линия внутри Т‑Банка. Мы работаем с компаниями и ИП: привлекаем, развиваем и обслуживаем их, создаем продукты, которые помогают вести бизнес. Клиентов делим на три сегмента — малый (S), средний (M) и крупный (L).…\n\nОбязанности:\n- Развивать аналитику значительной части онлайн‑привлечения Т‑Бизнеса\n- Генерировать гипотезы и находить точки роста в онлайн‑привлечении\n- Создавать и поддерживать дашборды и аналитические инструменты в BI‑системе\n- Участвовать в принятии решений совместно с бизнес‑лидерами и руководителями маркетинга на основе данных\n- Оценивать целесообразность запуска рекламных кампаний с крупными бюджетами и проводить их последующий анализ\n- Проверять гипотезы об эффективности каналов B2B‑маркетинга с помощью A/B‑тестов, гео‑ и хроно‑экспериментов, причинно‑следственных методов и других подходов\n- Руководить командой аналитики, развивать сотрудников и управлять бэклогом\n\nТребования:\n- У вас есть опыт управления и развития команды аналитики\n- Знаете SQL на продвинутом уровне: умеете писать сложные запросы, работать с большими объемами данных\n- У вас есть опыт работы с маркетинговыми метриками и метриками онлайн‑привлечения: CAC, CPC, CPA, CTR, воронка привлечения, приведенная стоимость и другие\n- Разбираетесь в математической статистике и теории вероятностей\n- Знаете, как применять A/B‑тесты и статистические критерии\n- Знаете альтернативные методы проверки гипотез: модели машинного обучения, когортный анализ, синтетический контроль, причинно‑следственный анализ\n- Умеете работать с Python и библиотеками для анализа данных и построения моделей\n- Понимаете методы работы с зависимостями в данных: оценку параметров распределений, дельта‑метод, линеаризацию\n- Умеете визуализировать данные и строить дашборды в BI‑инструментах", "date": "2026-07-02", "org": "tbank", "match_percent": 33, "match_fit": "Есть база data-driven (SQL, Python, A/B, статистика, причинно-следственные методы) и опыт управления командами в финтех/B2B-контексте Т-Бизнеса. Стратегическое видение и работа с бизнес-лидерами присутствуют.", "match_gaps": "Ядро — маркетинговая аналитика онлайн-привлечения: CAC/CPC/CPA/CTR, оценка рекламных бюджетов, гео/хроно-эксперименты, ML-модели, построение дашбордов. У кандидата нет опыта маркетинговых метрик и attribution; это узкоспециализированная аналитическая, а не продуктовая роль."}, {"title": "Руководитель группы LLM-агента поддержки", "url": "https://www.tbank.ru/career/it/vacancy/moscow/IT Team Lead/3d187fff-433e-4533-8840-970d220c4ca9/", "description": "(не удалось получить описание)", "date": "2026-07-02", "org": "tbank", "match_percent": 33, "match_fit": "Есть опыт руководства несколькими командами, управления развитием сотрудников и запуска сервисов; понимание AI-функциональности на бизнес-уровне и организации работы с ML-командами.", "match_gaps": "Судя по названию, ядро — построение LLM-агента поддержки, что требует глубокой ML/LLM-экспертизы и опыта строителя продуктов на LLM — существенный зазор (раздел 1b). Полного описания нет, оценка ориентировочная — фиксируем как неопределённость."}, {"title": "Руководитель аналитической команды экспериментирования", "url": "https://www.tbank.ru/career/it/vacancy/moscow/head-of-the-analytical-experimentation-team/11af70ec-fe35-415b-b341-b306886e1679/", "description": "Описание:\nКоманда экспериментирования масштабно и качественно улучшает культуру проведения А/B-тестов через развитие лаборатории, системы ревью и платформы.…\n\nОбязанности:\n- Ревьюить экосистемные тесты\n- Строить и реализовывать стратегию развития А/B-тестов в компании\n- Развивать и популяризировать исследовательский трек, курировать написание статей и подачу патентов\n- Доносить и защищать результаты тестов перед топ-менеджментом\n- Поддерживать А/B-платформу в части методологии\n\nТребования:\n- У вас есть опыт в проведении сложных А/B-тестов и широкая насмотренность в современных методах тестирования\n- Знаете основы математики А/B-тестов, знаете, когда работает ЦПТ и какие предпосылки есть у основных тестов\n- Понимаете работу продуктовых аналитических команд и как решения влияют на бизнес-метрики\n- Будет плюсом опыт управления командой аналитики", "date": "2026-07-02", "org": "tbank", "match_percent": 28, "match_fit": "Есть опыт A/B-тестов, влияния решений на бизнес-метрики и защиты результатов перед топ-менеджментом; управление командой (в роли — «будет плюсом») совпадает с запасом.", "match_gaps": "Ядро — глубокая экспертиза по методологии A/B-тестов (ЦПТ, предпосылки критериев, современные методы тестирования), развитие A/B-платформы, патенты и статьи. Кандидат применял A/B как продакт, но не является методологом-экспериментатором; ядро не совпадает."}, {"title": "Лид продуктовой аналитики в команду внутренних корпоративных сервисов", "url": "https://www.tbank.ru/career/it/vacancy/moscow/analytics-team-lead-for-internal-corporate-services-team/6312ecf6-7325-4fbd-af45-6d1082b1a1d9/", "description": "Описание:\nМы команда, которая развивает внутренние корпоративные сервисы: мессенджер, интерактивную доску, трекер задач и другие инструменты. Ими уже пользуются более 50 тысяч сотрудников, а потенциал внутри компании — около 150 тысяч MAU.…\n\nОбязанности:\n- Определять стратегию развития аналитики: ставить цели, формировать роадмап задач, планировать загрузку команды, следить за бэклогом, общаться со стейкхолдерами\n- Проводить продуктовые исследования и формировать продуктовые гипотезы по улучшению продукта\n- Улучшать отчетность и мониторинг качества продукта\n- Планировать наем, проводить собеседования, погружать новых сотрудников в процессы и продукт\n- Развивать сотрудников: помогать в решении проблем и достижении карьерных целей, вместе составлять и вести планы развития, подводить итоги на ревью\n- Поддерживать и развивать культуру экспериментов\n\nТребования:\n- У вас есть опыт в продуктовой аналитике от 3 лет, в том числе больше года — в роли тимлида\n- Проводили A/B-эксперименты и исследования пользовательских продуктов\n- Отлично знаете Python и SQL\n- Разбираетесь в ETL-процессах", "date": "2026-07-02", "org": "tbank", "match_percent": 28, "match_fit": "Есть навыки продуктовой аналитики (SQL, Python, A/B-тесты, деревья метрик), опыт управления командами и найма, работа со стейкхолдерами и продуктовыми гипотезами. Формально управленческая часть (роадмап, наём, развитие сотрудников) знакома.", "match_gaps": "Ядро роли — руководитель именно аналитической функции с экспертным Python/SQL и ETL, а кандидат продакт-лид, а не head of analytics; SQL/Python — прикладной инструмент, не инженерная экспертиза. Домен внутренних офисных сервисов (мессенджер, трекер) прямо в разделе 'чего нет' (п.4)."}, {"title": "Руководитель ML-направления в AI-центр — Кредитные продукты", "url": "https://www.tbank.ru/career/it/vacancy/moscow/rukovoditel-ml-napravleniya-v-ai-centr-kreditnye-produkty/87bb8cd1-1989-44c2-85ee-cb6b1ce18235/", "description": "Описание:\nКредитные продукты — одна из ключевых бизнес‑линий Т‑Банка. Миллионы клиентов используют кредиты для важных жизненных целей, а мы делаем процесс быстрым, понятным и технологичным.…\n\nОбязанности:\n- Формировать стратегию развития ML/AI совместно со стейкхолдерами и определять приоритетные направления с максимальной бизнес‑ценностью\n- Руководить кросс‑функциональными ML‑командами (2+ команды до 10–15 инженеров) и отвечать за результат внедрений\n- Приоритизировать и валидировать ML‑инициативы совместно с продуктовой командой, формировать и развивать бэклог\n- Обеспечивать delivery ML‑проектов и их техническое качество в рамках процессов разработки\n- Развивать инфраструктуру для ML: хранение и обновление данных, контроль качества данных, интеграции с корпоративными системами\n- Контролировать внедрение моделей в production, мониторинг качества и оценку эффекта через эксперименты и аналитику\n- Планировать и управлять затратами на обучение и инференс моделей, вычислительными ресурсами\n- Проводить архитектурные ревью ML‑систем и пайплайнов, повышать их масштабируемость и эффективность\n- Консультировать бизнес и технические команды по вопросам применения ML/AI и лучших практик\n\nТребования:\n- У вас есть опыт ML‑разработки от 5 лет, из них не менее 2 лет в роли тимлида одной или нескольких ML‑команд\n- У вас есть опыт выстраивания процессов разработки ML‑решений в рамках продуктовых или платформенных команд\n- Имеете опыт развития ML‑инфраструктуры и MLOps, включая внедрение моделей в production, мониторинг и масштабирование\n- Имеете опыт проектирования ML‑систем и пайплайнов, запуска A/B‑тестов и оценки эффекта от внедрения моделей\n- Умеете управлять delivery ML‑команд и выстраивать процессы планирования и оценки результатов\n- Умеете выстраивать коммуникацию с бизнес‑заказчиками и техническими командами, формировать стратегическое видение развития ML/AI\n- Разбираетесь в проектировании архитектуры распределенных систем и интеграции ML‑решений\n- Обладаете широким кругозором в области машинного и глубокого обучения, знакомы с современными технологиями и индустриальными трендами, включая рекомендательные системы, обработку естественного языка и классические методы машинного обучения", "date": "2026-07-02", "org": "tbank", "match_percent": 26, "match_fit": "Совпадает управленческая рамка и банковский/финтех-контекст: формирование ML/AI-стратегии со стейкхолдерами, приоритизация инициатив по бизнес-ценности, руководство несколькими командами и оценка эффекта через эксперименты. Кандидат ставил AI-функциональность на стороне продакта и организовывал работу с ML-командами.", "match_gaps": "Ядро роли — инженерное ML-лидерство: жёсткое требование ML-разработки от 5 лет и 2+ года тимлидом ML-команд, MLOps, вывод моделей в production, архитектурные ревью пайплайнов. У кандидата нет инженерного и глубокого ML-бэкграунда — это существенный зазор плюс признаки engineering-менеджмента."}, {"title": "Руководитель ML-направления в AI-центр — Daily Banking", "url": "https://www.tbank.ru/career/it/vacancy/moscow/rukovoditel-ml-napravleniya-v-ai-centr-daily-banking/6d279690-e993-4e3b-8d6a-19ee5863a09a/", "description": "Описание:\nDaily Banking — крупнейшее направление Т‑Банка и сердце мобильного приложения. Переводы, оплаты, дебетовые карты, мобильная связь — сценарии, которыми ежедневно пользуются миллионы клиентов и которые формируют большую часть действий в приложении.…\n\nОбязанности:\n- Формировать ML‑стратегию совместно со стейкхолдерами и определять приоритетные направления внедрения ML с максимальной бизнес‑ценностью\n- Руководить кросс‑функциональными ML‑командами и отвечать за достижение бизнес‑результатов\n- Приоритизировать и валидировать ML‑инициативы совместно с продуктовыми командами, формировать и развивать бэклог\n- Обеспечивать delivery ML‑проектов в рамках процессов разработки и контроля качества\n- Развивать инфраструктуру для ML: хранение и обновление данных, качество данных, интеграции с корпоративными системами\n- Контролировать внедрение моделей в production, мониторинг их качества и оценку эффекта\n- Планировать и управлять затратами на обучение и инференс моделей, вычислительные ресурсы\n- Проводить архитектурные ревью ML‑систем и пайплайнов, повышать их эффективность и масштабируемость\n- Консультировать бизнес и технические команды по вопросам ML/AI и лучшим практикам применения технологий\n\nТребования:\n- У вас есть опыт ML‑разработки от 5 лет, из них не менее 2 лет в роли тимлида одной или нескольких ML‑команд\n- У вас есть опыт выстраивания и развития ML‑инфраструктуры и MLOps‑процессов, включая внедрение моделей в production, мониторинг и масштабирование\n- Имеете опыт построения процессов разработки ML‑решений в рамках продуктовых или платформенных команд\n- Имеете опыт проектирования ML‑систем и пайплайнов, запуска A/B‑тестов и оценки эффекта от внедрения моделей\n- Умеете управлять delivery ML‑команд и выстраивать процессы планирования и оценки результатов\n- Умеете работать со стейкхолдерами и бизнес‑заказчиками, формировать стратегическое видение развития ML/AI\n- Понимаете принципы построения архитектуры распределенных систем и интеграции ML‑решений с корпоративными системами", "date": "2026-07-02", "org": "tbank", "match_percent": 26, "match_fit": "Как и в родственной вакансии, совпадает управленческое ядро и финтех-домен: ML-стратегия со стейкхолдерами, приоритизация инициатив по бизнес-ценности, руководство кросс-функциональными командами, ответственность за бизнес-результат. Daily Banking — банковский продукт с большим числом пользователей, что кандидату близко по масштабу.", "match_gaps": "Ядро — инженерное ML-руководство с обязательными ML-разработкой от 5 лет, тимлидством ML-команд, MLOps, внедрением моделей в production и архитектурными ревью. Инженерной и глубокой ML-экспертизы у кандидата нет — критический зазор."}, {"title": "Лид продуктовой аналитики в команду аналитики привлечения", "url": "https://www.tbank.ru/career/it/vacancy/moscow/analytics-lead-for-acquisition-analytics-team/7bfb3c64-9ce5-499b-8c43-cd3bfdfd5bdc/", "description": "Описание:\nКоманда аналитики привлечения находит новых клиентов и помогает текущим получать лучший опыт обслуживания в экосистеме.…\n\nОбязанности:\n- Вместе с продуктовой и операционной командами выдвигать гипотезы для роста бизнес-метрик и оценивать их изменение в деньгах\n- Искать точки роста через проведение исследований и A/B-тестов\n- Координировать построение отчетов в ApacheSuperset для оперативного мониторинга ключевых продуктовых и операционных метрик\n- Работать с мотивацией сотрудников, проводить 1-2-1 и выстраивать индивидуальные планы развития аналитиков\n\nТребования:\n- У вас есть опыт работы лидом продуктовых аналитиков от года\n- Разрабатывали дизайн и проводили A/B-тесты\n- Проводили аналитические исследования по изменению продуктовых метрик\n- Проверяли гипотезы на ретроспективных данных\n- Разбираетесь в математической статистике и теории вероятностей\n- Глубоко разбираетесь в SQL, массивах данных и Python\n- Умеете визуализировать данные и строить отчеты в Tableau, PowerBI или ApacheSuperset", "date": "2026-07-02", "org": "tbank", "match_percent": 25, "match_fit": "Совпадает data-driven культура: A/B-тесты, проверка гипотез, SQL, Python, математическая статистика, работа с продуктовыми командами и оценка эффекта в деньгах.", "match_gaps": "Ядро — быть лидом продуктовых аналитиков (требование «от года» именно как лид аналитики) с глубоким hands-on SQL/Python. Кандидат применял аналитику как продакт-лид, но не руководил командой аналитиков и не был hands-on аналитиком как основная роль."}, {"title": "Лид core-команды аналитики", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lead-of-the-core-analytics-team/67e66679-e642-47b6-b94f-fe9abe102c80/", "description": "Описание:\nНаша команда отвечает за интерфейсную аналитику: мы покрываем десятки разделов приложения и веб-интерфейсов Т-Банка, формируем метрики, стратегию и подходы к развитию пользовательского опыта.…\n\nОбязанности:\n- Развивать событийную аналитику как продукт: архитектура, стандарты, онбординг пользователей\n- Прорабатывать ключевые метрики интерфейсов и обеспечивать корректную измеримость в A/B-платформе\n- Вместе с DWH-командой строить модели данных и платформенные решения\n- Работать с CTO и CPO наших внутренних аналитических платформ по стратегическим трекам\n- Сформировать и развивать сore-команду аналитиков\n\nТребования:\n- У вас есть опыт работы тимлидом или вы самостоятельно вели проекты\n- Есть опыт работы на стыке с дата-инженерами\n- Отлично разбираетесь в событийной аналитике, моделях данных и метриках внешних и внутренних продуктов\n- Умеете строить команды и выстраивать кросс-командное взаимодействие с командами внутренних аналитических платформ\n- Будет плюсом опыт с работы с A/B-платформами и платформами событийной аналитики, опыт миграции или стандартизации аналитических систем, наличие команды или сотрудников, которые готовы п -тестирования\n- Умеете выстраивать эффективную коммуникацию с заказчиками и техническими командами\n- Умеете приоритизировать задачи и управлять бэклогом\n- Способны мотивировать и развивать команду, работать с матрицей компетенций\n- Мыслите системно, держите фокус на результат и аналитическую строгость\n- Готовы к экспериментам и внедрению новых подходов", "date": "2026-07-02", "org": "tbank", "match_percent": 25, "match_fit": "Есть data-driven культура, SQL/Python, A/B-тесты и управление командами, а также кросс-функциональное взаимодействие с заказчиками. Управленческий и продуктовый бэкграунд формально пересекается с ролью лида.", "match_gaps": "Ядро роли — руководство аналитиками-разработчиками и построение/внедрение ML-моделей в реальных продуктах, а кандидат не строит ML-модели и не работал продуктовым аналитиком (он продакт-лид). Домен доставки/логистики отсутствует в опыте."}, {"title": "Руководитель разработки платформы роста Шопинга", "url": "https://www.tbank.ru/career/it/vacancy/moscow/dab8a0d8-f1bc-4aba-9ab3-92bc54a836de/a607f186-8a52-41f6-a224-8f386a8ecf3e/", "description": "Описание:\nНаша команда отвечает за главную страницу Шопинга и развивает ключевые пользовательские сценарии в продукте: точки входа, вовлечение пользователей и механики роста. Мы помогаем клиентам находить лучшие предложения, получать выгоду и взаимодействовать с сервисами Шопинга.…\n\nОбязанности:\n- Развивать платформы и сервисы роста Шопинга\n- Проектировать и развивать бэкенд-архитектуру\n- Обеспечивать масштабируемость и отказоустойчивость сервисов\n- Интегрироваться с платформами офферов, рекомендаций и маркетинга\n- Руководить тремя командами разработки\n- Развивать инженерные процессы и стандарты\n- Формировать сквозные кросс-функциональные команды и выстраивать процессы продуктовой разработки\n- Организовывать совместную работу со смежными подразделениями\n\nТребования:\n- У вас есть опыт управления несколькими командами — суммарно 20+ человек\n- Проектировали сложные системы\n- Руководили продуктовыми командами, умеете выстраивать эффективные delivery-процессы\n- Вели крупные проекты и внедряли изменения\n- Будет плюсом опыт разработки маркетинговых платформ, опыт работы с промомеханиками и скидками, с продуктами e-commerce", "date": "2026-07-02", "org": "tbank", "match_percent": 22, "match_fit": "Формально пересекается опыт управления несколькими командами (у кандидата до 11 команд) и ведение крупных проектов и внедрений изменений. Тема роста и платформы концептуально знакома.", "match_gaps": "Это роль руководителя разработки (engineering management): проектирование бэкенд-архитектуры, масштабируемость/отказоустойчивость, инженерные процессы и стандарты. Кандидат управлял разработкой как продакт-лид, а не как инженерный руководитель, плюс домен e-commerce/marketplace не его — стоп-фактор инженерного менеджмента."}, {"title": "Лид продуктовой аналитики в команду AI-агентов обслуживания клиентов", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lead-product-analytics-on-the-al-customer-service-agent-team/00afbddc-c272-4762-9548-ebe709addd19/", "description": "Описание:\nAI-центр — команда, в которой 600+ сотрудников создают технологии и продукты на основе AI, делятся опытом и внедряют искусственный интеллект во все продукты Т-Банка.…\n\nОбязанности:\n- Проектировать архитектуру хранения и обработки данных, реализовывать пайплайны аналитики и данных для обучения моделей — SQL, Python, SSETL, Airflow\n- Управлять командой аналитиков из 5 человек\n- Улучшать ML-модели: искать точки роста в данных, исследовать зависимости и корреляции вместе с ML-инженерами\n- Проводить продуктовые исследования, оценивать и приоритизировать гипотезы вместе с командой продукта\n- Проводить А/B-тесты: подготавливать, разрабатывать дизайн, запускать и анализировать результаты\n- Строить ad-hoc-аналитику и дашборды в Proteus и Helicopter\n\nТребования:\n- Уверенно работаете с Python, библиотеками pandas, NumPy, Matplotlib, sklearn, SciPy, prophet и другими инструментами анализа данных\n- Разбираетесь в принципах проектирования надежных и масштабируемых систем\n- Владеете практиками и инструментами современной разработки, включая version control, CI/CD, тестирование и так далее\n- Владеете SQL на продвинутом уровне\n- Есть опыт построения пайплайнов данных с использованием SSETL и Airflow\n- Умеете выбирать целевые метрики бизнеса или продукта, проводить декомпозицию и строить дерево метрик\n- Глубоко разбираетесь в математической статистике и теории вероятностей, А/B-тестах, разных статистических методах и критериях\n- Знаете альтернативные методы проверки гипотез, включая ML-подходы, когортный анализ, синтетический контроль и другие\n- Есть опыт визуализации данных и построения дашбордов в BI-инструментах, включая Tableau, Python и Proteus", "date": "2026-07-02", "org": "tbank", "match_percent": 22, "match_fit": "Есть управление командой, дерево метрик, продвинутый SQL, математическая статистика и A/B-тесты — часть требований пересекается с data-driven компетенциями кандидата.", "match_gaps": "Ядро роли — инженерная аналитика: проектирование архитектуры данных, пайплайны SSETL/Airflow, CI/CD, продвинутые Python-библиотеки, что относится к разделу «инженерного бэкграунда, которого нет». Кандидат — продуктовый руководитель, а не аналитик-инженер."}, {"title": "Лид продуктовой аналитики в команду количественных исследований", "url": "https://www.tbank.ru/career/it/vacancy/moscow/analytics-team-lead-for-quantitative-research-team/7cc11dc1-cfc0-4d2b-be32-575cd0670fc7/", "description": "Описание:\nКоманда количественных исследований — часть направления стратегической и R&D-аналитики в Управлении аналитики. Мы тесно сотрудничаем с количественными исследователями Центра исследований Т-Банка.…\n\nОбязанности:\n- Проводить продуктовые исследования\n- Искать инсайты в данных, исследовать зависимости и корреляции\n- Писать и оптимизировать SQL-код и код на Python, строить пайплайн ETL\n- Строить AdHoc-аналитику\n- Работать над проектом по кластеризации свободного ввода в опросах\n- Подготавливать, запускать и анализировать A/B-тесты для измерения метрик NPS и CSI\n- Руководить командой из 6 аналитиков\n- Управлять проектом: много общаться с продуктовыми командами, планировать и приоритизировать бэклог\n\nТребования:\n- Знаете SQL на продвинутом уровне\n- Разбираетесь в математической статистике и теории вероятностей, применении A/B-тестов, статистических методах и критериях\n- Владеете методами проверки гипотез: ML-подходами, когортным анализом, синтетическим контролем и другими\n- Знаете ML и разные методы анализа, в том числе временных рядов\n- Пишете код на Python и работаете с библиотеками: Pandas, Numpy, Matplotlib, Sklearn, Scipy, Prophet и другими\n- Готовы погружаться в данные: анализировать и визуализировать их, строить дашборды в BI-инструментах: Python, Proteus\n- Умеете и хотите работать с задачами по анализу текстов\n- Будет плюсом, если вы разбираетесь в методах количественных исследований и знаете опросные метрики", "date": "2026-07-02", "org": "tbank", "match_percent": 20, "match_fit": "Есть базовое совпадение по data-driven инструментарию: SQL, Python, A/B-тесты, математическая статистика, работа с продуктовыми командами.", "match_gaps": "Ядро — глубокая hands-on количественная аналитика и research: ETL-пайплайны, ML-методы, временные ряды, Pandas/Numpy/Sklearn/Prophet, анализ текстов, руководство командой аналитиков. Это уровень эксперта-аналитика, а не продуктового лида; такой инженерно-аналитической глубины в опыте нет."}, {"title": "Технический руководитель по данным — Платформа обслуживания", "url": "https://www.tbank.ru/career/it/vacancy/moscow/tekhnicheskij-rukovoditel-po-dannym-platforma-obsluzhivaniya/cc912146-aed5-45e2-8eaf-577800d2f19c/", "description": "Описание:\nПлатформа обслуживания — один из топ‑5 дата‑доменов экосистемы Т: более 6400 объектов в DWH и около 3,5 тыс. MAU пользователей data‑продуктов.…\n\nОбязанности:\n- Руководить командой инженеров данных численностью 50+ человек: определять приоритеты, задавать стандарты работы, развивать сотрудников и отвечать за результат поставки данных\n- Выстраивать целевую архитектуру данных внутри платформы обслуживания с учетом разных типов данных: для управленческой и продуктовой аналитики, машинного обучения, решений на базе больших языковых моделей и ИИ‑агентов\n- Организовывать сквозной процесс работы с данными: от сбора бизнес‑потребности и формулирования требований до разработки, проверки качества, приемки и сопровождения\n- Обеспечивать стабильность, полноту, качество и прозрачность данных для бизнеса, аналитики и продуктовых команд\n- Разделять и описывать контуры данных под разные сценарии использования: принятие решений, аналитика, обучение моделей, автоматизация поддержки и ИИ‑сценарии\n- Выстраивать взаимодействие между бизнесом, продуктовой аналитикой, инженерами данных, командами машинного обучения и платформенными функциями\n- Развивать данные как внутренний продукт: определять владельцев, заказчиков, требования к качеству и правила развития\n- Ускорять внедрение решений с применением искусственного интеллекта за счет корректной организации данных, разметки, контекста, обратной связи и оценки качества\n- Отвечать за экономический эффект и монетизацию данных\n\nТребования:\n- У вас есть опыт работы дата‑инженером и/или разработчиком от 3 лет\n- У вас есть опыт руководства направлением данных или инженерии данных в сложной продуктовой или операционной среде от 2 лет\n- Имеете опыт построения архитектуры данных и организации процессов поставки данных для внутренних заказчиков\n- Имеете опыт выстраивания процессов качества данных, контроля стабильности, документирования и приемки результатов\n- Умеете переводить бизнес‑задачи и аналитические потребности в требования к данным, архитектуре и плану развития\n- Умеете управлять командой инженеров данных и выстраивать их работу в соответствии с бизнес‑приоритетами\n- Понимаете различия между данными для отчетности и аналитики, данными для моделей и данными для решений на базе больших языковых моделей\n- Умеете находить баланс между быстрыми прикладными решениями и долгосрочным развитием системы данных\n- Умеете выстраивать кросс‑функциональное взаимодействие между бизнесом, продуктом, аналитикой, инженерией данных и командами искусственного интеллекта", "date": "2026-07-02", "org": "tbank", "match_percent": 16, "match_fit": "Есть рабочее знакомство с enterprise-инфраструктурой (OpenShift, 25+ интеграций, закрытые контуры) и понимание монетизации данных как продукта, а также кросс-функциональное взаимодействие бизнеса и команд.", "match_gaps": "Стоп-фактор: это инженерный менеджмент под другим названием — требуется опыт дата-инженера/разработчика от 3 лет, построение архитектуры данных и руководство 50+ инженерами данных. Кандидат не занимался разработкой, не проектирует архитектуру данных, не управлял техдолгом — ядро роли полностью несовместимо с его профилем."}, {"title": "Лид BI-аналитиков", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lid-bi-analitikov/d11c14c5-9b54-4b4b-8694-5ca187abdddd/", "description": "Описание:\nИщем BI‑лида, который возглавит команду аналитики и выстроит системную работу с данными.…\n\nОбязанности:\n- Управлять командой BI-аналитиков: постановка целей, планирование и приоритизация задач, развитие сотрудников, регулярная обратная связь\n- Выстраивать эффективное взаимодействие с продуктовыми командами и бизнес-стейкхолдерами: помогать формулировать запросы, переводить бизнес-задачи в аналитические решения\n- Формировать и поддерживать рабочие процессы BI: от запроса и дизайна дашбордов до поддержки и развития существующих решений\n- Отвечать за качество аналитических продуктов: корректность метрик, понятность логики, читаемость и визуальное качество дашбордов\n- Участвовать в сложных и ключевых аналитических задачах (hands-on): дизайн метрик, структура отчетов, ревью решений команды\n- Развивать BI-направление внутри платформы: подходы выки письменной и устной коммуникации\n- умение структурировать информацию и готовить понятные материалы\n- опыт организации мероприятий различного масштаба\n- навыки взаимодействия с разными командами и заинтересованными сторонами\n- самостоятельность и хорошие организационные навыки\n- умение работать с документами и процессами согласования\n- аналитическое мышление и опыт работы с опросами\n- навыки проектного управления и многозадачности\n- уверенное взаимодействие с внутренними стейкхолдерами и подрядчиками.\n- понимание процессов разработки ПО\n- опыт работы с внутренними коммуникациями\n- опыт ведения сообществ или организации профессиональных мероприятий.", "date": "2026-07-07", "org": "sber", "match_percent": 12, "match_fit": "Частично релевантны организационные и координационные навыки: управление мероприятиями, взаимодействие с внутренними стейкхолдерами и подрядчиками, согласование документов (брифы, сметы, договоры) с юридическим и финансовым блоками, проектное управление в многозадачности.", "match_gaps": "Ядро роли — DevRel и внутренние коммуникации: подготовка контента (статьи, новости, анонсы), ведение сообществ, DevRel/HR/маркетинг-опыт — это контентно-коммуникационная экспертиза, которой у кандидата нет (стоп-фактор по контентно-медийному ядру). Также требуется понимание процессов разработки ПО на уровне DevRel, что вне продуктового профиля кандидата."}, {"title": "Исследователь (Лаборатория нейронаук и поведения человека)", "url": "https://rabota.sber.ru/search/4498984/", "description": "Описание:\nМы — Лаборатория Нейронаук и поведения человека, исследовательское подразделение в Сбере.…\n\nЧем предстоит заниматься:\n- формирование и управление стратегическим вектором разработок команды по когнитивному направлению\n- разработка дизайна научных исследований: от формулирования гипотезы до интерпретации результатов\n- разработка методологий / технологий / инструментов на основе результатов исследований, имеющих прикладную ценность для других команд и департаментов в Сбере\n- участие в разработке психометрических инструментов для оценки когнитивных процессов\n- управление командой с междисциплинарными компетенциями (когнитивные науки, психофизиология, UX, поведенческая экономика, математика, философия и культурология)\n- общение с заказчиками, стейкхолдерами, презентация и защита результатов внутри банка и в научном сообществе (публикации, конференции, выступления).\n\nМы ждём, что вы:\n- степень кандидата наук / PhD в когнитивных науках / психологии / нейронауках или магистратура / специалитет в перечисленных областях при наличии значимого опыта в научных и прикладных исследованиях\n- публикации в рецензируемых журналах (Q1–Q4 WoS/Scopus, Белый список, ведущие журналы по когнитивным наукам, психологии, нейронаукам)\n- опыт работы в R&D, UX, заказных исследованиях, НИР/НИОКР\n- научный интерес к генеративным сетям и обязательный опыт их использования при решении рабочих задач (Гигачат, ChatGPT, Claude, Grok, Perplexity, DeepSeek, Gemini и пр.)\n- опыт работы с лабораторным оборудованием (например: eye-tracking, ЭЭГ, EMG, fMRI).\n- высшее техническое образование (желательно в области: компьютерные науки, прикладная математика, искусственный интеллект, машинное обучение, робототехника) или подтвержденный практический опыт в разработке ИИ-систем.", "date": "2026-07-07", "org": "sber", "match_percent": 9, "match_fit": "Формально совпадают лишь управленческие и стейкхолдерские элементы: управление командой, защита результатов перед стейкхолдерами и использование генеративных сетей в рабочих задачах.", "match_gaps": "Ядро роли — научные исследования: требуются PhD/кандидат наук в когнитивных/нейронауках, публикации в рецензируемых журналах, опыт НИР/НИОКР и работа с лабораторным оборудованием (ЭЭГ, fMRI, eye-tracking). Ничего из научного бэкграунда у кандидата нет — несоответствие ядру."}, {"title": "Главный эксперт Red Team", "url": "https://rabota.sber.ru/search/4520391/", "description": "Описание:\nОтдел оценки защищённости Сбера приглашает профессионалов присоединиться к команде, работающей над повышением устойчивости крупной инфраструктуры к современным киберугрозам.…\n\nЧем предстоит заниматься:\n- проведение тестирований на проникновение и киберучений (RedTeaming);\n- поиск уязвимостей и их подтверждение через практическую эксплуатацию;\n- исследования в области кибербезопасности.\n\nМы ждём, что вы:\n- опыт работы в направлениях pentest, red team не менее 3 лет\n- умение автоматизировать рутинные задачи (Python, Bash и др.)\n- экспертные знания и практические навыки в одной из специализаций (веб, сетевая инфраструктура, инфраструктурное ПО и т.д.)\n- знание и опыт применения методик анализа защищенности (PTES/OWASP WSTG/OSSTMM)\n- понимание концепции Cyber Kill Chain\n- опыт реализации TTP из MITRE ATT&CK\n- знание ландшафта угроз и опыт эксплуатации уязвимостей в предприятия (среда Active Directory, кластеры СУБД, виртуализированные и контейнеризированные окружения и т.д.)\n- опыт использования GigaChat, Kandinsky и аналогов в продуктах, навыки создания и использования AI-агентов.", "date": "2026-07-07", "org": "sber", "match_percent": 5, "match_fit": "Практически нет совпадений: домен — кибербезопасность в крупной инфраструктуре Сбера, что пересекается лишь с общим банковским контекстом кандидата.", "match_gaps": "Ядро роли — техническая экспертиза pentest/Red Team (эксплуатация уязвимостей, MITRE ATT&CK, Active Directory, PTES/OWASP), которой у кандидата нет вообще. Это узкоспециализированная инженерная IC-роль, полностью вне продуктового профиля."}, {"title": "Руководитель проектов", "url": "https://rabota.sber.ru/search/4545931/", "description": "Описание:\nВ успешную команду по работе с платежными системами и партнерами ищем высококлассного специалиста с пониманием платежного рынка и глубоким знанием правил платежных систем.…\n\nЧем предстоит заниматься:\n- мониторинг изменений правил и стандартов платежных систем;\n- оценка влияния правил и стандартов платежных систем на участников рынка;\n- консолидация и координация деятельности команд банка в целях соблюдения правил и стандартов платежных систем;\n- подготовка аналитических материалов в части правил, стандартов платежных систем;\n- подготовка писем, позиций и запросов в адрес платежных систем, НСПК, Банка России и участников рынка;\n- взаимодействие с платежными системами, НСПК и Банком России по вопросам подразделения;\n- анализ международной практики;\n- разработка презентационных материалов по направлению деятельности;\n- работа с командой для сбора необходимой информации и обратной связи, координация кросс-командных проектов;\n- консультирование внутренних подразделений по вопросам правил и взаимодействия с платежными системами;\n- операционная поддержка проектов с платежными системами;\n\nМы ждём, что вы:\n- опыт работы в банковской сфере/ платежной индустрии / финтехе от 5 лет;\n- знание правил платежных систем, свободное ориентирование в документации платежных систем;\n- понимание процессов эмиссии и эквайринга;\n- понимание контекста и развития платежного ландшафта;\n- навыки управления кросс-функциональными проектами\n- опыт работы с АБС, используемыми в рамках эмиссии и эквайринга;\n- использование ИИ-инструментов в работе приветствуется;\n- умение структурировать информацию и выделять ключевые моменты для систематизации материала;\n- стремление к саморазвитию и улучшению навыков;\n- системность мышления, широкий кругозор.", "date": "2026-07-06", "org": "sber", "match_percent": 50, "match_fit": "Совпадает базовое требование: банковская сфера/финтех 5+ лет, навыки управления кросс-функциональными проектами, подготовка аналитических и презентационных материалов, взаимодействие с регуляторами и ЛПР высокого уровня (опыт переговоров с ведомствами).", "match_gaps": "Нет доменного опыта в платёжных системах: правила ПС, процессы эмиссии и эквайринга, работа с АБС, взаимодействие с НСПК/Банком России. Роль скорее координационно-экспертная, а не руководство продуктовым // Файлы вакансий и кэш анализа теперь хранят блоки "функционал"/
// "требования" ЦЕЛИКОМ (без обрезки) — она нужна была только для показа
// на странице, а для LLM-анализа и самого файла обрезанный текст мог
// заодно спрятать важные детали. Поэтому обрезка до короткой версии
// теперь происходит здесь, на отрисовке, а не в python-скриптах сбора.
const DESC_MAX_ITEMS = 5;
const DESC_MAX_CHARS = 300;

function truncateBlockBody(body) {
  const lines = body.split('\n');
  const isBulletList = lines.length > 0 && lines.every(line => line.startsWith('- ') || line === '…');
  if (isBulletList) {
    if (lines.length > DESC_MAX_ITEMS) {
      return lines.slice(0, DESC_MAX_ITEMS).concat(['…']).join('\n');
    }
    return body;
  }
  if (body.length > DESC_MAX_CHARS) {
    return body.slice(0, DESC_MAX_CHARS).trimEnd() + '…';
  }
  return body;
}

function renderDescription(text) {
  if (!text) return '';
  return text.split(/\n\n+/).map(block => {
    const lines = block.split('\n');
    const first = lines[0] || '';
    if (first.endsWith(':') && lines.length > 1) {
      const title = first.slice(0, -1);
      const body = truncateBlockBody(lines.slice(1).join('\n'));
      return `<div class="desc-section"><div class="desc-section-title">${escapeHtml(title)}</div><div class="desc-section-body">${escapeHtml(body)}</div></div>`;
    }
    return `<div class="desc-section"><div class="desc-section-body">${escapeHtml(truncateBlockBody(block))}</div></div>`;
  }).join('');
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function matchBadge(v) {
  if (v.match_percent === null || v.match_percent === undefined) {
    return '<span class="match-badge pending">…</span>';
  }
  const p = v.match_percent;
  const cls = p >= 70 ? '' : (p >= 40 ? 'mid' : 'low');
  return `<span class="match-badge ${cls}">${p}%</span>`;
}

function matchDetails(v) {
  if (v.match_percent === null || v.match_percent === undefined) {
    return '<div class="match-pending-note">Процент соответствия и разбор по резюме будут рассчитаны в течение 4 часов.</div>';
  }
  return (
    `<div class="desc-section"><div class="desc-section-title">Чем подходит</div><div class="desc-section-body">${escapeHtml(v.match_fit || '')}</div></div>` +
    `<div class="desc-section"><div class="desc-section-title">Пробелы</div><div class="desc-section-body">${escapeHtml(v.match_gaps || '')}</div></div>`
  );
}

function computeStats(vacancies) {
  const stats = { total: vacancies.length, green: 0, mid: 0, low: 0 };
  vacancies.forEach(v => {
    if (v.match_percent === null || v.match_percent === undefined) return;
    const p = v.match_percent;
    if (p >= 70) stats.green++;
    else if (p >= 40) stats.mid++;
    else stats.low++;
  });
  return stats;
}

function renderSidebar(org) {
  const sidebar = document.getElementById('sidebar');
  if (!org) {
    sidebar.innerHTML = '';
    return;
  }
  const s = computeStats(org.vacancies);
  sidebar.innerHTML = `
    <div class="stat-panel">
      <div class="stat-row"><span class="stat-label">Всего</span><span class="stat-value">${s.total}</span></div>
      <div class="stat-row"><span class="stat-label"><span class="stat-dot green"></span></span><span class="stat-value">${s.green}</span></div>
      <div class="stat-row"><span class="stat-label"><span class="stat-dot mid"></span></span><span class="stat-value">${s.mid}</span></div>
      <div class="stat-row"><span class="stat-label"><span class="stat-dot low"></span></span><span class="stat-value">${s.low}</span></div>
    </div>
  `;
}

function renderTabs(activeSlug) {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  ORGS.forEach(org => {
    const btn = document.createElement('button');
    const empty = org.vacancies.length === 0;
    btn.className = 'tab' + (org.slug === activeSlug ? ' active' : '') + (empty ? ' tab-empty' : '');
    const badge = org.new_count > 0 ? ` <span class="badge">(${org.new_count})</span>` : '';
    btn.innerHTML = `${escapeHtml(org.label)}${badge}`;
    btn.onclick = () => showOrg(org.slug);
    tabs.appendChild(btn);
  });
  syncSidebarTop();
}

// Число рядов вкладок (а значит и высота шапки) зависит от ширины окна и
// длины названий компаний — не константа. Сайдбар (position: sticky)
// иначе прилипает поверх шапки на фиксированном отступе, который на
// каких-то ширинах экрана оказывается меньше реальной высоты шапки, и
// счётчики наезжают на названия компаний. Подгоняем отступ под реальный
// размер шапки на лету.
function syncSidebarTop() {
  const header = document.querySelector('header');
  const sidebar = document.getElementById('sidebar');
  if (header && sidebar) {
    sidebar.style.top = (header.offsetHeight + 20) + 'px';
  }
}
window.addEventListener('resize', syncSidebarTop);

function showOrg(slug) {
  renderTabs(slug);
  const org = ORGS.find(o => o.slug === slug);
  renderSidebar(org);
  const main = document.getElementById('main');
  main.innerHTML = '';
  if (!org || org.vacancies.length === 0) {
    main.innerHTML = '<div class="empty">Вакансий пока нет</div>';
    return;
  }
  org.vacancies.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    const header = document.createElement('div');
    header.className = 'card-header';
    header.innerHTML = `<span class="card-title-row">${matchBadge(v)}<span class="card-title">${escapeHtml(v.title)}</span></span><span class="card-date">${v.date}</span>`;
    header.onclick = () => card.classList.toggle('open');
    const body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML = `<a class="card-link" href="${escapeHtml(v.url)}" target="_blank" rel="noopener">${escapeHtml(v.url)}</a>` + matchDetails(v) + renderDescription(v.description);
    card.appendChild(header);
    card.appendChild(body);
    main.appendChild(card);
  });
}

if (ORGS.length > 0) {
  showOrg(ORGS[0].slug);
} else {
  document.getElementById('main').innerHTML = '<div class="empty">Пока нет данных — запустите monitor-скрипты</div>';
}
</script>
