й и спецпредложений), работает с топ-менеджментом в сложной enterprise/регуляторной среде. Понимает B2B/B2B2C, ИБ, персональные данные и запуск от discovery до масштабирования.", "match_gaps": "Опыт с конкретными AI-технологиями (LLM, RAG, корпоративный поиск, ассистенты, knowledge management) заявлен как направление в разработке, а не как реализованные продукты. Профиль B2E (продукты для внутренних сотрудников) представлен слабее, чем внешние B2B/B2G-продукты."}, {"title": "Продакт-лид в AI-центр — Вертикали", "url": "https://www.tbank.ru/career/it/vacancy/moscow/prodakt-lid-v-ai-centr-vertikali/fe1c8031-fddb-4d04-8160-afcd8af6a24b/", "description": "Описание:\nСтроим клиентские AI-продукты, которые заметно улучшают пользовательский опыт и дают измеримый эффект в бизнес-метриках Вертикали.…\n\nОбязанности:\n- Провести ревью AI-портфеля Вертикалей: разобрать качество текущих AI-продуктов и устранить системные узкие места\n- Найти главные проблемы в UX и качестве ответов, понять корневые причины и довести до стабильного улучшения\n- Сделать AI стабильным драйвером метрик Вертикалей\n- Поднять две новые вертикали с нуля: разобраться в бизнес-контексте, запустить и масштабировать через гейты\n- Собрать автономную команду и работающий operating model\n- Выстроить оунершип и процессы так, чтобы команды могли автономно выбирать ставки, запускать решения, измерять эффект и улучшать качество\n\nТребования:\n- Отлично разбираетесь в стратегии и фокусе: умеете формулировать диагноз, выбирать ставки, защищать приоритеты и строить роадмап на данных\n- Готовы держать фокус на ценности и эффекте, умеете приоритизировать задачи и отказываться от лишнего\n- Знаете, как приземлить AI на экономику вертикалей, и умеете находить масштабируемые точки ROI\n- Запускали lean: от MVP и итераций до измеримого результата\n- Умеете договариваться со стейкхолдерами, синхронизировать ожидания и продвигать продукт\n- Способны быстро разобраться в бизнес-контексте\n- Понимаете или готовы быстро погрузиться в LLM-ассистентов и агентов — RAG, tool-use, eval, качество, latency, cost", "date": "2026-07-02", "org": "tbank", "match_percent": 72, "match_fit": "Прямое попадание по роли: Product Lead с опытом стратегии, приоритизации, запуска MVP и масштабирования через гейты, построения operating model и автономных команд. Уже развивает AI-направление и умеет приземлять инициативы на экономику и ROI.", "match_gaps": "Опыт в основном B2B/B2B2C/B2G, а тут клиентские (B2C) AI-продукты. Глубина в LLM-ассистентах и агентах (RAG, tool-use, eval, latency, cost) пока на уровне развивающегося направления и потребует быстрого погружения."}, {"title": "Руководитель ML-продукта в AI-центр", "url": "https://www.tbank.ru/career/it/vacancy/moscow/product-lead-v-ai-centr/fa2ebfba-076d-4392-ad0d-df52968ca3bc/", "description": "Описание:\nЭкосистема Т-Технологий давно вышла за рамки обычных финансов и включает авиабилеты, отели, страховки, одежду и даже самокаты. Мы строим экосистему будущего и считаем, что будущее за новым продуктовым опытом на основе AI. У нас есть все нужные технологии, включая большие языковые модели…\n\nОбязанности:\n- Внедрять гибкие AI-решения. Заменить традиционные методы создания ботов на адаптивных LLM-агентов, которые лучше понимают контекст и формируют эффективные и естественные ответы\n- Работать над персонализированными ответами. Использовать данные о клиенте и контексте его запроса, чтобы бот мог выдавать более точные и «человеческие» решения\n- Разрабатывать подходы к сегментации клиентов. Определять ключевые группы и подбирать для них оптимальные сценарии обслуживания, чтобы повышать удовлетворенность пользователей и экономическую эффективность\n\nТребования:\n- У вас есть опыт управления продуктами и продуктовыми командами\n- Есть опыт успешного запуска новых продуктов и развития существующих\n- Формировали и защищали продуктовую стратегию направления\n- Готовы разбираться в новых технологиях\n- Постоянно следите за трендами в индустрии и готовы применять новые решения\n- Разбираетесь в AI-технологиях или готовы быстро вникнуть в темы. На базовом уровне разбираетесь в RAG, асессорах, точности, полноте, Alignment и других нюансах", "date": "2026-07-02", "org": "tbank", "match_percent": 72, "match_fit": "Наилучшее совпадение: кандидат — Head of Product с опытом управления продуктами и командами, запуска новых продуктов с нуля и развития существующих, формирования и защиты продуктовой стратегии. Развивает AI-направление (автоматизация коммерческих условий и подбора спецпредложений), работает с сегментацией и персонализацией в B2B2C.", "match_gaps": "AI-специфика (RAG, ассессоры, alignment, LLM-агенты) у кандидата на базовом уровне и в стадии освоения, а не в проде. Основной опыт в B2B/B2G-финтехе, а не в массовых пользовательских AI-ассистентах; английский B1 может быть ограничением для работы с трендами."}, {"title": "ML-продакт-лид в команду обслуживания клиентов", "url": "https://www.tbank.ru/career/it/vacancy/moscow/leadmlpm-customerservice/a55fd5ee-c069-406a-a0fc-463a8d1ffcf3/", "description": "Описание:\nКоманда строит платформу клиентского обслуживания, которая превращает поддержку в конкурентное преимущество бизнеса. Наша задача — не просто отвечать на обращения, а системно решать проблемы клиентов, повышать их удовлетворенность, LTV и удержание.…\n\nОбязанности:\n- Формировать и развивать стратегии ML-продуктов в клиентском обслуживании — от видения до роадмапов по всем командам\n- Управлять несколькими продуктовыми командами: продакт-менеджерами, ML, аналитиками, разработчиками. Выстраивать приоритеты, координировать и синхронизировать их работу\n- Ставить задачи на разработку ML-решений: объединять коммуникации в единую проблему клиента, определять статус ее решения, развивать сервис хранения и использования клиентского контекста, строить систему управления воронкой обслуживания и персонализации\n- Формулировать продуктовые и ML-гипотезы с определением метрик успеха из бизнес-задач: CSAT, снижения числа обращений, снижения стоимости обслуживания\n- Контролировать качество продуктов и их влияние на метрики\n- Запускать и масштабировать решения — от прототипа до продакшена\n- Работать с командой обслуживания, бизнесом, сегментами и CX, защищать решения и управлять ожиданиями стейкхолдеров\n- Фокусироваться на улучшении клиентского опыта через персонализацию и снижение усилий клиента\n\nТребования:\n- У вас есть опыт управления группой команд с ML/AI-составляющей в продуктах от 6 лет\n- Запускали A/B-тесты и интерпретировали их результаты\n- Умеете трансформировать бизнес-задачи в ML-решения и влиять на результат\n- Формулируете продуктовые гипотезы и проверяете их с опорой на данные\n- Понимаете теорию ML и данных: знаете общую продуктовую базу, алгоритмы машинного обучения и умеете применять их для решения бизнес-задач\n- Разбираетесь в метриках качества моделей: точности, полноте, F1-score, latency\n- Умеете работать с данными — от подготовки и очистки до фиче-инжиниринга\n- Приоритизируете задачи, можете фокусироваться на главном и управлять роадмапами", "date": "2026-07-02", "org": "tbank", "match_percent": 62, "match_fit": "Отличное совпадение по управленческому профилю: 7 лет Head of Product, руководство 11 командами, формирование стратегии и роадмапов, работа с CX, персонализацией и клиентским опытом, защита решений перед стейкхолдерами. Есть развитие AI-направления и опыт запуска продуктов от прототипа до промышленной эксплуатации.", "match_gaps": "Требуется глубокое понимание теории ML, метрик качества моделей (precision, recall, F1, latency) и фиче-инжиниринга — это hands-on ML-компетенции, которых у кандидата нет. Опыт управления командами именно с ML/AI-составляющей ограничен (AI-направление пока «в разработке»)."}, {"title": "Руководитель аналитики в операционную команду платформы обслуживания", "url": "https://www.tbank.ru/career/it/vacancy/moscow/head-of-analytics-for-the-operations-team-of-the-service-platform/f2d39c79-4338-49f0-8732-ba1adcf1b917/", "description": "Описание:\nУ нас большая команда операционной поддержки, которая состоит из первой и второй линий. Простые обращения решают сотрудники первой линии — мы планируем их нагрузку, работаем с качеством и повышаем эффективность через копилотов. Сложные обращения поступают к сотрудникам второй линии.…\n\nОбязанности:\n- Улучшать качество поддержки и работы сотрудников за счет аналитики, продуктовых решений и AI-инструментов\n- Находить и реализовывать сильные рычаги влияния на качество сервиса и решений сотрудников, эффективность процессов и клиентский опыт\n- Отвечать за результат, к которому приводит аналитика для платформы\n- Выстраивать систему метрик, которая позволяет управлять качеством работы сотрудников и клиентского сервиса\n- Проводить диагностику процессов первой и второй линий поддержки, выявлять корневые причины ошибок, потери качества\n- Развивать и внедрять решения на основе AI там, где они повышают качество работы сотрудников, снижают долю ручных действий и увеличивают производительность без потери качества\n- Приоритизировать инициативы по вкладу в качество сервиса, эффективность поддержки и цели платформы\n- Управлять командами аналитики через руководителей и делать так, чтобы команды приносили измеримый результат для бизнеса\n- Пересобирать команды, роли и зоны ответственности для достижения целей платформы — при необходимости\n- Следить за тем, чтобы решения по процессам, продукту и AI принимались на данных и приводили к улучшению ключевых показателей\n\nТребования:\n- У вас есть подтвержденный опыт достижения измеримого бизнес-результата через аналитику\n- Управляли аналитическими командами и руководителями: отвечали за результат и выполнение плана работ\n- Находили и реализовывали решения по росту качества и эффективности в сложных процессах\n- Принимали решения на основе неполных данных\n- Строили дерево метрик и системы управления по метрикам бизнеса или продукта\n- Внедряли изменения, которые улучшали качество сервиса и решений сотрудников, эффективность процессов или экономику поддержки\n- Умеете переводить цели бизнеса в систему метрик, приоритетов и конкретных действий с понятным эффектом\n- Умеете быстро находить корневые причины проблем и выбирать решения, которые дают лучший результат\n- Знаете SQL на продвинутом уровне\n- Отлично знаете математическую статистику, теорию вероятностей, A/B-тестирование и методы оценки эффекта изменений\n- Готовы влиять на бизнес, продукт, операции и технологии ради достижения общих целей\n- Будет плюсом опыт внедрения AI, ML или автоматизации в рабочие процессы", "date": "2026-07-02", "org": "tbank", "match_percent": 60, "match_fit": "Есть подтверждённый опыт достижения измеримого бизнес-результата, управления кросс-функциональными командами через руководителей, построения деревьев метрик и оптимизации сложных процессов в банке. Data-driven подход и перевод целей бизнеса в метрики и приоритеты — сильная сторона кандидата.", "match_gaps": "Опыт именно в руководстве аналитическими командами и операционной поддержкой (первая/вторая линии) не выражен явно. Продвинутый SQL и глубокая мат.статистика заявлены в навыках, но роль ориентирована на аналитика-руководителя, а не продуктового лидера."}, {"title": "Руководитель направления аналитики метрик качества — Quality & Acceptance Metrics", "url": "https://www.tbank.ru/career/it/vacancy/moscow/head-of-quality-and-acceptance-metrics-analytics/a8aeaed3-5754-45fb-9d8f-0a9809970fb4/", "description": "Описание:\nОдна из самых сложных задач в AI — понять, какую метрику нужно оптимизировать до обучения моделей. Мы ищем руководителя, который поможет с этой задачей и будет управлять командой аналитики платформы обслуживания.…\n\nОбязанности:\n- Выстроить независимое направление метрик качества, которое дает платформе обслуживания единую и объективную систему оценки качества обслуживания\n- Построить общую метрику качества платформы и методологию ее расчета, чтобы по ней можно было принимать управленческие решения\n- Принимать, проверять, валидировать и аудировать подходы к оценке качества, которые строят команды в своих направлениях\n- Обеспечивать сопоставимость метрик качества между командами, каналами, сценариями и направлениями платформы\n- Формировать единые правила оценки качества для всей платформы и организовать оценку AI-решений от качества до масштабирования\n- Разработать методологию сбора клиентской оценки, определить правила интерпретации и понять, как использовать ее в общей метрике качества обслуживания\n- Определить, в каких случаях клиентская оценка отражает качество сервиса, а в каких — влияние бизнеса, процессов, интерфейсов, робота, правил или внешних ограничений\n- Построить систему разложения причин качества, чтобы был понятен источник проблемы\n- Показывать влияние качества на повторные обращения, удержание, стоимость обслуживания, потери и долгосрочную ценность клиента\n- Проверять, как AI-решения влияют на качество сервиса, клиентский опыт и бизнес-результат\n- Следить, чтобы качество не снижалось ради скорости или автоматизации\n- Быть независимым ориентиром по качеству для всей платформы и влиять на решения команд без прямого управления\n- Делать так, чтобы качество становилось управляемой величиной, а не предметом локальных трактовок разных команд\n\nТребования:\n- У вас есть опыт лидерства в аналитике, исследованиях или смежных направлениях, где нужно строить процессы и метрики в условиях неопределенности\n- Способны находить ценность там, где нет готовой методологии, четких границ ответственности и правильного ответа\n- Умеете выстраивать подходы с нуля, проверять их на практике и доводить до работающей системы\n- Знаете, как разложить сложную проблему на составные части и выделить ее глубинные причины\n- Умеете строить метрики, которые можно использовать для принятия решений, знаете, как связывать их с клиентским опытом и экономическим результатом\n- Знаете SQL на продвинутом уровне\n- Отлично знаете математическую статистику, теорию вероятностей и методы оценки эффекта изменений, умеете проверять гипотезы и проводить А/B-тестирования\n- Умеете оценивать влияние изменений и отделять реальные эффекты от случайных колебаний\n- Знаете, как влиять на смежные команды и руководителей, и умеете это делать без опоры на большую команду или прямое управление\n- Будет плюсом опыт внедрения решений с использованием AI или автоматизации", "date": "2026-07-02", "org": "tbank", "match_percent": 58, "match_fit": "Кандидат силён в построении систем и методологий «с нуля» в условиях неопределённости, влиянии на смежные команды без прямого управления и связывании метрик с бизнес-эффектом — это ядро вакансии. Физфак МГУ, навыки SQL, мат.статистики и A/B-тестов формально заявлены.", "match_gaps": "Основной профиль — продуктовое лидерство, а не глубокая аналитика метрик качества; нет подтверждённого опыта руководства именно аналитическими исследованиями. Продвинутый SQL и глубина мат.статистики/теории вероятностей заявлены, но не подтверждены реальными кейсами."}, {"title": "Руководитель аналитики в направление развития процессов обслуживания", "url": "https://www.tbank.ru/career/it/vacancy/moscow/head-analytics-in-the-direction-of-service-process-development/988892d1-1e20-401c-a475-7da95fbb1501/", "description": "Описание:\nНаша команда исследует, создает и непрерывно развивает процессы клиентского обслуживания. Мы ищем руководителя, который будет помогать продуктовым командам улучшать процессы обслуживания.…\n\nОбязанности:\n- Выстраивать общение со стейкхолдерами и самостоятельно погружаться в бизнес-домен\n- Выстраивать процессы по информированию и вовлечению команды в бизнес-домен\n- Первично прорабатывать и оценивать ресурсы при запуске инициатив и больших проектов\n- Адаптировать и дополнять стратегии направления под свою команду, транслировать риски принятой стратегии относительно контекста своей команды\n- Участвовать вместе с бизнесом в построении процесса оценки реализации проектов по ресурсам и срокам\n- Формировать стратегию по поддержанию мотивационного настроя, уменьшению оттока сотрудников на уровне своей команды и вышестоящего подразделения\n- Ставить и контролировать достижение стратегических целей командой\n- Участвовать в найме, адаптировать новых сотрудников, работать с их эффективностью и развитием\n- Выстраивать процесс поставки ценностей своей командой, контролировать сроки, прозрачность и удовлетворенность для стейкхолдеров\n- Продвигать data-driven-культуру, чтобы на уровне команды решения принимались на данных\n\nТребования:\n- У вас есть опыт реализации изменений в бизнесе и управления ими в условиях высокой доли неопределенности\n- Знаете SQL на продвинутом уровне\n- Отлично разбираетесь в математической статистике и теории вероятностей, умеете проводить А/B-тесты, знаете статистические методы и критерии\n- Умеете разрабатывать стратегию выбора целевых метрик бизнеса или продукта, декомпозировать и строить дерево метрик\n- Знаете и применяете в работе инструменты управления: делегирование, целеполагание, мотивацию, встречи one-to-one и так далее\n- Совершенствуете инструменты управления, которые используете", "date": "2026-07-02", "org": "tbank", "match_percent": 58, "match_fit": "Отличное совпадение по управленческой и трансформационной части: реализация изменений в высокой неопределённости, стейкхолдер-менеджмент, построение процессов, мотивация и снижение оттока, data-driven культура, целеполагание и one-to-one. Есть опыт декомпозиции метрик и погружения в бизнес-домен.", "match_gaps": "Требуется продвинутый SQL и глубокая математическая статистика с A/B-тестами и статкритериями на практике — у кандидата это на уровне навыков, а не ежедневной аналитической работы. Профиль скорее продуктовый руководитель, чем руководитель аналитики."}, {"title": "Руководитель продуктовой аналитики платформ Human Capital", "url": "https://www.tbank.ru/career/it/vacancy/moscow/Head of Product Analytics for Human Capital Platforms/87eb1346-2831-4c03-9ac9-6c6f74b98b8f/", "description": "(не удалось получить описание)", "date": "2026-07-02", "org": "tbank", "match_percent": 52, "match_fit": "Название соответствует профилю продуктового руководителя с сильной data-driven аналитикой, опытом построения метрик и управления командами. Кандидат умеет выстраивать продуктовую аналитику и связывать её с бизнес-результатом.", "match_gaps": "Описание вакансии недоступно, поэтому оценка ориентировочная. Домен Human Capital (HR-платформы) вне прямого опыта кандидата, сфокусированного на финтехе B2B/B2G."}, {"title": "Лид продуктовой аналитики в команду B2B Кредиты", "url": "https://www.tbank.ru/career/it/vacancy/moscow/teamlead-produktovoj-analitiki/279c1ea4-a276-4bae-a23b-88498edd1e22/", "description": "Описание:\nМы развиваем платформу взыскания для кредитных продуктов Т-Бизнеса и помогаем управлять клиентскими обязательствами по кредитам.…\n\nОбязанности:\n- Развивать команду аналитиков: участвовать в найме, адаптации, развитии сотрудников и формировании сильной аналитической культуры\n- Выстраивать взаимодействие со стейкхолдерами, погружаться в бизнес-домен и помогать команде понимать продуктовый контекст\n- Участвовать в запуске новых инициатив и крупных проектов: оценивать ресурсы, сроки и потенциальный эффект\n- Формировать и развивать аналитическую стратегию направления вместе с продуктом, подсвечивать риски и точки роста\n- Выстраивать процессы поставки аналитических решений, обеспечивать прозрачность работы команды и выполнение стратегических целей\n- Продвигать data-driven подход и помогать продуктовым командам принимать решения на основе данных\n\nТребования:\n- У вас есть уверенные знания SQL и опыт работы с большими объёмами данных\n- Хорошо разбираетесь в математической статистике, теории вероятностей и A/B-тестировании\n- У вас есть опыт управления командой: постановка целей, делегирование задач, развитие сотрудников и регулярная обратная связь\n- Умеете выстраивать эффективные процессы внутри команды и улучшать существующие подходы к управлению\n- Есть опыт запуска изменений и достижения результата в условиях неопределённости и меняющихся вводных\n- Умеете определять ключевые метрики бизнеса или продукта, строить дерево метрик и использовать его для принятия решений", "date": "2026-07-02", "org": "tbank", "match_percent": 50, "match_fit": "Есть прямой опыт в B2B-кредитовании и обязательствах (мониторинг ковенант, индивидуальные условия), навыки SQL, математической статистики (физфак МГУ), управление командами и работа в условиях неопределённости. Умеет строить дерево метрик и запускать изменения.", "match_gaps": "Роль ориентирована на руководство именно аналитической командой, тогда как кандидат — продуктовый лид; нет подтверждённого опыта построения процессов поставки аналитических решений и работы с большими объёмами данных как аналитик. Платформа взыскания (collection) не входит в его профиль."}, {"title": "Руководитель аналитики X-Sell-сервисов Шопинга", "url": "https://www.tbank.ru/career/it/vacancy/moscow/head-of-analytics-at-x-sell-shopping-services/e7a5df09-013c-4ec5-bbf3-927919e4f6c1/", "description": "Описание:\nМы команда X-Sell-аналитики Шопинга — экосистемы сервисов для покупок и развлечений, которые помогают пользователям покупать товары и услуги, бронировать авиабилеты и отели, заказывать доставку продуктов и многое другое.…\n\nОбязанности:\n- Формировать и реализовывать аналитическую стратегию X-Sell, развивать направление как управляемый growth-канал\n- Управлять лидами и командами аналитиков: структурой, развитием, наймом, приоритизацией и качеством решений\n- Развивать систему метрик и мониторинга: управлять воронками, искать точки роста в конверсии, выручке и LTV\n- Оценивать эффективность X-Sell: инкрементальность, ROI и долгосрочный эффект кампаний\n- Развивать A/B-тестирование и подходы к принятию решений на основе данных\n- Внедрять автоматизацию, AI и ML для ускорения запусков и масштабирования решений: LLM, персонализацию, триггеры\n- Кросс-функционально работать с маркетингом, продуктом и ML-командами, транслировать, как аналитика влияет на бизнес-результат\n\nТребования:\n- У вас есть опыт в роли руководителя или лидера аналитики, управляли лидами и командами из 10+ человек\n- Есть опыт построения и масштабирования аналитической функции: процессов, стандартов, ролей, развития команды\n- Выстраивали работу со стейкхолдерами: работали с маркетингом, продуктом, разработкой и топ-менеджментом\n- Отлично понимаете продуктовые и маркетинговые метрики: LTV, ROMI, юнит-экономика. Умеете связывать аналитику с бизнес-результатом\n- Глубоко понимаете A/B-тестирование и causal-подходы на уровне дизайна и интерпретации:uplift, инкрементальность\n- Понимаете качественную SQL- или Python-аналитику — способны оценивать корректность решений\n- Умеете мыслить с точки зрения продукта и бизнеса, превращать аналитику в решения, приоритеты и деньги\n- Умеете объяснять сложное простым языком и управлять ожиданиями\n- Будет плюсом опыт в маркетинговой, CRM или X-Sell-аналитике, работали с ML или AI: персонализацией, рекомендациями, uplift-моделями", "date": "2026-07-02", "org": "tbank", "match_percent": 50, "match_fit": "Хорошее совпадение по лидерству и бизнес-мышлению: управление 11 командами (34 в прямом подчинении), масштабирование продукта и процессов, работа со стейкхолдерами, unit-экономика, pricing, портфельный анализ, LTV, превращение аналитики в решения и деньги, развитие AI/ML-направления. Умеет объяснять сложное и управлять ожиданиями.", "match_gaps": "Роль — именно руководитель аналитической функции (управление лидами аналитиков, построение аналитических процессов и стандартов), тогда как кандидат управлял продуктовыми, а не аналитическими командами. Нет опыта в маркетинговой/CRM/X-Sell-аналитике, uplift-моделях и causal-подходах на hands-on уровне; домен шопинга/ритейла не его."}, {"title": "Руководитель продуктовой аналитики — Compliance", "url": "https://www.tbank.ru/career/it/vacancy/moscow/rukovoditel-produktovoj-analitiki-compliance/5562ff30-87d3-4213-b69f-5a6d17d301f1/", "description": "Описание:\nCompliance — корпоративная функция, формирующая культуру и практику работы с рисками в компании.…\n\nОбязанности:\n- Руководить командой аналитики комплаенса: участвовать в найме и развивать сотрудников\n- Формировать и реализовывать стратегическое видение аналитики в комплаенсе\n- Выстраивать процессы аналитики для нескольких команд с разными доменами\n- Систематизировать проведение исследований и доставку аналитических решений до внутренних заказчиков\n- Развивать культуру принятия решений на основе данных\n- Повышать качество комплаенс‑продуктов с помощью аналитики\n- Поддерживать топ‑менеджмент в определении контекста и принятии решений на основе данных\n\nТребования:\n- У вас есть опыт управления аналитической командой 15+ человек от 3 лет\n- У вас есть опыт работы с рисками: кредитными, фрод‑рисками, комплаенсом или информационной безопасностью\n- Имеете опыт построения аналитической инфраструктуры,  понимаете принципы работы хранилищ данных\n- У вас есть опыт применения методов машинного обучения\n- Умеете управлять командой и развивать сотрудников до уровня старших специалистов и руководителей\n- Умеете работать с SQL и Python\n- Разбираетесь в BI‑инструментах и принципах построения отчетности\n- Понимаете виды метрик и принципы их выбора, имеете опыт построения иерархии метрик\n- Умеете визуализировать данные и объяснять результаты сложных исследований понятным языком, в том числе для топ‑менеджмента\n- Умеете связывать аналитические выводы и числовые показатели с влиянием на бизнес", "date": "2026-07-02", "org": "tbank", "match_percent": 48, "match_fit": "Есть релевантный опыт в комплаенс- и риск-среде (антифрод, ковенанты, регуляторика, курс Compliance), навыки SQL/Python и управление большими кросс-функциональными командами. Понимает связь метрик с бизнес-результатом и работу с топ-стейкхолдерами.", "match_gaps": "Кандидат — продуктовый руководитель, а не лид аналитики; нет подтверждённого опыта именно управления аналитической командой 15+ человек и построения аналитической инфраструктуры/хранилищ данных. Практический опыт применения ML ограничен (курировал, но не строил модели лично)."}, {"title": "Лид продуктовой аналитики в команду налично-денежного обращения", "url": "https://www.tbank.ru/career/it/vacancy/moscow/analytics-team-lead-for-cash-management-team/d1adb3bd-26ad-42b2-be2d-fd7deb7553df/", "description": "Описание:\nКоманда НДО управляет сетью из более чем 11 тысяч банкоматов по всей России. Мы отвечаем за доступность наличных, удобство интерфейсов, жизненный цикл устройств и инновационные сервисы: обмен валюты в банкоматах, доставку наличных, хранение ценностей и инвестиционное золото.…\n\nОбязанности:\n- Продумывать и внедрять продуктовые метрики: собирать, анализировать, визуализировать и интерпретировать данные\n- Формулировать гипотезы и проверять их с помощью A/B-тестов: настраивать эксперименты, собирать данные, проводить статистическую проверку, готовить выводы для продукта и руководства\n- Давать рекомендации по оптимизации текущих процессов и искать точки роста\n- Плотно общаться с бизнесом и погружаться в процессы: участвовать в планировании новых функций, изучать потребности клиентов\n- Анализировать влияние изменений на уровне продукта, метрик клиента и компании\n\nТребования:\n- У вас есть опыт работы продуктовым аналитиком от 3 лет\n- Работали с инструментами визуализации — Proteus, Tableau или Power BI\n- Уверенно владеете SQL: сложные запросы, оконные функции, работа с большими объемами данных и оптимизация\n- Владеете Python, знаете библиотеки для работы с данными — pandas, matplotlib, numpy и другие\n- Знаете Excel на продвинутом уровне: сводные таблицы, формулы и анализ данных\n- Разбираетесь в математической статистике и теории вероятностей, проводили A/B-тесты, использовали в работе статистические методы и критерии\n- Понимаете ключевые продуктовые и клиентские метрики\n- Умеете самостоятельно доводить до конца поставленные задачи\n- Структурно и системно мыслите, способны видеть, как решения влияют на бизнес", "date": "2026-07-02", "org": "tbank", "match_percent": 48, "match_fit": "Кандидат понимает продуктовые и клиентские метрики, знает A/B-тесты и мат.статистику, имеет банковский опыт и системное мышление с фокусом на влияние решений на бизнес. Физическое образование МГУ подкрепляет статистическую базу.", "match_gaps": "Роль хендс-он аналитика с продвинутым SQL, Python (pandas/numpy), Tableau/Power BI и Excel на глубоком уровне — кандидат руководитель продукта, а не практикующий аналитик, и эти инструменты у него на декларативном уровне. По грейду скорее переквалифицирован для позиции лида-исполнителя."}, {"title": "Лид аналитики в направление этического комплаенса", "url": "https://www.tbank.ru/career/it/vacancy/moscow/leading-analytics-in-the-area-of-ethical-compliance/470ff560-3ea1-48c2-b85b-987c4c814dd7/", "description": "Описание:\nМы команда этического и антикоррупционного комплаенса. Работаем на стыке рисков, аналитики, продукта и ИТ: помогаем бизнесу принимать взвешенные решения, снижать системные риски и выстраивать устойчивые процессы.…\n\nОбязанности:\n- Руководить командой аналитиков: развивать, формировать стандарты, следить за качеством\n- Формировать аналитическую базу — от гипотез и моделей до управленческих выводов\n- Делать аналитику инструментом принятия решений, а не витриной отчетов\n- Обеспечивать расчет и интерпретацию рисков, в том числе в деньгах\n- Помогать продукту и бизнесу проверять гипотезы и решения\n- Интегрировать аналитику в продукт: СУР, автоматизацию, AI-инициативы\n- Интегрировать команду в аналитическое комьюнити компании\n\nТребования:\n- У вас есть опыт управления аналитиками или аналитической функцией\n- Есть сильный аналитический бэкграунд в дата-, риск- или бизнес-аналитике\n- Умеете формулировать сложные выводы простым языком для бизнеса и топ-менеджмента\n- Умеете выстраивать стандарты, процессы и развивать сотрудников\n- Критически мыслите и готовы спорить ради качества решений\n- Умеете держать баланс между глубиной, скоростью и бизнес-ценностью\n- Не боитесь брать ответственность и готовы формировать направление с нуля\n- Видите аналитику как профессию и систему, а не набор задач\n- Хотите стать лидером аналитического опыта\n- Будет плюсом опыт работы с продуктом, ИТ и кросс-функциональными командами", "date": "2026-07-02", "org": "tbank", "match_percent": 48, "match_fit": "Сильная сторона — опыт в регуляторной среде, риск-менеджмент, комплаенс-курс, работа с B2G и построение направлений с нуля, синхронизация стейкхолдеров и интеграция аналитики/AI в продукт. Умеет доносить сложные выводы бизнесу и топам.", "match_gaps": "Вакансия про руководство именно аналитической функцией с сильным дата/риск-аналитическим бэкграундом. У кандидата продуктовый, а не аналитический профиль руководства; прямого опыта управления командой аналитиков нет."}, {"title": "Руководитель аналитики направления «MLизация»", "url": "https://www.tbank.ru/career/it/vacancy/moscow/head-of-analytics-mlization/148eeb71-27cf-4a69-9e9e-4603df785d4c/", "description": "Описание:\nMLизация — направление, которое внедряет технологии машинного обучения и искусственного интеллекта во все бизнес-линии Т-Банка. Наша миссия — повышать эффективность бизнеса и улучшать клиентский опыт с помощью ML и AI-решений.…\n\nОбязанности:\n- Управлять тремя командами аналитиков: Custom ML, ML-платформы, HQ Copilots\n- Проводить аудит текущего состояния аналитических команд, реорганизовать их при необходимости и сформировать целевую структуру\n- Участвовать в найме ключевых сотрудников направления\n- Построить функцию оценки экономического эффекта от внедрения ML и AI в AI-центре и Т-Банке\n- Разработать методологию оценки влияния копилотных решений на эффективность работы сотрудников\n- Развивать экспертность в оценке качества ML-моделей: разрабатывать метрики качества продуктов, строить evaluations, работать с краудсорс-разметкой\n- Организовать системный процесс data discovery для улучшения моделей: генерация фич, подбор таргетов, новые источники данных\n- Искать новые точки внедрения ML в бизнес-процессы компании\n- Оценивать и приоритизировать ML-бэклог\n\nТребования:\n- У вас есть опыт работы в аналитике от 3 лет и опыт управления командой аналитиков от года\n- Проводили A/B-тесты и анализировали результаты\n- Умеете выстраивать процессы и руководить командой\n- Критически и структурно мыслите\n- Отлично разбираетесь в статистике: гипотезы, критерии, эксперименты\n- Умеете визуализировать данные в дашбордах и BI-системах\n- Отлично знаете SQL и принципы работы с реляционными БД\n- Умеете проводить пред- и постанализ инициатив и оценивать их влияние на ключевые метрики\n- Готовы самостоятельно выстраивать работу: ставить цели, планировать действия и доводить проекты до завершения\n- Будет плюсом опыт работы с аналитикой ML-продуктов", "date": "2026-07-02", "org": "tbank", "match_percent": 48, "match_fit": "Хорошо ложится управленческая часть: руководство несколькими командами, аудит и реорганизация структуры, найм ключевых сотрудников, построение функции оценки экономического эффекта (у кандидата эффекты в 1 млрд+ руб.) и приоритизация бэклога. Развивает AI-направление в Сбере.", "match_gaps": "Требуется опыт в аналитике от года и управления аналитиками, отличное знание SQL, BI-дашбордов, статистики и A/B-тестов, аналитика ML-продуктов — это глубже, чем текущие навыки. Кандидат — продуктовый руководитель, а не руководитель аналитической функции."}, {"title": "Лид продуктовой аналитики в команду сквозной аналитики — Платформа обслуживания", "url": "https://www.tbank.ru/career/it/vacancy/moscow/analytics-team-lead-for-end-to-end-analytics-team-service-platform/9b3a8920-9b2d-459a-9f24-5efaccd0ee6d/", "description": "Описание:\nКоманда сквозной аналитики Платформы обслуживания превращает поддержку из операционной функции в управляемую систему — с прозрачной экономикой и измеримым влиянием на бизнес.…\n\nОбязанности:\n- Выстраивать общение со стейкхолдерами и самостоятельно погружаться в бизнес-домен\n- Оценивать ресурсы при запуске инициатив и больших проектов\n- Адаптировать стратегию под свою команду и доносить риски с учетом контекста\n- Вместе с бизнесом участвовать в оценке проектов по срокам и ресурсам\n- Ставить, контролировать и отвечать за достижение стратегических целей командой\n- Участвовать в найме, адаптировать новых сотрудников, повышать качество работы сотрудников, работать с их мотивацией и развитием\n- Выстраивать процесс поставки ценностей, контролировать сроки и прозрачность работы для стейкхолдеров\n- Развивать data-driven-подход в продуктовой команде\n\nТребования:\n- Знаете SQL на продвинутом уровне\n- Отлично разбираетесь в математической статистике и теории вероятностей, работали с А/B-тестами, знаете разные статистические методы и критерии\n- Реализовывали изменения в бизнесе и управляли ими в условиях высокой доли неопределенности — адаптировались и создавали win-win-решения\n- Используете в работе инструменты управления: делегирование, целеполагание, мотивация, встречи one-to-one\n- Умеете выбирать продуктовые и бизнес-метрики, декомпозировать их и строить дерево метрик", "date": "2026-07-02", "org": "tbank", "match_percent": 46, "match_fit": "Сильное совпадение по управленческой части: работа со стейкхолдерами, погружение в бизнес-домен, оценка ресурсов и рисков проектов, целеполагание, делегирование, 1-2-1, реализация изменений в условиях неопределённости и построение win-win решений, декомпозиция метрик и дерево метрик, data-driven подход.", "match_gaps": "Требуется продвинутый hands-on SQL и глубокое владение матстатистикой и A/B-тестами на уровне практика — у кандидата эти навыки заявлены, но не подтверждены как экспертные. Роль ориентирована на лида продуктовой аналитики, а не на продуктового Head of Product."}, {"title": "Руководитель группы LLM-агента поддержки", "url": "https://www.tbank.ru/career/it/vacancy/moscow/IT Team Lead/3d187fff-433e-4533-8840-970d220c4ca9/", "description": "(не удалось получить описание)", "date": "2026-07-02", "org": "tbank", "match_percent": 45, "match_fit": "Кандидат развивает AI-направление в текущем продукте (автоформирование условий, подбор спецпредложений) и имеет опыт руководства командами в поддержку-ориентированных сервисах (Госзапросы, обслуживание ЮЛ). Управленческие компетенции и работа со стейкхолдерами релевантны роли руководителя группы.", "match_gaps": "Описание вакансии недоступно, оценка приблизительная. Нет явного опыта именно с LLM-агентами и поддержкой на базе LLM; AI-опыт заявлен как «в разработке», без глубокой ML/LLM-экспертизы."}, {"title": "Руководитель направления аналитики", "url": "https://www.tbank.ru/career/it/vacancy/moscow/rukovoditel-napravleniya-analitiki/133dc822-d103-4251-9ae4-2c7bbbec0b83/", "description": "Описание:\nAI‑центр — это команда из 1200+ специалистов, создающих технологии и продукты на основе AI и внедряющих их во все направления Т‑Банка. Наша цель — делать решения качественнее, безопаснее и удобнее для миллионов пользователей.…\n\nОбязанности:\n- Руководить направлением аналитики численностью около 50 человек: управлять лидами и командами, формировать структуру, развивать сотрудников, участвовать в найме, определять приоритеты и контролировать качество решений\n- Выстраивать операционную модель работы функции: определять правила приоритизации, распределять ресурсы, задавать стандарты качества\n- Строить взаимодействие со стейкхолдерами и погружаться в бизнес-домен\n- Организовывать процессы информирования и вовлечения команды в бизнес-контекст\n- Проводить первичную оценку инициатив и крупных проектов: определять объем работ и потребность в ресурсах\n- Адаптировать стратегию направления под задачи команды, обозначать риски её реализации с учётом контекста\n- Участвовать совместно с бизнесом в оценке проектов по срокам и ресурсам\n- Ставить стратегические цели команде, контролировать их выполнение и достижение результатов\n- Выстраивать процесс поставки ценности командой: контролировать сроки, прозрачность работы и удовлетворённость стейкхолдеров\n- Развивать культуру принятия решений на основе данных в продуктовых командах\n- Работать с аналитическими и управленческими инструментами для анализа данных, визуализации, планирования и контроля процессов\n\nТребования:\n- У вас есть опыт работы в продуктовой аналитике от 6 лет, из них не менее 3 лет в роли Head of Analytics с командами от 30 человек\n- У вас есть опыт построения и развития аналитики в сложных продуктах или платформах\n- У вас есть опыт внедрения и развития продуктов с применением технологий искусственного интеллекта\n- Знаете продуктовые метрики, A/B‑тестирование, экспериментальные, причинно-следственные и доказательные подходы к принятию решений\n- Умеете разрабатывать аналитическую стратегию и масштабировать ее на крупные команды\n- Умеете работать с SQL и Python, понимаете подходы анализа данных, анализа данных с элементами машинного обучения и построения моделей\n- Умеете развивать руководителей и усиливать команды через наставничество и делегирование\n- Понимаете принципы построения процессов с нуля и принятия решений в условиях неопределённости\n- Умеете сочетать стратегическое видение с операционным управлением", "date": "2026-07-02", "org": "tbank", "match_percent": 42, "match_fit": "Кандидат обладает опытом управления крупными командами (34 в прямом подчинении, 11 команд), внедрения AI-технологий, стратегическим и операционным управлением, SQL/Python и data-driven культурой. Умеет строить процессы с нуля и работать в неопределённости.", "match_gaps": "Требуется 3+ года именно в роли Head of Analytics с командами 30+ и 6+ лет в продуктовой аналитике, а кандидат — Head of Product, а не руководитель аналитики. Нет подтверждённого опыта разработки и масштабирования аналитической стратегии на крупные аналитические команды."}, {"title": "Руководитель продуктовой аналитики в Автокредитование", "url": "https://www.tbank.ru/career/it/vacancy/moscow/head-of-product-analytics-at-auto-loans/4499f18d-c61f-4cda-a89a-6f0404283948/", "description": "Описание:\nТ-Банк — один из лидеров рынка автокредитования. После слияния с Росбанком в 2025 году мы многократно увеличили свой потенциал: масштаб данных, партнерств и бизнес-возможностей. Теперь мы создаем не просто продукт, а новый рынок.…\n\nОбязанности:\n- Нести ответственность за продуктовую аналитику автокредитования\n- Проводить аналитические исследования и проверять гипотезы под ключ — от идеи до бизнес-эффекта\n- Развивать эксперименты, A/B-тесты и data-driven-подход к принятию решений\n- Управлять и развивать домены данных: качество, полноту, доступность, доверие\n- Развивать discovery-подход в команде\n- Формировать и реализовывать стратегию развития аналитической функции\n- Брейнштормить идеи вместе с продактами и запускать их в продакшен\n- Формировать стандарты рынка в автокредитовании и автоэкосистемах\n- Общаться с другими продуктовыми командами внутри экосистемы\n- Обмениваться лучшими практиками, масштабировать успешные подходы, привносить новые идеи в команду\n\nТребования:\n- У вас есть опыт управления аналитической командой от 3 лет, в том числе командой из 15+ человек\n- Умеете выбирать и формировать целевые метрики продукта и бизнеса\n- Умеете декомпозировать и строить дерево метрик\n- Отлично знаете статистику, есть опыт проведения A/B-экспериментов\n- Понимаете основы ML и как применять модели в продукте\n- Умеете превращать идеи в проверенные гипотезы и масштабируемые решения\n- Умеете договариваться, способны общаться с бизнесом, рисками и финансами на одном языке\n- Продуктовое мыслите, держите фокус на результате\n- Умеете развивать людей и команды\n- Готовы быть полноценным партнером для продакт-менеджеров, брать ответственность и влиять на стратегию", "date": "2026-07-02", "org": "tbank", "match_percent": 42, "match_fit": "Кандидат управляет крупными командами (34 в прямом подчинении, 11 команд), сильно продуктово мыслит, умеет договариваться с бизнесом, рисками и финансами, превращать идеи в масштабируемые решения. Опыт в банковском финтехе релевантен.", "match_gaps": "Нужен опыт управления именно аналитической командой от 3 лет, включая 15+ аналитиков, с экспертизой в статистике, A/B и построении дерева метрик. У кандидата продуктовый профиль руководства, а не руководство аналитической функцией."}, {"title": "Лид продуктовой аналитики в экосистемный онбординг", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lead-product-analytics-in-ecosystem-onboarding/c927f517-3b81-484d-b277-34e98a7dbde0/", "description": "Описание:\nКоманда экосистемного онбординга отвечает за активацию новых клиентов-физлиц в разных продуктах Т-Банка: от дебетовых и кредитных карт до накопительного счета, кредита наличными и других.…\n\nОбязанности:\n- Управлять командой продуктовой аналитики: участвовать в найме, развивать и мотивировать сотрудников\n- Активно участвовать в формировании долгосрочных планов направления, выстраивать аналитическую стратегию, которая будет поддерживать продуктовые процессы\n- Погружаться в текущие продуктовые процессы, челленджить идеи, искать новые точки роста\n- Внедрять best-practice в рутинную работу аналитиков для повышения эффективности\n\nТребования:\n- У вас есть опыт работы продуктовым аналитиком от двух лет\n- Есть опыт в роли руководителя команды или ментора младших коллег от года\n- Уверенно знаете статистику и умеете проверять гипотезы\n- Будет плюсом практический опыт с ML", "date": "2026-07-02", "org": "tbank", "match_percent": 42, "match_fit": "Сильный управленческий опыт: руководство кросс-функциональными командами, найм, развитие и мотивация сотрудников, формирование стратегии направления. Хорошая база в статистике (физфак МГУ, математическая статистика) и продуктовых процессах, умение челленджить идеи и искать точки роста.", "match_gaps": "Роль требует именно продуктового аналитика от 2 лет, а кандидат — продуктовый руководитель, а не hands-on аналитик. Нет опыта работы в позиции аналитика и практики с ML, знание SQL заявлено, но без глубины продвинутого уровня."}, {"title": "Лид продуктовой аналитики в команду внутренних корпоративных сервисов", "url": "https://www.tbank.ru/career/it/vacancy/moscow/analytics-team-lead-for-internal-corporate-services-team/6312ecf6-7325-4fbd-af45-6d1082b1a1d9/", "description": "Описание:\nМы команда, которая развивает внутренние корпоративные сервисы: мессенджер, интерактивную доску, трекер задач и другие инструменты. Ими уже пользуются более 50 тысяч сотрудников, а потенциал внутри компании — около 150 тысяч MAU.…\n\nОбязанности:\n- Определять стратегию развития аналитики: ставить цели, формировать роадмап задач, планировать загрузку команды, следить за бэклогом, общаться со стейкхолдерами\n- Проводить продуктовые исследования и формировать продуктовые гипотезы по улучшению продукта\n- Улучшать отчетность и мониторинг качества продукта\n- Планировать наем, проводить собеседования, погружать новых сотрудников в процессы и продукт\n- Развивать сотрудников: помогать в решении проблем и достижении карьерных целей, вместе составлять и вести планы развития, подводить итоги на ревью\n- Поддерживать и развивать культуру экспериментов\n\nТребования:\n- У вас есть опыт в продуктовой аналитике от 3 лет, в том числе больше года — в роли тимлида\n- Проводили A/B-эксперименты и исследования пользовательских продуктов\n- Отлично знаете Python и SQL\n- Разбираетесь в ETL-процессах", "date": "2026-07-02", "org": "tbank", "match_percent": 40, "match_fit": "Кандидат — data-driven продукт с опытом A/B-тестов, SQL, Python и продуктовых исследований, умеет формировать стратегию, роадмап и работать со стейкхолдерами. Есть опыт найма и развития команд.", "match_gaps": "Требуется опыт именно в продуктовой аналитике от 3 лет и от года тимлидом аналитиков, отличное владение Python/SQL и понимание ETL. Кандидат — продуктовый руководитель, а не аналитик; глубина хардовых аналитических навыков не подтверждена."}, {"title": "Лид продуктовой аналитики в команду роста Mass сегмента", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lid-produktovoj-analitiki-v-komandu-rosta-mass-segmenta/391ffb70-7464-4732-ae7e-0768959121a7/", "description": "Описание:\nКоманда аналитики роста массового сегмента отвечает за развитие продуктов для физических лиц и помогает находить точки роста для всей экосистемы Т-Банка.…\n\nОбязанности:\n- Развивать команду продуктовых аналитиков: организовывать работу, развивать экспертизу и поддерживать профессиональный рост сотрудников\n- Выстраивать партнерские отношения с Growth-менеджерами и бизнес-командами, искать новые точки роста и оценивать риски\n- Проводить сложные кросс-командные исследования с использованием A/B-тестирования, ML-подходов и эконометрики\n- Формировать понятную для бизнеса систему отчетности и развивать подходы к работе с ad-hoc-запросами\n- Помогать продуктовым командам принимать решения на основе данных и аналитических исследований\n- Развивать аналитические процессы и повышать качество продуктовой аналитики в направлении\n\nТребования:\n- У вас есть опыт руководства командой продуктовой аналитики от 3 человек в финтехе, банке или scale-up компании\n- Разбираетесь в продуктовой аналитике: воронках, продуктовых метриках, LTV и когортном анализе\n- Уверенно работаете с SQL и инструментами визуализации данных: Tableau, Power BI, Superset или аналогичными\n- У вас есть опыт работы с B2B-продуктами, кредитованием и финансовыми метриками\n- Вдохновляете команду, ставите понятные цели и развиваете сотрудников через регулярную обратную связь\n- Мыслите стратегически и умеете видеть взаимосвязь между аналитикой, продуктом и бизнесом\n- Выстраиваете эффективную коммуникацию с заинтересованными сторонами и понятно презентуете свои решения", "date": "2026-07-02", "org": "tbank", "match_percent": 38, "match_fit": "Сильный продуктовый бэкграунд в финтехе, data-driven подход, A/B-тесты, управление командами и работа со стейкхолдерами. Понимает продуктовые метрики и точки роста.", "match_gaps": "Требуется именно руководство командой продуктовой аналитики, а опыт кандидата — продуктовое, а не аналитическое лидерство. Сегмент Mass (B2C, физлица) не является его профилем — весь опыт в B2B/B2B2C/B2G; нет явного опыта с Tableau/Power BI, LTV и когортным анализом."}, {"title": "Лид BI-аналитиков", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lid-bi-analitikov/d11c14c5-9b54-4b4b-8694-5ca187abdddd/", "description": "Описание:\nИщем BI‑лида, который возглавит команду аналитики и выстроит системную работу с данными.…\n\nОбязанности:\n- Управлять командой BI-аналитиков: постановка целей, планирование и приоритизация задач, развитие сотрудников, регулярная обратная связь\n- Выстраивать эффективное взаимодействие с продуктовыми командами и бизнес-стейкхолдерами: помогать формулировать запросы, переводить бизнес-задачи в аналитические решения\n- Формировать и поддерживать рабочие процессы BI: от запроса и дизайна дашбордов до поддержки и развития существующих решений\n- Отвечать за качество аналитических продуктов: корректность метрик, понятность логики, читаемость и визуальное качество дашбордов\n- Участвовать в сложных и ключевых аналитических задачах (hands-on): дизайн метрик, структура отчетов, ревью решений команды\n- Развивать BI-направление внутри платформы: подходы к визуализации, лучшие практики, стандарты и гайдлайны\n- Работать с аналитической платформой Proteus (Apache Superset) и участвовать в ее развитии совместно с техническими командами\n\nТребования:\n- У вас есть опыт работы в BI или аналитике данных\n- Имеете опыт управления командой аналитиков\n- Имеете опыт построения метрик, подготовки аналитических отчетов и дашбордов для бизнеса\n- У вас естьпрактический опыт работы с BI‑инструментами: Apache Superset, Proteus или аналогами\n- У вас есть опыт взаимодействия с продуктовыми командами и бизнес‑стейкхолдерами\n- Понимаете принципы визуализации данных и умеете готовить отчеты, которые используются для принятия решений\n- Умеете совмещать управленческую роль с самостоятельной аналитической работой", "date": "2026-07-02", "org": "tbank", "match_percent": 38, "match_fit": "Сильный управленческий опыт: руководство кросс-функциональными командами, взаимодействие с продуктовыми командами и бизнес-стейкхолдерами, перевод бизнес-задач в решения — всё это релевантно роли лида. Есть навыки работы с данными и dashboard-культурой (внедрял дашборды в проектах).", "match_gaps": "Кандидат — продуктовый руководитель, а не BI-аналитик: нет практического опыта с Apache Superset/Proteus и hands-on построения дашбордов и метрик в BI-инструментах. Нет опыта именно управления командой аналитиков и hands-on аналитической работы, которую требует вакансия."}, {"title": "Лид продуктовой аналитики в команду аналитики привлечения", "url": "https://www.tbank.ru/career/it/vacancy/moscow/analytics-lead-for-acquisition-analytics-team/7bfb3c64-9ce5-499b-8c43-cd3bfdfd5bdc/", "description": "Описание:\nКоманда аналитики привлечения находит новых клиентов и помогает текущим получать лучший опыт обслуживания в экосистеме.…\n\nОбязанности:\n- Вместе с продуктовой и операционной командами выдвигать гипотезы для роста бизнес-метрик и оценивать их изменение в деньгах\n- Искать точки роста через проведение исследований и A/B-тестов\n- Координировать построение отчетов в ApacheSuperset для оперативного мониторинга ключевых продуктовых и операционных метрик\n- Работать с мотивацией сотрудников, проводить 1-2-1 и выстраивать индивидуальные планы развития аналитиков\n\nТребования:\n- У вас есть опыт работы лидом продуктовых аналитиков от года\n- Разрабатывали дизайн и проводили A/B-тесты\n- Проводили аналитические исследования по изменению продуктовых метрик\n- Проверяли гипотезы на ретроспективных данных\n- Разбираетесь в математической статистике и теории вероятностей\n- Глубоко разбираетесь в SQL, массивах данных и Python\n- Умеете визуализировать данные и строить отчеты в Tableau, PowerBI или ApacheSuperset", "date": "2026-07-02", "org": "tbank", "match_percent": 35, "match_fit": "Есть выдвижение гипотез для роста бизнес-метрик, оценка эффекта в деньгах, работа с мотивацией сотрудников (1-2-1, планы развития) и опыт data-driven подхода — это совпадает с управленческой частью роли. В навыках заявлены SQL, Python, A/B-тесты.", "match_gaps": "Нужен опыт именно лидом продуктовых аналитиков и глубокий hands-on: дизайн A/B-тестов, проверка гипотез на ретро-данных, продвинутый SQL/Python, матстатистика. Кандидат — продуктовый руководитель, а не практикующий аналитик, глубина технических навыков не подтверждена."}, {"title": "Руководитель разработки платформы роста Шопинга", "url": "https://www.tbank.ru/career/it/vacancy/moscow/dab8a0d8-f1bc-4aba-9ab3-92bc54a836de/a607f186-8a52-41f6-a224-8f386a8ecf3e/", "description": "Описание:\nНаша команда отвечает за главную страницу Шопинга и развивает ключевые пользовательские сценарии в продукте: точки входа, вовлечение пользователей и механики роста. Мы помогаем клиентам находить лучшие предложения, получать выгоду и взаимодействовать с сервисами Шопинга.…\n\nОбязанности:\n- Развивать платформы и сервисы роста Шопинга\n- Проектировать и развивать бэкенд-архитектуру\n- Обеспечивать масштабируемость и отказоустойчивость сервисов\n- Интегрироваться с платформами офферов, рекомендаций и маркетинга\n- Руководить тремя командами разработки\n- Развивать инженерные процессы и стандарты\n- Формировать сквозные кросс-функциональные команды и выстраивать процессы продуктовой разработки\n- Организовывать совместную работу со смежными подразделениями\n\nТребования:\n- У вас есть опыт управления несколькими командами — суммарно 20+ человек\n- Проектировали сложные системы\n- Руководили продуктовыми командами, умеете выстраивать эффективные delivery-процессы\n- Вели крупные проекты и внедряли изменения\n- Будет плюсом опыт разработки маркетинговых платформ, опыт работы с промомеханиками и скидками, с продуктами e-commerce", "date": "2026-07-02", "org": "tbank", "match_percent": 35, "match_fit": "Кандидат управлял 34 сотрудниками напрямую и 11 командами, вёл крупные проекты и внедрял масштабные изменения, что закрывает требования по управлению 20+ людьми и delivery-процессам.", "match_gaps": "Вакансия про руководителя разработки: проектирование бэкенд-архитектуры, масштабируемость и отказоустойчивость сервисов — это инженерная роль, а кандидат продуктовый лидер без опыта технического руководства разработкой. Опыт e-commerce и промомеханик отсутствует."}, {"title": "Лид аналитики в клиентский опыт Origination", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lead-analytics-in-origination-customer-experience/757df6bb-8d0c-40e7-bac0-974794bd35ee/", "description": "Описание:\nМы команда аналитиков Origination. Origination — это процесс от интереса клиента на форме до утилизации. Мы оптимизируем процесс и постоянно улучшаем опыт, который получают клиенты при оформлении банковских продуктов Т-Банка.…\n\nОбязанности:\n- Управлять командой продуктовой аналитики\n- Улучшать метрики заявочного процесса Origination, в том числе клиентский опыт\n- Участвовать в развитии отчетности направления\n- Взаимодействовать с продуктовыми командами, помогать в выявлении точек роста продуктов и улучшении клиентского опыта\n\nТребования:\n- Опыт работы продуктовым аналитиком от 3 лет\n- Опыт работы руководителем команды от года\n- Обучали и менторили младших коллег — продуктовых аналитиков\n- Ваши хард-скиллы не ниже уровня middle+, включая проведение A/B-тестов и исследований\n- Обладаете критическим мышлением\n- Хотите и умеете взаимодействовать с большой командой заказчиков, отстаивать свою точку зрения и внедрять data-driven-подход в командах\n- Умеете выделять продуктовые метрики и определять взаимосвязи между ними. Хотите не только рассчитывать показатели, но и искать возможности влияния на них", "date": "2026-07-02", "org": "tbank", "match_percent": 35, "match_fit": "Силён в управлении командами, взаимодействии с большим числом заказчиков, отстаивании позиции и внедрении data-driven-подхода. Понимает продуктовые метрики, клиентские пути (CJM) и оптимизацию процессов оформления продуктов.", "match_gaps": "Требуется опыт продуктовым аналитиком от 3 лет, менторство младших аналитиков и хард-скиллы уровня middle+ (A/B-тесты, исследования) — это hands-on аналитическая позиция, а не продуктовое руководство. Прямого опыта в роли аналитика нет."}, {"title": "Лид продуктовой аналитики", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lid-produktovoj-analitiki/a6aed8b1-1962-4a9f-b643-e2d832fd3b07/", "description": "Описание:\nТ‑Бизнес — крупная бизнес‑линия внутри Т‑Банка. Мы работаем с компаниями и ИП: привлекаем, развиваем и обслуживаем их, создаем продукты, которые помогают вести бизнес. Клиентов делим на три сегмента — малый (S), средний (M) и крупный (L).…\n\nОбязанности:\n- Развивать аналитику значительной части онлайн‑привлечения Т‑Бизнеса\n- Генерировать гипотезы и находить точки роста в онлайн‑привлечении\n- Создавать и поддерживать дашборды и аналитические инструменты в BI‑системе\n- Участвовать в принятии решений совместно с бизнес‑лидерами и руководителями маркетинга на основе данных\n- Оценивать целесообразность запуска рекламных кампаний с крупными бюджетами и проводить их последующий анализ\n- Проверять гипотезы об эффективности каналов B2B‑маркетинга с помощью A/B‑тестов, гео‑ и хроно‑экспериментов, причинно‑следственных методов и других подходов\n- Руководить командой аналитики, развивать сотрудников и управлять бэклогом\n\nТребования:\n- У вас есть опыт управления и развития команды аналитики\n- Знаете SQL на продвинутом уровне: умеете писать сложные запросы, работать с большими объемами данных\n- У вас есть опыт работы с маркетинговыми метриками и метриками онлайн‑привлечения: CAC, CPC, CPA, CTR, воронка привлечения, приведенная стоимость и другие\n- Разбираетесь в математической статистике и теории вероятностей\n- Знаете, как применять A/B‑тесты и статистические критерии\n- Знаете альтернативные методы проверки гипотез: модели машинного обучения, когортный анализ, синтетический контроль, причинно‑следственный анализ\n- Умеете работать с Python и библиотеками для анализа данных и построения моделей\n- Понимаете методы работы с зависимостями в данных: оценку параметров распределений, дельта‑метод, линеаризацию\n- Умеете визуализировать данные и строить дашборды в BI‑инструментах", "date": "2026-07-02", "org": "tbank", "match_percent": 33, "match_fit": "Есть навыки SQL, Python, A/B-тестов, математической статистики и управление командами в финтехе, а также опыт data-driven принятия решений.", "match_gaps": "Отсутствует ключевой опыт в маркетинговой аналитике и метриках онлайн-привлечения (CAC, CPC, CPA, воронка привлечения), а также в продвинутых методах (синтетический контроль, дельта-метод, каузальный анализ). Профиль кандидата — продуктовое руководство, а не маркетинговая/эконометрическая аналитика."}, {"title": "Лид продуктовой аналитики в команду главного экрана приложения Т‑Банка", "url": "https://www.tbank.ru/career/it/vacancy/moscow/analytics-team-lead-for-apps-main-screen-team/cfcfe14e-23ba-448f-a56d-ae9c4f06bb95/", "description": "Описание:\nМы — команда продуктовой аналитики, тесно работающая с бизнесом. Отвечаем за ключевые интерфейсы главной страницы банковского приложения и личного кабинета в веб-версии.…\n\nОбязанности:\n- Руководить командой из 6+ человек, которые разделены по подкомандам\n- Развивать сотрудников и улучшать процессы в команде\n- Выстраивать целеполагание команды аналитиков и бизнес-команд, в которых работают аналитики\n- Развивать интерфейсы за счет аналитики команды: строить дерево метрик и отчетность, повышать прозрачность\n- Погружаться во все продукты компании, работать с внешними командами, например ревьюить тесты на плейсментах, которые принадлежат нам\n- Вести большие аналитические проекты: редизайны, тоглы на Главной, встраивание ML\n- Плотно общаться с командой DWH, Statist, А/B-платформой и другими коллегами, от которых зависит результат работы вашей команды\n\nТребования:\n- У вас есть опыт реализации изменений в бизнесе и управления ими в условиях высокой доли неопределенности\n- Есть опыт управления командой аналитиков\n- Знаете и применяете инструменты управления: делегирование, целеполагание, мотивацию, встречи one-to-one и так далее\n- Совершенствуете применяемые инструменты управления\n- Знаете SQL на продвинутом уровне\n- Знаете Python\n- Экспертно разбираетесь в математической статистике и теории вероятностей, применении А/B-тестов, разных статистических методах и критериях\n- Умеете разрабатывать стратегии выбора целевых метрик бизнеса или продукта, декомпозировать и строить дерево метрик\n- Будет плюсом знание ML", "date": "2026-07-02", "org": "tbank", "match_percent": 33, "match_fit": "Физическое образование МГУ, математическая статистика и портфельный анализ в навыках, опыт A/B-тестов, целеполагания, делегирования и управления большими командами в условиях неопределённости.", "match_gaps": "Требуется тимлид именно команды аналитиков с экспертным уровнем статистики и теории вероятностей, продвинутым SQL, деревом метрик и встраиванием ML. Кандидат — продуктовый руководитель, глубина статистической экспертизы и опыт руководства аналитиками не подтверждены."}, {"title": "Лид core-команды аналитики", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lead-of-the-core-analytics-team/67e66679-e642-47b6-b94f-fe9abe102c80/", "description": "Описание:\nНаша команда отвечает за интерфейсную аналитику: мы покрываем десятки разделов приложения и веб-интерфейсов Т-Банка, формируем метрики, стратегию и подходы к развитию пользовательского опыта.…\n\nОбязанности:\n- Развивать событийную аналитику как продукт: архитектура, стандарты, онбординг пользователей\n- Прорабатывать ключевые метрики интерфейсов и обеспечивать корректную измеримость в A/B-платформе\n- Вместе с DWH-командой строить модели данных и платформенные решения\n- Работать с CTO и CPO наших внутренних аналитических платформ по стратегическим трекам\n- Сформировать и развивать сore-команду аналитиков\n\nТребования:\n- У вас есть опыт работы тимлидом или вы самостоятельно вели проекты\n- Есть опыт работы на стыке с дата-инженерами\n- Отлично разбираетесь в событийной аналитике, моделях данных и метриках внешних и внутренних продуктов\n- Умеете строить команды и выстраивать кросс-командное взаимодействие с командами внутренних аналитических платформ\n- Будет плюсом опыт с работы с A/B-платформами и платформами событийной аналитики, опыт миграции или стандартизации аналитических систем, наличие команды или сотрудников, которые готовы присоединиться к команде вместе с лидом", "date": "2026-07-02", "org": "tbank", "match_percent": 33, "match_fit": "Есть опыт самостоятельного ведения проектов с нуля, работы на стыке с разработчиками и дата-командами (платформа ППРБ/OpenShift, 25+ интеграций), построения команд и кросс-командного взаимодействия.", "match_gaps": "Ключевые требования — событийная аналитика, модели данных, метрики интерфейсов и A/B-платформы, где нужна глубокая профильная экспертиза. Кандидат — продуктовый лид, а не аналитик по событийной/интерфейсной аналитике; этого специализированного опыта в резюме нет."}, {"title": "Руководитель аналитической команды экспериментирования", "url": "https://www.tbank.ru/career/it/vacancy/moscow/head-of-the-analytical-experimentation-team/11af70ec-fe35-415b-b341-b306886e1679/", "description": "Описание:\nКоманда экспериментирования масштабно и качественно улучшает культуру проведения А/B-тестов через развитие лаборатории, системы ревью и платформы.…\n\nОбязанности:\n- Ревьюить экосистемные тесты\n- Строить и реализовывать стратегию развития А/B-тестов в компании\n- Развивать и популяризировать исследовательский трек, курировать написание статей и подачу патентов\n- Доносить и защищать результаты тестов перед топ-менеджментом\n- Поддерживать А/B-платформу в части методологии\n\nТребования:\n- У вас есть опыт в проведении сложных А/B-тестов и широкая насмотренность в современных методах тестирования\n- Знаете основы математики А/B-тестов, знаете, когда работает ЦПТ и какие предпосылки есть у основных тестов\n- Понимаете работу продуктовых аналитических команд и как решения влияют на бизнес-метрики\n- Будет плюсом опыт управления командой аналитики", "date": "2026-07-02", "org": "tbank", "match_percent": 30, "match_fit": "Есть A/B-тесты в навыках, количественная база (физфак МГУ, матстатистика) и опыт защиты решений и результатов перед топ-менеджментом и ключевыми стейкхолдерами. Управленческий опыт релевантен.", "match_gaps": "Вакансия требует глубокой экспертизы именно в методологии A/B-тестирования (ЦПТ, предпосылки тестов, сложные тесты, ревью экосистемных тестов, патенты/статьи) — это узкоспециализированная роль. Кандидат не является экспертом по методологии экспериментирования, hands-on опыт таких тестов не подтверждён."}, {"title": "Лид продуктовой аналитики в Платформу доставок", "url": "https://www.tbank.ru/career/it/vacancy/moscow/product-analytics-lead-for-the-delivery-platform/9074458c-95e6-44d4-a330-705d5fc2f0f8/", "description": "Описание:\nКоманда Платформы доставок прогнозирует спрос и оптимизирует ресурсы в задачах, которые связаны с доставкой. Мы разрабатываем и внедряем алгоритмы, чтобы повышать эффективность всей воронки доставок — от назначения встречи до последующей обработки данных.…\n\nОбязанности:\n- Формировать и развивать команду аналитиков-разработчиков\n- Выстраивать и оптимизировать процессы: трекинг задач в Jira, коммуникации с заказчиками, приоритизация бэклога\n- Выявлять и прорабатывать алгоритмические задачи в домене доставки\n- Внедрять ML-модели в продукт и оценивать их импакт\n- Развивать сотрудников: ставить цели, проводить регулярные ревью, работать с матрицей компетенций\n- Общаться с другими аналитическими командами и кросс-функциональными подразделениями\n\nТребования:\n- У вас есть опыт работы в роли продуктового аналитика в продуктовых или технологических компаниях от 3 лет\n- Есть опыт управления аналитическими командами от 2 лет\n- Есть опыт построения ML-моделей и алгоритмических решений в реальных продуктах\n- Знаете Python и SQL, работали с библиотеками Pandas, Scikit-learn, Xgboost или другими\n- Понимаете процессы прогнозирования, кластеризации, оптимизации и A/B-тестирования\n- Умеете выстраивать эффективную коммуникацию с заказчиками и техническими командами\n- Умеете приоритизировать задачи и управлять бэклогом\n- Способны мотивировать и развивать команду, работать с матрицей компетенций\n- Мыслите системно, держите фокус на результат и аналитическую строгость\n- Готовы к экспериментам и внедрению новых подходов", "date": "2026-07-02", "org": "tbank", "match_percent": 28, "match_fit": "Есть сильный опыт управления командами и выстраивания процессов (Jira, приоритизация бэклога, коммуникации с заказчиками), системное мышление и фокус на результат. Развивал AI-направление в текущем продукте.", "match_gaps": "Ключевые требования — 3 года продуктовым аналитиком, 2 года управления аналитическими командами и практика построения ML-моделей (Python, Pandas, Scikit-learn, Xgboost) в реальных продуктах. У кандидата нет hands-on ML-разработки и опыта именно аналитика."}, {"title": "Технический руководитель по данным — Платформа обслуживания", "url": "https://www.tbank.ru/career/it/vacancy/moscow/tekhnicheskij-rukovoditel-po-dannym-platforma-obsluzhivaniya/cc912146-aed5-45e2-8eaf-577800d2f19c/", "description": "Описание:\nПлатформа обслуживания — один из топ‑5 дата‑доменов экосистемы Т: более 6400 объектов в DWH и около 3,5 тыс. MAU пользователей data‑продуктов.…\n\nОбязанности:\n- Руководить командой инженеров данных численностью 50+ человек: определять приоритеты, задавать стандарты работы, развивать сотрудников и отвечать за результат поставки данных\n- Выстраивать целевую архитектуру данных внутри платформы обслуживания с учетом разных типов данных: для управленческой и продуктовой аналитики, машинного обучения, решений на базе больших языковых моделей и ИИ‑агентов\n- Организовывать сквозной процесс работы с данными: от сбора бизнес‑потребности и формулирования требований до разработки, проверки качества, приемки и сопровождения\n- Обеспечивать стабильность, полноту, качество и прозрачность данных для бизнеса, аналитики и продуктовых команд\n- Разделять и описывать контуры данных под разные сценарии использования: принятие решений, аналитика, обучение моделей, автоматизация поддержки и ИИ‑сценарии\n- Выстраивать взаимодействие между бизнесом, продуктовой аналитикой, инженерами данных, командами машинного обучения и платформенными функциями\n- Развивать данные как внутренний продукт: определять владельцев, заказчиков, требования к качеству и правила развития\n- Ускорять внедрение решений с применением искусственного интеллекта за счет корректной организации данных, разметки, контекста, обратной связи и оценки качества\n- Отвечать за экономический эффект и монетизацию данных\n\nТребования:\n- У вас есть опыт работы дата‑инженером и/или разработчиком от 3 лет\n- У вас есть опыт руководства направлением данных или инженерии данных в сложной продуктовой или операционной среде от 2 лет\n- Имеете опыт построения архитектуры данных и организации процессов поставки данных для внутренних заказчиков\n- Имеете опыт выстраивания процессов качества данных, контроля стабильности, документирования и приемки результатов\n- Умеете переводить бизнес‑задачи и аналитические потребности в требования к данным, архитектуре и плану развития\n- Умеете управлять командой инженеров данных и выстраивать их работу в соответствии с бизнес‑приоритетами\n- Понимаете различия между данными для отчетности и аналитики, данными для моделей и данными для решений на базе больших языковых моделей\n- Умеете находить баланс между быстрыми прикладными решениями и долгосрочным развитием системы данных\n- Умеете выстраивать кросс‑функциональное взаимодействие между бизнесом, продуктом, аналитикой, инженерией данных и командами искусственного интеллекта", "date": "2026-07-02", "org": "tbank", "match_percent": 26, "match_fit": "Кандидат имеет опыт руководства крупными командами в сложной среде, понимает архитектуру интеграций (25+ интеграций, ППРБ/OpenShift) и связь данных с бизнес-эффектом и монетизацией.", "match_gaps": "Нет профильного опыта дата-инженера/разработчика и руководства инженерией данных, построения архитектуры DWH и процессов качества данных. Роль глубоко техническая (data engineering лид 50+), что не соответствует продуктовому профилю кандидата."}, {"title": "Лид продуктовой аналитики в команду количественных исследований", "url": "https://www.tbank.ru/career/it/vacancy/moscow/analytics-team-lead-for-quantitative-research-team/7cc11dc1-cfc0-4d2b-be32-575cd0670fc7/", "description": "Описание:\nКоманда количественных исследований — часть направления стратегической и R&D-аналитики в Управлении аналитики. Мы тесно сотрудничаем с количественными исследователями Центра исследований Т-Банка.…\n\nОбязанности:\n- Проводить продуктовые исследования\n- Искать инсайты в данных, исследовать зависимости и корреляции\n- Писать и оптимизировать SQL-код и код на Python, строить пайплайн ETL\n- Строить AdHoc-аналитику\n- Работать над проектом по кластеризации свободного ввода в опросах\n- Подготавливать, запускать и анализировать A/B-тесты для измерения метрик NPS и CSI\n- Руководить командой из 6 аналитиков\n- Управлять проектом: много общаться с продуктовыми командами, планировать и приоритизировать бэклог\n\nТребования:\n- Знаете SQL на продвинутом уровне\n- Разбираетесь в математической статистике и теории вероятностей, применении A/B-тестов, статистических методах и критериях\n- Владеете методами проверки гипотез: ML-подходами, когортным анализом, синтетическим контролем и другими\n- Знаете ML и разные методы анализа, в том числе временных рядов\n- Пишете код на Python и работаете с библиотеками: Pandas, Numpy, Matplotlib, Sklearn, Scipy, Prophet и другими\n- Готовы погружаться в данные: анализировать и визуализировать их, строить дашборды в BI-инструментах: Python, Proteus\n- Умеете и хотите работать с задачами по анализу текстов\n- Будет плюсом, если вы разбираетесь в методах количественных исследований и знаете опросные метрики", "date": "2026-07-02", "org": "tbank", "match_percent": 25, "match_fit": "В навыках заявлены SQL, Python, математическая статистика и A/B-тесты, есть управленческий опыт и координация с продуктовыми командами. Физфак МГУ даёт сильную количественную базу.", "match_gaps": "Вакансия глубоко техническая: продвинутый SQL, Python-библиотеки (Pandas, Sklearn, Scipy, Prophet), ETL, ML, временные ряды, анализ текстов, кластеризация. Кандидат — продуктовый руководитель, а не hands-on data scientist/исследователь; такой глубины технической экспертизы в резюме нет."}, {"title": "Руководитель ML-направления в AI-центр — Кредитные продукты", "url": "https://www.tbank.ru/career/it/vacancy/moscow/rukovoditel-ml-napravleniya-v-ai-centr-kreditnye-produkty/87bb8cd1-1989-44c2-85ee-cb6b1ce18235/", "description": "Описание:\nКредитные продукты — одна из ключевых бизнес‑линий Т‑Банка. Миллионы клиентов используют кредиты для важных жизненных целей, а мы делаем процесс быстрым, понятным и технологичным.…\n\nОбязанности:\n- Формировать стратегию развития ML/AI совместно со стейкхолдерами и определять приоритетные направления с максимальной бизнес‑ценностью\n- Руководить кросс‑функциональными ML‑командами (2+ команды до 10–15 инженеров) и отвечать за результат внедрений\n- Приоритизировать и валидировать ML‑инициативы совместно с продуктовой командой, формировать и развивать бэклог\n- Обеспечивать delivery ML‑проектов и их техническое качество в рамках процессов разработки\n- Развивать инфраструктуру для ML: хранение и обновление данных, контроль качества данных, интеграции с корпоративными системами\n- Контролировать внедрение моделей в production, мониторинг качества и оценку эффекта через эксперименты и аналитику\n- Планировать и управлять затратами на обучение и инференс моделей, вычислительными ресурсами\n- Проводить архитектурные ревью ML‑систем и пайплайнов, повышать их масштабируемость и эффективность\n- Консультировать бизнес и технические команды по вопросам применения ML/AI и лучших практик\n\nТребования:\n- У вас есть опыт ML‑разработки от 5 лет, из них не менее 2 лет в роли тимлида одной или нескольких ML‑команд\n- У вас есть опыт выстраивания процессов разработки ML‑решений в рамках продуктовых или платформенных команд\n- Имеете опыт развития ML‑инфраструктуры и MLOps, включая внедрение моделей в production, мониторинг и масштабирование\n- Имеете опыт проектирования ML‑систем и пайплайнов, запуска A/B‑тестов и оценки эффекта от внедрения моделей\n- Умеете управлять delivery ML‑команд и выстраивать процессы планирования и оценки результатов\n- Умеете выстраивать коммуникацию с бизнес‑заказчиками и техническими командами, формировать стратегическое видение развития ML/AI\n- Разбираетесь в проектировании архитектуры распределенных систем и интеграции ML‑решений\n- Обладаете широким кругозором в области машинного и глубокого обучения, знакомы с современными технологиями и индустриальными трендами, включая рекомендательные системы, обработку естественного языка и классические методы машинного обучения", "date": "2026-07-02", "org": "tbank", "match_percent": 22, "match_fit": "Кандидат развивает AI-направление в текущем продукте и понимает бизнес-ценность ML-инициатив, есть опыт работы с ML-продуктом (Air.bet, точность 87%) и приоритизации бэклога со стейкхолдерами.", "match_gaps": "Требуется опыт ML-разработки от 5 лет и от 2 лет тимлидом ML-команд, MLOps, production-внедрение и архитектура ML-пайплайнов — этого у кандидата нет. Он продуктовый руководитель, а не инженер/ML-лид."}, {"title": "Руководитель ML-направления в AI-центр — Daily Banking", "url": "https://www.tbank.ru/career/it/vacancy/moscow/rukovoditel-ml-napravleniya-v-ai-centr-daily-banking/6d279690-e993-4e3b-8d6a-19ee5863a09a/", "description": "Описание:\nDaily Banking — крупнейшее направление Т‑Банка и сердце мобильного приложения. Переводы, оплаты, дебетовые карты, мобильная связь — сценарии, которыми ежедневно пользуются миллионы клиентов и которые формируют большую часть действий в приложении.…\n\nОбязанности:\n- Формировать ML‑стратегию совместно со стейкхолдерами и определять приоритетные направления внедрения ML с максимальной бизнес‑ценностью\n- Руководить кросс‑функциональными ML‑командами и отвечать за достижение бизнес‑результатов\n- Приоритизировать и валидировать ML‑инициативы совместно с продуктовыми командами, формировать и развивать бэклог\n- Обеспечивать delivery ML‑проектов в рамках процессов разработки и контроля качества\n- Развивать инфраструктуру для ML: хранение и обновление данных, качество данных, интеграции с корпоративными системами\n- Контролировать внедрение моделей в production, мониторинг их качества и оценку эффекта\n- Планировать и управлять затратами на обучение и инференс моделей, вычислительные ресурсы\n- Проводить архитектурные ревью ML‑систем и пайплайнов, повышать их эффективность и масштабируемость\n- Консультировать бизнес и технические команды по вопросам ML/AI и лучшим практикам применения технологий\n\nТребования:\n- У вас есть опыт ML‑разработки от 5 лет, из них не менее 2 лет в роли тимлида одной или нескольких ML‑команд\n- У вас есть опыт выстраивания и развития ML‑инфраструктуры и MLOps‑процессов, включая внедрение моделей в production, мониторинг и масштабирование\n- Имеете опыт построения процессов разработки ML‑решений в рамках продуктовых или платформенных команд\n- Имеете опыт проектирования ML‑систем и пайплайнов, запуска A/B‑тестов и оценки эффекта от внедрения моделей\n- Умеете управлять delivery ML‑команд и выстраивать процессы планирования и оценки результатов\n- Умеете работать со стейкхолдерами и бизнес‑заказчиками, формировать стратегическое видение развития ML/AI\n- Понимаете принципы построения архитектуры распределенных систем и интеграции ML‑решений с корпоративными системами", "date": "2026-07-02", "org": "tbank", "match_percent": 22, "match_fit": "Есть понимание бизнес-ценности ML, опыт работы со стейкхолдерами и формирования стратегии продукта, а также запуск ML-based страхового продукта в прошлом.", "match_gaps": "Ключевые требования — 5+ лет ML-разработки, 2+ года тимлидом ML-команд, MLOps, архитектура распределённых систем — не покрыты. Профиль кандидата продуктовый, а не техническо-инженерный ML."}, {"title": "Лид продуктовой аналитики в команду AI-агентов обслуживания клиентов", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lead-product-analytics-on-the-al-customer-service-agent-team/00afbddc-c272-4762-9548-ebe709addd19/", "description": "Описание:\nAI-центр — команда, в которой 600+ сотрудников создают технологии и продукты на основе AI, делятся опытом и внедряют искусственный интеллект во все продукты Т-Банка.…\n\nОбязанности:\n- Проектировать архитектуру хранения и обработки данных, реализовывать пайплайны аналитики и данных для обучения моделей — SQL, Python, SSETL, Airflow\n- Управлять командой аналитиков из 5 человек\n- Улучшать ML-модели: искать точки роста в данных, исследовать зависимости и корреляции вместе с ML-инженерами\n- Проводить продуктовые исследования, оценивать и приоритизировать гипотезы вместе с командой продукта\n- Проводить А/B-тесты: подготавливать, разрабатывать дизайн, запускать и анализировать результаты\n- Строить ad-hoc-аналитику и дашборды в Proteus и Helicopter\n\nТребования:\n- Уверенно работаете с Python, библиотеками pandas, NumPy, Matplotlib, sklearn, SciPy, prophet и другими инструментами анализа данных\n- Разбираетесь в принципах проектирования надежных и масштабируемых систем\n- Владеете практиками и инструментами современной разработки, включая version control, CI/CD, тестирование и так далее\n- Владеете SQL на продвинутом уровне\n- Есть опыт построения пайплайнов данных с
