ния). Финтех, работа с банками и юридически значимой ЭП прямо релевантны опыту кандидата.", "match_gaps": "Требуется проработка архитектурных решений и понимание REST API/событийных интеграций на предметном уровне — у кандидата это рабочее знакомство, а не инженерная экспертиза (делается совместно с техкомандой). Специфика автокредитования/автострахования — новый под-домен, но заявлена как преимущество."}, {"title": "Руководитель маркетинга (СМО) — Шопинг", "url": "https://www.tbank.ru/career/back-office/vacancy/moscow/rukovoditel-marketinga-smo-shoping/019ed0e1-a822-71a4-b3cb-54f008469ac9/", "description": "Описание:\nМы работаем с нефинансовыми сервисами экосистемы Т‑Банка: путешествия (отели и авиа), доставка еды и продуктов, топливо, продажа авто в приложении, маркетплейс товаров и рекламная платформа T‑Ads.…\n\nОбязанности:\n- Формировать трехлетнюю маркетинговую стратегию развития нефинансовых сервисов внутри экосистемы\n- Определять ключевые точки роста: новые клиентские сегменты, сценарии использования, сервисные связки и экосистемные механики\n- Приоритизировать направления по бизнес‑потенциалу, влиянию на удержание и долгосрочную ценность клиента\n- Формировать маркетинговое видение вертикали как самостоятельного бизнес‑направления внутри экосистемы\n- Совместно с бизнес‑лидерами и продуктом определять инвестиционные приоритеты и распределять маркетинговый бюджет\n- Принимать решения на основе юнит‑экономики, возврата инвестиций и влияния на долгосрочную ценность клиента\n- Строить систему прогнозирования роста и оценки эффекта маркетинговых инициатив\n- Формировать структуру маркетинга вертикали: развитие роста, управление клиентской базой, бренд‑коммуникации, аналитика, исследования\n- Руководить командой руководителей направлений и развивать управленческую команду\n- Выстраивать процессы приоритизации, постановки целей и операционного управления\n- Обеспечивать эффективное взаимодействие маркетинга с продуктом, аналитикой, коммерческими и технологически ринг, кассовые решения, QR-платежи, SoftPOS и сервисы, которые помогают бизнесу принимать оплату и увеличивать продажи.…\n\nОбязанности:\n- Разрабатывать и реализовывать маркетинговую стратегию продуктов приёма платежей и отраслевых решений\n- Формировать позиционирование и ценностные предложения для разных категорий бизнеса\n- Исследовать рынок, анализировать конкурентов и искать новые возможности для роста\n- Участвовать в запуске новых продуктов и функций: от упаковки оффера до вывода решения на рынок\n- Работать с продуктовыми командами над развитием клиентского опыта и продуктового предложения\n- Формировать и проверять гипотезы роста, запускать эксперименты и оценивать их влияние на бизнес-метрики\n- Готовить аналитические материалы и рекомендации для руководителей бизнеса и продуктовых команд\n- Координировать маркетинговые инициативы совместно с CRM, медиа, PR, брендом, аналитикой и продажами\n\nТребования:\n- У вас есть опыт работы в продуктовом, стратегическом или growth-маркетинге от 5 лет\n- Разрабатываете Go-to-Market стратегии и выводите новые продукты на рынок\n- Работаете с продуктовыми и коммерческими метриками, воронками, retention, LTV и юнит-экономикой\n- Проводите исследования и превращаете клиентские инсайты в конкретные бизнес-решения\n- Работали в технологических компаниях, финтехе, e-commerce, SaaS или B2B\n- Самостоятельно ведёте крупные проекты и влияете на принятие решений без прямого управления командой\n- Будет плюсом: опыт работы с платёжными продуктами, эквайрингом или финтех-сервисами, сегментирования рынка и разработки отраслевых стратегий", "date": "2026-07-07", "org": "tbank", "match_percent": 38, "match_fit": "Платёжный/эквайринговый домен относится к финтеху и релевантен, а работа с юнит-экономикой, метриками, гипотезами роста и запуском новых продуктов пересекается с сильными сторонами кандидата. Есть опыт вывода продуктов из MVP в пром и GTM-элементы.", "match_gaps": "Ядро — продуктовый маркетинг (GTM-стратегии, позиционирование, координация с CRM/медиа/PR/брендом), что не является профилем кандидата-продуктового руководителя. Роль индивидуального вклада «без прямого управления командой» — стоп-фактор (потолок 55) и расходится с его целью управленческой позиции; retention/LTV — частично."}, {"title": "Старший продуктовый маркетолог в Авиа", "url": "https://www.tbank.ru/career/back-office/vacancy/moscow/pmm_avia/679b2068-bab6-4dd3-8ca9-c098b0dc568a/", "description": "Описание:\nТ-Путешествия — сервис организации путешествий, где можно забронировать авиабилеты, отели, ж/д, туры и экскурсии в одном месте. Мы — часть экосистемы банка Т, поэтому гарантируем клиентам не только удобство, но и выгоду, прозрачность и надёжность.…\n\nОбязанности:\n- Развивать продукт «Авиа» в Т-Путешествиях и обеспечивать его рост по ключевым фокусам: GMV (привлечение новых клиентов, retention, рост частоты и среднего чека)\n- Формировать и реализовывать стратегию привлечения и удержания пользователей — от первого бронирования до регулярных поездок\n- Анализировать пользовательские воронки, находить точки роста и строить гипотезы на основе данных\n- Отслеживать и управлять ключевыми метриками (GMV, заказы, RR)\n- Совместно с кросс-командами запускать и анализировать A/B-тесты, оценивать влияние гипотез на результаты бизнеса\n- Выстраивать работу с кросс функциональными командами, контролировать эффективность кампаний\n- Продвигать культуру data-driven-решений и помогать команде видеть влияние своих действий на результат\n\nТребования:\n- Опыт от 5 лет в продуктовом маркетинге или growth-маркетинге в e-commerce / travel / entertainment\n- Успешные кейсы завершенных проектов с кратным ростом маркетинговых и/или бизнес KP\n- Опыт работы с digital, CRM, PR, Social/Influence, CPA и партнёрскими каналами\n- Понимание и умение оперировать бизнес-метриками GMV, Revenue, CAC,  LTV, ROMI, RR/Churn\n- Data-driven подход к формированию гипотез и принятию решений\n- Сильные навыки управления проектами\n- Отличные коммуникационные навыки (презентации, переговоры, управление ожиданиями)\n- Опыт работы в матричной структуре\n- Владение аналитическими инструментами (Excel, Яндекс Метрика, BI-системы)\n- Уверенное владение инструментами ИИ для личной эффективности и оптимизации процессов", "date": "2026-07-07", "org": "tbank", "match_percent": 38, "match_fit": "Сильное совпадение по data-driven культуре, A/B-тестам, работе с воронками и метриками в матричной структуре; travel/hospitality — заявленное интересное направление кандидата (есть офлайн-опыт в HoReCa).", "match_gaps": "Роль — growth/продуктовый маркетинг, а не руководство продуктовым направлением; требуется 5 лет в e-commerce/travel/entertainment и опыт CRM, PR, Social/Influence, CPA-каналов, чего у кандидата нет. Домен travel новый, метрики GMV/CAC/LTV/ROMI знакомы лишь частично."}, {"title": "Руководитель по развитию продукта (Реализация Collection)", "url": "https://www.tbank.ru/career/back-office/vacancy/moscow/rukovoditel-po-razvitiyu-produkta-realizaciya-collection/cf9d5e28-03eb-4344-b0ad-7360075bf3ac/", "description": "Описание:\nКоманда отвечает за реализацию имущества по проблемным активам. Мы формируем стратегии продажи, определяем наиболее эффективные каналы продвижения, используем современные рекламные инструменты и площадки для поиска покупателей, обеспечивая своевременную и результативную реализацию имущества.…\n\nОбязанности:\n- Выступать связующим звеном между командой продукта и операционной группой\n- Контролировать и улучшать метрики эффективности и KPI продукта \"Реализация Collection\"\n- Управлять внедрением изменений в операционные процессы связанные с реализацией имущества: новые функции, процессы, инструменты\n- Выявлять и решать проблемы, возникающие у операционной команды\n- Формировать и продвигать инициативы по улучшению продукта и операционных процессов\n- Обеспечивать достаточный уровень ресурсов (персонал, инструменты) для выполнения операционных задач\n- Участвовать в построении стратегии продвижения продукта, работе с клиентскими сегментами, реализации рекламных инициатив\n- Постоянно мониторить и оптимизировать бизнес-процессы для повышения эффективности\n\nТребования:\n- У вас есть опыт руководства в сфере взыскания от 5 лет\n- Имеете опыт работы с реализацией имущества (движимое и недвижимое)\n- Имеете опыт проектного или продуктового управления, включая внедрение изменений в операционной среде\n- У вас есть опыт запуска и сопровождения изменений в процессах реализации имущества: регламенты, инструменты, технологии\n- Понимаете специфику взыскания, операционные процессы и работу с KPI и бизнес‑показателями\n- Умеете анализировать показатели, выявлять проблемные места и управлять ресурсами сотрудников", "date": "2026-07-07", "org": "tbank", "match_percent": 28, "match_fit": "Есть операционно-процессный опыт оптимизации взыскания (2019–2020) и продуктовое управление внедрением изменений, работа с KPI и бизнес-показателями. Продуктовый подход к улучшению процессов пересекается с обязанностями.", "match_gaps": "Жёсткое требование «руководство в сфере взыскания от 5 лет» и опыт реализации движимого/недвижимого имущества у кандидата отсутствуют (взыскание — лишь ~1 год без детализации). Ядро — узкая доменная экспертиза по реализации имущества и рекламному продвижению, которой в опыте нет."}, {"title": "Руководитель направления регионального корпоративного бизнеса", "url": "https://www.tbank.ru/career/back-office/vacancy/moscow/rukovoditel-napravleniya-regionalnogo-korporativnogo-biznesa/0d4e8cb4-02bd-49af-a507-c8fba99f667f/", "description": "Описание:\nНаша команда выстраивает и поддерживает отношения с крупнейшими корпоративными клиентами региона. Каждый сотрудник ведёт собственный клиентский портфель и отвечает за результат по своим направлениям, работая со сложными сделками и задачами бизнеса.…\n\nОбязанности:\n- Привлекать клиентов крупного бизнеса с выручкой от 16 млрд ₽ через холодный поиск и действующую клиентскую базу\n- Продавать продукты банка и подбирать решения под задачи клиента: рисковые, казначейские, ВЭД, инвестиционные и платёжные продукты\n- Выстраивать отношения с владельцами и руководителями компаний, проводить личные и онлайн-встречи\n- Обсуждать индивидуальные условия сотрудничества и готовить коммерческие предложения\n\nТребования:\n- У вас есть опыт работы в банковской сфере не менее 5 лет\n- Имеете практику кредитования крупнейших корпоративных клиентов и привлечения нового корпоративного бизнеса\n- Хорошо понимаете клиентскую базу своего региона и соседних областей и умеете использовать это в работе с привлечением\n- Умеете вести переговоры с топ-менеджментом компаний и презентовать комплексные банковские решения\n- Разбираетесь в корпоративных банковских продуктах: кредитование, гарантии, факторинг, лизинг, деривативы\n- Умеете оценивать кредитные риски, работать с финансовой отчетностью клиентов", "date": "2026-07-07", "org": "tbank", "match_percent": 27, "match_fit": "Совпадает банковский домен (7,7 лет в Сбере), переговоры с топ-менеджментом компаний и работа с индивидуальными коммерческими условиями (конструктор ценообразования B2B).", "match_gaps": "Стоп-фактор: ядро роли — прямые продажи и ведение личного клиентского портфеля юрлиц, чего у кандидата нет (его платформы — инструмент для клиентских менеджеров). Нет опыта кредитования, оценки кредитных рисков и работы с финотчётностью клиентов."}, {"title": "Руководитель направления платежей эквайринга", "url": "https://www.tbank.ru/career/back-office/vacancy/moscow/028a32ad-6730-4f38-87b1-3e1ebc45ac30/019eb736-a19a-7098-a81d-c3c835eb4f41/", "description": "Описание:\nКоманда бизнес-аналитиков (технологов), занимающаяся реализацией расчетных решений по продуктам эквайринга, начиная от создания юридической и архитектурной конструкций и заканчивая передачей процесса в операционное сопровождение\n\nОбязанности:\n- Организовывать своевременную и безошибочную работу команды\n- Достигать целей команды на уровне отдела и на уровне компании, повышать эффективность работы команды\n- Реализовывать новые проекты в части обеспечения расчетов с контрагентами\\держателями карт\\платежными системами\n- Оптимизировать процессы операционного сопровождения\n- Внедрять новые технологии в процессы работы команды и в работу операционного сопровождения\n- Развивать и совершенствовать команду\n\nТребования:\n- Имеете высшее образование (экономическое, техническое) и опыт аналогичной работы от 3 лет\n- Опыт управления командой от 1,5 лет\n- Знаете специфику банковской деятельности в области оказания расчетных услуг держателям банковских карт/контрагентам. Специфика платежных систем приветствуется\n- Знаете основные положения и акты, регулирующие банковскую деятельность (161-ФЗ, 809-П)\n- Знаете бухгалтерский учет в кредитных организациях в части отражения операция по банковским картам\n- Имеете навыки написания БТ и ТЗ для системных аналитиков, разработчиков. Навыки проведения тестирования в части обработки финансовых операций\n- Имеете навыки работы в Jira, confluence и др. инструментах для работы с задачами\n- Приветствуется опыт операционной поддержки в части расчетов по операциям эквайринга, работа с большими массивами данных\n- Аналитический склад ума, умение работать с большим объемом информации, в режиме многозадачности\n- Готовы выходить за рамки четко поставленных задач\n- Обладаете коммуникативными навыками\n- Инициативность и ответственность, желание развиваться профессионально", "date": "2026-07-07", "org": "tbank", "match_percent": 25, "match_fit": "Есть банковский домен, управление командами и опыт оптимизации процессов; знаком с enterprise-интеграциями и регуляторикой (PCI DSS, закрытые контуры).", "match_gaps": "Ядро роли — управление командой бизнес-аналитиков/технологов с написанием БТ/ТЗ, тестированием финопераций, бухучётом по картам и знанием 161-ФЗ/809-П; это инженерно-аналитическая delivery-роль, а не продуктовая, плюс нет доменного опыта в эквайринге/платёжных системах."}, {"title": "Руководитель направления платежей эквайринга", "url": "https://www.tbank.ru/career/back-office/vacancy/moscow/028a32ad-6730-4f38-87b1-3e1ebc45ac30/019eb736-a196-75e0-81c3-aa9ee8f23864/", "description": "Описание:\nКоманда бизнес-аналитиков (технологов), занимающаяся реализацией расчетных решений по продуктам эквайринга, начиная от создания юридической и архитектурной конструкций и заканчивая передачей процесса в операционное сопровождение\n\nОбязанности:\n- Организовывать своевременную и безошибочную работу команды\n- Достигать целей команды на уровне отдела и на уровне компании, повышать эффективность работы команды\n- Реализовывать новые проекты в части обеспечения расчетов с контрагентами\\держателями карт\\платежными системами\n- Оптимизировать процессы операционного сопровождения\n- Внедрять новые технологии в процессы работы команды и в работу операционного сопровождения\n- Развивать и совершенствовать команду\n\nТребования:\n- Имеете высшее образование (экономическое, техническое) и опыт аналогичной работы от 3 лет\n- Опыт управления командой от 1,5 лет\n- Знаете специфику банковской деятельности в области оказания расчетных услуг держателям банковских карт/контрагентам. Специфика платежных систем приветствуется\n- Знаете основные положения и акты, регулирующие банковскую деятельность (161-ФЗ, 809-П)\n- Знаете бухгалтерский учет в кредитных организациях в части отражения операция по банковским картам\n- Имеете навыки написания БТ и ТЗ для системных аналитиков, разработчиков. Навыки проведения тестирования в части обработки финансовых операций\n- Имеете навыки работы в Jira, confluence и др. инструментах для работы с задачами\n- Приветствуется опыт операционной поддержки в части расчетов по операциям эквайринга, работа с большими массивами данных\n- Аналитический склад ума, умение работать с большим объемом информации, в режиме многозадачности\n- Готовы выходить за рамки четко поставленных задач\n- Обладаете коммуникативными навыками\n- Инициативность и ответственность, желание разв может быть после финтеха.…\n\nОбязанности:\n- Запускать и масштабировать продукты, которые создают новые пользовательские сценарии и привычки\n- Формировать и тестировать value proposition, искать product–market fit через маркетинг, запускать MVP-коммуникации и первые воронки\n- Находить точки роста MAU / DAU / retention, строить гипотезы и быстро их валидировать\n- Создавать новые механики привлечения (вирусные и продуктовые механики, спецпроекты, коллаборации, UGC, интеграции с другими продуктами экосистемы)\n- Работать с инсайтами и сегментацией\n- Работа с транзакционными и поведенческими данными, поиск неочевидных триггеров вовлечения\n\nТребования:\n- Опыт в продуктовом маркетинге от 4 лет\n- Опыт запуска или масштабирования продуктов\n- Сильный продуктовый майндсет\n- Умение работать через гипотезы и метрики\n- Опыт работы с growth / retention / воронками", "date": "2026-07-07", "org": "tbank", "match_percent": 25, "match_fit": "Совпадает запуск и масштабирование продуктов с нуля, работа через гипотезы и метрики, финтех-экосистема (Т-Банк).", "match_gaps": "Стоп-фактор: ядро роли — контентные/UGC/вирусные механики и рост MAU/DAU/retention через вовлечение, чего в опыте прямо нет (раздел 5, п.1). Это продуктовый маркетинг без управления командами, а не руководящая продуктовая роль."}, {"title": "Руководитель направления платежей эквайринга", "url": "https://www.tbank.ru/career/back-office/vacancy/moscow/028a32ad-6730-4f38-87b1-3e1ebc45ac30/019eb736-a19a-70e9-a55d-3df8ba6706cb/", "description": "(не удалось получить описание)", "date": "2026-07-07", "org": "tbank", "match_percent": 22, "match_fit": "Описание вакансии отсутствует, поэтому оценка ориентировочная; по названию «Руководитель направления платежей эквайринга» предполагается совпадение по банковскому домену и управлению командой.", "match_gaps": "Без описания оценка ненадёжна; по аналогии с идентичными вакансиями 2–4/6 это, вероятно, инженерно-аналитическая delivery-роль (БТ/ТЗ, тестирование, бухучёт по картам), не совпадающая с продуктовым ядром кандидата и без опыта в эквайринге."}, {"title": "Руководитель направления по розыску активов", "url": "https://www.tbank.ru/career/back-office/vacancy/moscow/rukovoditel-napravleniya-po-rozysku-aktivov/92230c72-218b-4ad2-a227-c14fab76c93a/", "description": "Описание:\nНаша команда — центр компетенций по управлению просроченной задолженностью. Мы отвечаем за полный цикл возврата активов и денежных средств: от превентивных коммуникаций до судебного взыскания, возврата залогового имущества и его дальнейшей реализации.…\n\nОбязанности:\n- Формировать стратегию розыска активов и план сбора доказательной базы\n- Анализировать данные по проблемным активам, выстраивать гипотезы и определять направления розыска\n- Взаимодействовать с государственными органами: подавать заявления, сопровождать проверки и розыскные дела, обжаловать действия или бездействие\n- Вести CRM и отчетность по направлению, контролировать показатели\n- Участвовать в выездных мероприятиях в случаях, требующих экспертного сопровождения\n\nТребования:\n- У вас есть опыт работы от 5 лет в правоохранительных органах: МВД, Следственном комитете или прокуратуре — на позиции не ниже оперуполномоченного или следователя\n- Имеете опыт взаимодействия с государственными органами (ГИБДД, МВД, ФССП) и розыска движимого имущества\n- Знаете законодательство в сфере лизинга, исполнительного производства и оперативно-розыскной деятельности (164-ФЗ, 229-ФЗ, 144-ФЗ, основы УК и УПК РФ)\n- Умеете работать с большими объемами информации, анализировать данные из открытых и внутренних источников и делать обоснованные выводы\n- Умеете вести кейсы от начала до результата, организовывать процесс и контролировать выполнение задач", "date": "2026-07-07", "org": "tbank", "match_percent": 22, "match_fit": "Есть релевантный опыт оптимизации процессов взыскания, взаимодействия с госорганами (МВД, СКР, ФССП-логика), сильная аналитика данных и умение вести кейсы от начала до результата в жёсткой регуляторной среде.", "match_gaps": "Жёсткое требование — от 5 лет в правоохранительных органах (МВД/СК/прокуратура) на позиции не ниже оперуполномоченного/следователя и знание ОРД (144-ФЗ), которых у кандидата нет; он взаимодействовал с ведомствами как продакт, а не служил в них."}, {"title": "Старший маркетолог сегмента состоятельных клиентов", "url": "https://www.tbank.ru/career/back-office/vacancy/moscow/back-office-vacancy-moscow-pmm_Premium_Private /bb917b2e-7af0-4c7c-a5d4-126c87528b65/", "description": "(не удалось получить описание)", "date": "2026-07-07", "org": "tbank", "match_percent": 22, "match_fit": "Домен близок — состоятельные клиенты банка, финтех, где у кандидата 7,7 лет в Сбере и опыт монетизации/преференций для клиентских сегментов.", "match_gaps": "Роль — маркетинг сегмента, а не продуктовое руководство; описание отсутствует, но по названию это индивидуальная маркетинговая роль без управления портфелем команд, что не совпадает с ядром Head of Product. Нет подтверждённого опыта в консьюмерском маркетинге состоятельных клиентов."}, {"title": "Investor Relations (IR) Старший менеджер / Руководитель направления", "url": "https://www.tbank.ru/career/back-office/vacancy/moscow/investor-relations-ir-starshij-menedzher-rukovoditel-napravleniya/985da8bd-b218-4a42-9dc6-98c3a641a6a4/", "description": "(не удалось получить описание)", "date": "2026-07-07", "org": "tbank", "match_percent": 18, "match_fit": "Есть смежный опыт защиты стратегий и инвест-кейсов на уровне топ-менеджмента и коммуникации со стейкхолдерами высокого уровня.", "match_gaps": "IR — специализированная финансово-коммуникационная роль; классическое инвестиционное моделирование (ROI/NPV/DCF) в опыте отсутствует (раздел 5, п.3), продуктовое ядро не совпадает. Вероятный стоп-фактор — требование английского B2+ (у кандидата B1). Описание отсутствует."}, {"title": "Старший менеджер по компенсациям (Базовое вознаграждение)", "url": "https://www.tbank.ru/career/back-office/vacancy/moscow/managerC&B/a98159a4-36b7-48ed-84b9-5b565ed42260/", "description": "Описание:\nВедение проектов, связанных с цикличными процессами направления компенсаций и проектов внедрения методологических изменений в вознаграждении\n\nОбязанности:\n- Анализ текущих практик и процессов, выявление узких мест и точек развития\n- Проработка запросов на изменение политик и практик компенсации\n- Разработка методологических изменений в процессах, связанных с вознаграждением сотрудников и формирование предложений по изменениям\n- Моделирование эффекта на бюджет вознаграждения с учетом предлагаемых изменений политик и практик в области компенсаций, их согласование\n- Выстраивание процессов, создание баз знаний и инструментов по внедряемым изменениям\n- Организация автоматизации вводимых изменений\n- Разработка, согласование и контроль таймлайна проектов\n- Организация коммуникации и обучения по всем изменениям и цикличным процессам, подготовка коммуникационных материалов для разной ЦА\n- Подведение итогов цикличных проектов, их анализ и коммуникация\n- Организация сбора ОС по итогам завершения процессов и внедрения изменений в продуктах компенсаций\n\nТребования:\n- Высшее образование (экономическое/финансовое/экономика труда)\n- Успешный опыт самостоятельного управления проектами\n- Отличное знание трудового законодательства в части вознаграждения за труд\n- Опыт работы в компенсациях / вознаграждении сотрудников от 5 лет, в частности ведение больших цикличных процессов\n- Понимание принципов управления вознаграждением\n- Ориентация на внутреннего клиента и отличные навыки аргументации и убеждения, навыки разработкикоммуникационных кампаний и презентационных материалов\n- Отличное понимание трендов рынка\n- Мастер в Excel & PowerPoint", "date": "2026-07-07", "org": "tbank", "match_percent": 12, "match_fit": "Совпадает опыт самостоятельного управления проектами, моделирование эффекта на бюджет и выстраивание процессов с автоматизацией.", "match_gaps": "Ядро роли — методология компенсаций/вознаграждения, знание трудового законодательства и 5 лет в C&B, чего у кандидата нет полностью. Это HR-функция, не продуктовая руководящая роль."}, {"title": "ML-продакт-лид направления AI для сотрудников", "url": "https://www.tbank.ru/career/it/vacancy/moscow/ml-prodakt-napravleniya-ai-dlya-sotrudnikov/e357a56b-2861-4a73-a19f-d7f9893b9cda/", "description": "Описание:\nAI меняет то, как сотрудники работают с информацией, знаниями, коммуникациями, документами и ежедневными задачами.…\n\nОбязанности:\n- Определять стратегию развития направления «AI для сотрудников» и формировать долгосрочное видение продуктов\n- Развивать портфель AI-продуктов и определять приоритеты развития с учетом ценности для пользователей и бизнеса\n- Принимать решения о способах реализации инициатив: собственная разработка, использование внутренней AI-платформы или внедрение внешних решений\n- Работать с топ-менеджментом и руководителями функций, превращая потребности бизнеса в продуктовые приоритеты\n- Выстраивать согласованную roadmap между продуктом, ML, разработкой, данными, ИБ и бизнес-заказчиками\n- Определять систему продуктовых метрик и оценивать влияние AI-решений на эффективность сотрудников и компании\n- Запускать пилоты, валидировать гипотезы и масштабировать успешные сценарии использования AI\n- Развивать продуктовую организацию: управлять командой продактов, усиливать процессы discovery и delivery, формировать культуру принятия решений на основе данных\n\nТребования:\n- У вас есть опыт управления продуктовым направлением, портфелем продуктов или несколькими продуктовыми командами\n- Есть опыт работы с B2B, B2E, enterprise SaaS, внутренними платформами или другими сложными цифровыми продуктами\n- Есть опыт взаимодействия со стейкхолдерами уровня топ-менеджмента\n- Умеете формировать продуктовую стратегию и roadmap в условиях неопределённости\n- Понимаете AI/ML-продукты, LLM, корпоративный поиск, RAG, ассистентов и другие AI-решения\n- Умеете связывать продуктовые метрики с бизнес-результатом и запускать продукты от discovery до масштабирования\n- Умеете находить баланс между скоростью разработки, качеством, безопасностью и пользовательской ценностью\n- Понимаете особенности enterprise-продуктов: доступы, персональные данные, информационную безопасность, надёжность и качество сервиса\n- Есть опыт управления senior-командой или несколькими продуктовыми направлениями\n- Будет плюсом: опыт запуска AI-продуктов для сотрудников или клиентов, работы с корпоративным поиском, RAG, ассистентами и knowledge management-решениями, внедрения внутренних инструментов на большую аудиторию, развития пользовательской адаптации и понимание современных AI-продуктов и пользовательских сценариев", "date": "2026-07-02", "org": "tbank", "match_percent": 63, "match_fit": "Сильное совпадение управленческого ядра: управление продуктовым направлением и портфелем команд, B2B/B2E внутренние платформы (конструктор ценообразования — внутренний инструмент банка), взаимодействие с топ-менеджментом, формирование стратегии и roadmap, запуск от discovery до масштабирования, метрики и data-driven культура. Есть релевантный опыт постановки AI-функциональности на стороне продакта.", "match_gaps": "Существенный зазор по AI-ядру: требуется понимание LLM, RAG, корпоративного поиска, ассистентов — а у кандидата нет глубокой ML/LLM-экспертизы как строителя продуктов на них и опыта управления портфелем ML-продуктов. Откликаться от управленческого ядра (ориентир по эталону «CPO/Lead PM R&D ML» ≈ 60)."}, {"title": "Руководитель аналитики в операционную команду платформы обслуживания", "url": "https://www.tbank.ru/career/it/vacancy/moscow/head-of-analytics-for-the-operations-team-of-the-service-platform/f2d39c79-4338-49f0-8732-ba1adcf1b917/", "description": "Описание:\nУ нас большая команда операционной поддержки, которая состоит из первой и второй линий. Простые обращения решают сотрудники первой линии — мы планируем их нагрузку, работаем с качеством и повышаем эффективность через копилотов. Сложные обращения поступают к сотрудникам второй линии.…\n\nОбязанности:\n- Улучшать качество поддержки и работы сотрудников за счет аналитики, продуктовых решений и AI-инструментов\n- Находить и реализовывать сильные рычаги влияния на качество сервиса и решений сотрудников, эффективность процессов и клиентский опыт\n- Отвечать за результат, к которому приводит аналитика для платформы\n- Выстраивать систему метрик, которая позволяет управлять качеством работы сотрудников и клиентского сервиса\n- Проводить диагностику процессов первой и второй линий поддержки, выявлять корневые причины ошибок, потери качества\n- Развивать и внедрять решения на основе AI там, где они повышают качество работы сотрудников, снижают долю ручных действий и увеличивают производительность без потери качества\n- Приоритизировать инициативы по вкладу в качество сервиса, эффективность поддержки и цели платформы\n- Управлять командами аналитики через руководителей и делать так, чтобы команды приносили измеримый результат для бизнеса\n- Пересобирать команды, роли и зоны ответственности для достижения целей платформы — при необходимости\n- Следить за тем, чтобы решения по процессам, продукту и AI принимались на данных и приводили к улучшению ключевых показателей\n\nТребования:\n- У вас есть подтвержденный опыт достижения измеримого бизнес-результата через аналитику\n- Управляли аналитическими командами и руководителями: отвечали за результат и выполнение плана работ\n- Находили и реализовывали решения по росту качества и эффективности в сложных процессах\n- Принимали решения на основе неполных данных\n- Строили дерево метрик и системы управления по метрикам бизнеса или продукта\n- Внедряли изменения, которые улучшали качество сервиса и решений сотрудников, эффективность процессов или экономику поддержки\n- Умеете переводить цели бизнеса в систему метрик, приоритетов и конкретных действий с понятным эффектом\n- Умеете быстро находить корневые причины проблем и выбирать решения, которые дают лучший результат\n- Знаете SQL на продвинутом уровне\n- Отлично знаете математическую статистику, теорию вероятностей, A/B-тестирование и методы оценки эффекта изменений\n- Готовы влиять на бизнес, продукт, операции и технологии ради достижения общих целей\n- Будет плюсом опыт внедрения AI, ML или автоматизации в рабочие процессы", "date": "2026-07-02", "org": "tbank", "match_percent": 62, "match_fit": "Хорошее совпадение по управленческому ядру: управление аналитическими командами через руководителей с ответственностью за измеримый бизнес-результат, построение дерева метрик, поиск корневых причин и рычагов эффективности процессов. У кандидата есть релевантный опыт операционной трансформации и оптимизации процессов, data-driven культура (SQL, статистика, A/B) и пересборка команд.", "match_gaps": "Ядро — руководство именно аналитикой операционной поддержки, а не продуктом/монетизацией, что для кандидата смежная, а не профильная зона. Домен платформы клиентского обслуживания (первая/вторая линии) для него новый."}, {"title": "Продакт-лид в AI-центр — Вертикали", "url": "https://www.tbank.ru/career/it/vacancy/moscow/prodakt-lid-v-ai-centr-vertikali/fe1c8031-fddb-4d04-8160-afcd8af6a24b/", "description": "Описание:\nСтроим клиентские AI-продукты, которые заметно улучшают пользовательский опыт и дают измеримый эффект в бизнес-метриках Вертикали.…\n\nОбязанности:\n- Провести ревью AI-портфеля Вертикалей: разобрать качество текущих AI-продуктов и устранить системные узкие места\n- Найти главные проблемы в UX и качестве ответов, понять корневые причины и довести до стабильного улучшения\n- Сделать AI стабильным драйвером метрик Вертикалей\n- Поднять две новые вертикали с нуля: разобраться в бизнес-контексте, запустить и масштабировать через гейты\n- Собрать автономную команду и работающий operating model\n- Выстроить оунершип и процессы так, чтобы команды могли автономно выбирать ставки, запускать решения, измерять эффект и улучшать качество\n\nТребования:\n- Отлично разбираетесь в стратегии и фокусе: умеете формулировать диагноз, выбирать ставки, защищать приоритеты и строить роадмап на данных\n- Готовы держать фокус на ценности и эффекте, умеете приоритизировать задачи и отказываться от лишнего\n- Знаете, как приземлить AI на экономику вертикалей, и умеете находить масштабируемые точки ROI\n- Запускали lean: от MVP и итераций до измеримого результата\n- Умеете договариваться со стейкхолдерами, синхронизировать ожидания и продвигать продукт\n- Способны быстро разобраться в бизнес-контексте\n- Понимаете или готовы быстро погрузиться в LLM-ассистентов и агентов — RAG, tool-use, eval, качество, latency, cost", "date": "2026-07-02", "org": "tbank", "match_percent": 60, "match_fit": "Это фактически продуктовая руководящая роль: сильно совпадает стратегия и защита приоритетов на данных, запуск lean от MVP до эффекта, поднятие двух вертикалей с нуля, сбор автономной команды и operating model, работа со стейкхолдерами и приземление на экономику/ROI — всё это подтверждённое ядро кандидата. Постановка AI-функциональности на стороне продакта тоже в опыте.", "match_gaps": "Требуется погружение в LLM-ассистентов и агентов (RAG, tool-use, eval, latency, cost) — глубокой LLM-экспертизы у кандидата нет (раздел 5, п.1b), это существенный зазор, но не стоп-фактор при совпадении управленческого ядра. Ориентир по калибровке ML-ролей ≈60, откликаться от управленческого ядра."}, {"title": "Руководитель ML-продукта в AI-центр", "url": "https://www.tbank.ru/career/it/vacancy/moscow/product-lead-v-ai-centr/fa2ebfba-076d-4392-ad0d-df52968ca3bc/", "description": "Описание:\nЭкосистема Т-Технологий давно вышла за рамки обычных финансов и включает авиабилеты, отели, страховки, одежду и даже самокаты. Мы строим экосистему будущего и считаем, что будущее за новым продуктовым опытом на основе AI. У нас есть все нужные технологии, включая большие языковые модели…\n\nОбязанности:\n- Внедрять гибкие AI-решения. Заменить традиционные методы создания ботов на адаптивных LLM-агентов, которые лучше понимают контекст и формируют эффективные и естественные ответы\n- Работать над персонализированными ответами. Использовать данные о клиенте и контексте его запроса, чтобы бот мог выдавать более точные и «человеческие» решения\n- Разрабатывать подходы к сегментации клиентов. Определять ключевые группы и подбирать для них оптимальные сценарии обслуживания, чтобы повышать удовлетворенность пользователей и экономическую эффективность\n\nТребования:\n- У вас есть опыт управления продуктами и продуктовыми командами\n- Есть опыт успешного запуска новых продуктов и развития существующих\n- Формировали и защищали продуктовую стратегию направления\n- Готовы разбираться в новых технологиях\n- Постоянно следите за трендами в индустрии и готовы применять новые решения\n- Разбираетесь в AI-технологиях или готовы быстро вникнуть в темы. На базовом уровне разбираетесь в RAG, асессорах, точности, полноте, Alignment и других нюансах", "date": "2026-07-02", "org": "tbank", "match_percent": 60, "match_fit": "Управленческое ядро совпадает: опыт управления продуктами и командами, успешный запуск новых продуктов с нуля, формирование и защита продуктовой стратегии на уровне топ-менеджмента — всё подтверждено (Госзапросы, конструктор ценообразования). Есть опыт постановки AI-функциональности на стороне продакта и работы с ML-командами, домен Т-Банк релевантен.", "match_gaps": "Существенный зазор по глубине AI/LLM: требуется понимание RAG, асессоров, alignment, а у кандидата ML/LLM-экспертиза только на бизнес-уровне (эталон «CPO R&D ML» ≈60). Откликаться следует от управленческого ядра, честно отметив AI-зазор."}, {"title": "ML-продакт-лид в команду обслуживания клиентов", "url": "https://www.tbank.ru/career/it/vacancy/moscow/leadmlpm-customerservice/a55fd5ee-c069-406a-a0fc-463a8d1ffcf3/", "description": "Описание:\nКоманда строит платформу клиентского обслуживания, которая превращает поддержку в конкурентное преимущество бизнеса. Наша задача — не просто отвечать на обращения, а системно решать проблемы клиентов, повышать их удовлетворенность, LTV и удержание.…\n\nОбязанности:\n- Формировать и развивать стратегии ML-продуктов в клиентском обслуживании — от видения до роадмапов по всем командам\n- Управлять несколькими продуктовыми командами: продакт-менеджерами, ML, аналитиками, разработчиками. Выстраивать приоритеты, координировать и синхронизировать их работу\n- Ставить задачи на разработку ML-решений: объединять коммуникации в единую проблему клиента, определять статус ее решения, развивать сервис хранения и использования клиентского контекста, строить систему управления воронкой обслуживания и персонализации\n- Формулировать продуктовые и ML-гипотезы с определением метрик успеха из бизнес-задач: CSAT, снижения числа обращений, снижения стоимости обслуживания\n- Контролировать качество продуктов и их влияние на метрики\n- Запускать и масштабировать решения — от прототипа до продакшена\n- Работать с командой обслуживания, бизнесом, сегментами и CX, защищать решения и управлять ожиданиями стейкхолдеров\n- Фокусироваться на улучшении клиентского опыта через персонализацию и снижение усилий клиента\n\nТребования:\n- У вас есть опыт управления группой команд с ML/AI-составляющей в продуктах от 6 лет\n- Запускали A/B-тесты и интерпретировали их результаты\n- Умеете трансформировать бизнес-задачи в ML-решения и влиять на результат\n- Формулируете продуктовые гипотезы и проверяете их с опорой на данные\n- Понимаете теорию ML и данных: знаете общую продуктовую базу, алгоритмы машинного обучения и умеете применять их для решения бизнес-задач\n- Разбираетесь в метриках качества моделей: точности, полноте, F1-score, latency\n- Умеете работать с данными — от подготовки и очистки до фиче-инжиниринга\n- Приоритизируете задачи, можете фокусироваться на главном и управлять роадмапами", "date": "2026-07-02", "org": "tbank", "match_percent": 58, "match_fit": "Сильное совпадение управленческого ядра: управление несколькими продуктовыми командами, разработка и защита продуктовой стратегии, запуск и масштабирование от прототипа до прома, работа со стейкхолдерами, A/B и продуктовые гипотезы. Есть опыт AI-функциональности на стороне продакта.", "match_gaps": "Требование «управление группой команд с ML-составляющей от 6 лет» и понимание теории ML, алгоритмов, метрик качества моделей (F1, latency), фиче-инжиниринга — существенный зазор (раздел 1b): кандидат не владеет ML-архитектурами и не управлял портфелем ML-продуктов. Откликаться от управленческого ядра, как в ориентире «CPO/Lead PM R&D ML»."}, {"title": "Руководитель направления аналитики метрик качества — Quality & Acceptance Metrics", "url": "https://www.tbank.ru/career/it/vacancy/moscow/head-of-quality-and-acceptance-metrics-analytics/a8aeaed3-5754-45fb-9d8f-0a9809970fb4/", "description": "Описание:\nОдна из самых сложных задач в AI — понять, какую метрику нужно оптимизировать до обучения моделей. Мы ищем руководителя, который поможет с этой задачей и будет управлять командой аналитики платформы обслуживания.…\n\nОбязанности:\n- Выстроить независимое направление метрик качества, которое дает платформе обслуживания единую и объективную систему оценки качества обслуживания\n- Построить общую метрику качества платформы и методологию ее расчета, чтобы по ней можно было принимать управленческие решения\n- Принимать, проверять, валидировать и аудировать подходы к оценке качества, которые строят команды в своих направлениях\n- Обеспечивать сопоставимость метрик качества между командами, каналами, сценариями и направлениями платформы\n- Формировать единые правила оценки качества для всей платформы и организовать оценку AI-решений от качества до масштабирования\n- Разработать методологию сбора клиентской оценки, определить правила интерпретации и понять, как использовать ее в общей метрике качества обслуживания\n- Определить, в каких случаях клиентская оценка отражает качество сервиса, а в каких — влияние бизнеса, процессов, интерфейсов, робота, правил или внешних ограничений\n- Построить систему разложения причин качества, чтобы был понятен источник проблемы\n- Показывать влияние качества на повторные обращения, удержание, стоимость обслуживания, потери и долгосрочную ценность клиента\n- Проверять, как AI-решения влияют на качество сервиса, клиентский опыт и бизнес-результат\n- Следить, чтобы качество не снижалось ради скорости или автоматизации\n- Быть независимым ориентиром по качеству для всей платформы и влиять на решения команд без прямого управления\n- Делать так, чтобы качество становилось управляемой величиной, а не предметом локальных трактовок разных команд\n\nТребования:\n- У вас есть опыт лидерства в аналитике, исследованиях или смежных направлениях, где нужно строить процессы и метрики в условиях неопределенности\n- Способны находить ценность там, где нет готовой методологии, четких границ ответственности и правильного ответа\n- Умеете выстраивать подходы с нуля, проверять их на практике и доводить до работающей системы\n- Знаете, как разложить сложную проблему на составные части и выделить ее глубинные причины\n- Умеете строить метрики, которые можно использовать для принятия решений, знаете, как связывать их с клиентским опытом и экономическим результатом\n- Знаете SQL на продвинутом уровне\n- Отлично знаете математическую статистику, теорию вероятностей и методы оценки эффекта изменений, умеете проверять гипотезы и проводить А/B-тестирования\n- Умеете оценивать влияние изменений и отделять реальные эффекты от случайных колебаний\n- Знаете, как влиять на смежные команды и руководителей, и умеете это делать без опоры на большую команду или прямое управление\n- Будет плюсом опыт внедрения решений с использованием AI или автоматизации", "date": "2026-07-02", "org": "tbank", "match_percent": 56, "match_fit": "Сильные стороны кандидата ложатся на ядро: построение системы метрик и методологии с нуля в условиях неопределённости, SQL, матстатистика, A/B-тесты, связка метрик с экономическим эффектом и умение влиять на смежные команды. Опыт вывода продуктов из MVP и работы со стейкхолдерами подкрепляет требование строить процессы там, где нет готового ответа.", "match_gaps": "Ядро роли — лидерство именно в аналитике/исследованиях и методология метрик качества сервиса, тогда как кандидат — продуктовый руководитель, а не analytics lead. Домен клиентского обслуживания новый, а формулировка «влиять без прямого управления» смещает роль в сторону экспертного, а не управленческого вклада."}, {"title": "Руководитель продуктовой аналитики платформ Human Capital", "url": "https://www.tbank.ru/career/it/vacancy/moscow/Head of Product Analytics for Human Capital Platforms/87eb1346-2831-4c03-9ac9-6c6f74b98b8f/", "description": "(не удалось получить описание)", "date": "2026-07-02", "org": "tbank", "match_percent": 54, "match_fit": "По названию роль — руководитель продуктовой аналитики платформ, что ложится на сильные стороны кандидата: управление командами, data-driven культура (SQL, Python, статистика, A/B), дерево метрик и платформенный опыт. Управленческий уровень и работа с платформами ему близки.", "match_gaps": "Описание вакансии получить не удалось — оценка предварительная и требует уточнения. Домен Human Capital (HR-tech) для кандидата новый, а ядро роли смещено в аналитику, а не в монетизацию/продукт, где он сильнее всего."}, {"title": "Руководитель аналитики в направление развития процессов обслуживания", "url": "https://www.tbank.ru/career/it/vacancy/moscow/head-analytics-in-the-direction-of-service-process-development/988892d1-1e20-401c-a475-7da95fbb1501/", "description": "Описание:\nНаша команда исследует, создает и непрерывно развивает процессы клиентского обслуживания. Мы ищем руководителя, который будет помогать продуктовым командам улучшать процессы обслуживания.…\n\nОбязанности:\n- Выстраивать общение со стейкхолдерами и самостоятельно погружаться в бизнес-домен\n- Выстраивать процессы по информированию и вовлечению команды в бизнес-домен\n- Первично прорабатывать и оценивать ресурсы при запуске инициатив и больших проектов\n- Адаптировать и дополнять стратегии направления под свою команду, транслировать риски принятой стратегии относительно контекста своей команды\n- Участвовать вместе с бизнесом в построении процесса оценки реализации проектов по ресурсам и срокам\n- Формировать стратегию по поддержанию мотивационного настроя, уменьшению оттока сотрудников на уровне своей команды и вышестоящего подразделения\n- Ставить и контролировать достижение стратегических целей командой\n- Участвовать в найме, адаптировать новых сотрудников, работать с их эффективностью и развитием\n- Выстраивать процесс поставки ценностей своей командой, контролировать сроки, прозрачность и удовлетворенность для стейкхолдеров\n- Продвигать data-driven-культуру, чтобы на уровне команды решения принимались на данных\n\nТребования:\n- У вас есть опыт реализации изменений в бизнесе и управления ими в условиях высокой доли неопределенности\n- Знаете SQL на продвинутом уровне\n- Отлично разбираетесь в математической статистике и теории вероятностей, умеете проводить А/B-тесты, знаете статистические методы и критерии\n- Умеете разрабатывать стратегию выбора целевых метрик бизнеса или продукта, декомпозировать и строить дерево метрик\n- Знаете и применяете в работе инструменты управления: делегирование, целеполагание, мотивацию, встречи one-to-one и так далее\n- Совершенствуете инструменты управления, которые используете", "date": "2026-07-02", "org": "tbank", "match_percent": 48, "match_fit": "Наиболее совпадающая из аналитических ролей по управленческому ядру: реализация изменений в бизнесе в условиях неопределённости, инструменты управления (делегирование, целеполагание, мотивация, 1-2-1), найм и развитие, работа со стейкхолдерами, продвижение data-driven-культуры, построение деревьев метрик. Домен процессов клиентского обслуживания перекликается с опытом оптимизации бизнес-процессов и интересом к сервисным отраслям.", "match_gaps": "Требуется продвинутый SQL и экспертная матстатистика/A/B на уровне hands-on руководителя аналитики, тогда как у кандидата это прикладной, а не экспертно-аналитический уровень; он продуктовый лид, а не руководитель аналитической функции. Оценка эффектов и уровень позиции ниже целевых директорских ролей."}, {"title": "Руководитель аналитики X-Sell-сервисов Шопинга", "url": "https://www.tbank.ru/career/it/vacancy/moscow/head-of-analytics-at-x-sell-shopping-services/e7a5df09-013c-4ec5-bbf3-927919e4f6c1/", "description": "Описание:\nМы команда X-Sell-аналитики Шопинга — экосистемы сервисов для покупок и развлечений, которые помогают пользователям покупать товары и услуги, бронировать авиабилеты и отели, заказывать доставку продуктов и многое другое.…\n\nОбязанности:\n- Формировать и реализовывать аналитическую стратегию X-Sell, развивать направление как управляемый growth-канал\n- Управлять лидами и командами аналитиков: структурой, развитием, наймом, приоритизацией и качеством решений\n- Развивать систему метрик и мониторинга: управлять воронками, искать точки роста в конверсии, выручке и LTV\n- Оценивать эффективность X-Sell: инкрементальность, ROI и долгосрочный эффект кампаний\n- Развивать A/B-тестирование и подходы к принятию решений на основе данных\n- Внедрять автоматизацию, AI и ML для ускорения запусков и масштабирования решений: LLM, персонализацию, триггеры\n- Кросс-функционально работать с маркетингом, продуктом и ML-командами, транслировать, как аналитика влияет на бизнес-результат\n\nТребования:\n- У вас есть опыт в роли руководителя или лидера аналитики, управляли лидами и командами из 10+ человек\n- Есть опыт построения и масштабирования аналитической функции: процессов, стандартов, ролей, развития команды\n- Выстраивали работу со стейкхолдерами: работали с маркетингом, продуктом, разработкой и топ-менеджментом\n- Отлично понимаете продуктовые и маркетинговые метрики: LTV, ROMI, юнит-экономика. Умеете связывать аналитику с бизнес-результатом\n- Глубоко понимаете A/B-тестирование и causal-подходы на уровне дизайна и интерпретации:uplift, инкрементальность\n- Понимаете качественную SQL- или Python-аналитику — способны оценивать корректность решений\n- Умеете мыслить с точки зрения продукта и бизнеса, превращать аналитику в решения, приоритеты и деньги\n- Умеете объяснять сложное простым языком и управлять ожиданиями\n- Будет плюсом опыт в маркетинговой, CRM или X-Sell-аналитике, работали с ML или AI: персонализацией, рекомендациями, uplift-моделями", "date": "2026-07-02", "org": "tbank", "match_percent": 46, "match_fit": "Совпадает масштаб управления (портфель до 11 команд, найм и развитие), юнит-экономика и монетизация, кросс-продажи (подбор продуктов по ценовой эластичности), рост выручки и LTV, работа со стейкхолдерами и превращение аналитики в деньги. Growth-канал и точки роста в конверсии/выручке близки опыту.", "match_gaps": "Ядро — построение и масштабирование именно аналитической функции с causal/uplift/инкрементальностью и ROMI, а также маркетинговая/CRM/X-Sell-аналитика — прямого опыта нет. Домен шопинга/e-commerce для кандидата новый (раздел 5), classic CRM не заявлен; кандидат — продуктовый, а не аналитический руководитель."}, {"title": "Лид продуктовой аналитики в команду B2B Кредиты", "url": "https://www.tbank.ru/career/it/vacancy/moscow/teamlead-produktovoj-analitiki/279c1ea4-a276-4bae-a23b-88498edd1e22/", "description": "Описание:\nМы развиваем платформу взыскания для кредитных продуктов Т-Бизнеса и помогаем управлять клиентскими обязательствами по кредитам.…\n\nОбязанности:\n- Развивать команду аналитиков: участвовать в найме, адаптации, развитии сотрудников и формировании сильной аналитической культуры\n- Выстраивать взаимодействие со стейкхолдерами, погружаться в бизнес-домен и помогать команде понимать продуктовый контекст\n- Участвовать в запуске новых инициатив и крупных проектов: оценивать ресурсы, сроки и потенциальный эффект\n- Формировать и развивать аналитическую стратегию направления вместе с продуктом, подсвечивать риски и точки роста\n- Выстраивать процессы поставки аналитических решений, обеспечивать прозрачность работы команды и выполнение стратегических целей\n- Продвигать data-driven подход и помогать продуктовым командам принимать решения на основе данных\n\nТребования:\n- У вас есть уверенные знания SQL и опыт работы с большими объёмами данных\n- Хорошо разбираетесь в математической статистике, теории вероятностей и A/B-тестировании\n- У вас есть опыт управления командой: постановка целей, делегирование задач, развитие сотрудников и регулярная обратная связь\n- Умеете выстраивать эффективные процессы внутри команды и улучшать существующие подходы к управлению\n- Есть опыт запуска изменений и достижения результата в условиях неопределённости и меняющихся вводных\n- Умеете определять ключевые метрики бизнеса или продукта, строить дерево метрик и использовать его для принятия решений", "date": "2026-07-02", "org": "tbank", "match_percent": 45, "match_fit": "Прямое доменное совпадение: у кандидата есть опыт оптимизации процессов взыскания и B2B-кредитного контекста в Сбере. Сильны SQL, матстатистика, A/B, дерево метрик, запуск изменений в неопределённости и управление командой.", "match_gaps": "Ядро роли — лид именно аналитической команды (найм, развитие аналитиков, поставка аналитических решений), а не продуктовое руководство. Кандидат управлял продуктовыми командами как продакт-лид, а не аналитической функцией; требуемая инструментальная аналитическая глубина частично выходит за его профиль."}, {"title": "Руководитель направления аналитики", "url": "https://www.tbank.ru/career/it/vacancy/moscow/rukovoditel-napravleniya-analitiki/133dc822-d103-4251-9ae4-2c7bbbec0b83/", "description": "Описание:\nAI‑центр — это команда из 1200+ специалистов, создающих технологии и продукты на основе AI и внедряющих их во все направления Т‑Банка. Наша цель — делать решения качественнее, безопаснее и удобнее для миллионов пользователей.…\n\nОбязанности:\n- Руководить направлением аналитики численностью около 50 человек: управлять лидами и командами, формировать структуру, развивать сотрудников, участвовать в найме, определять приоритеты и контролировать качество решений\n- Выстраивать операционную модель работы функции: определять правила приоритизации, распределять ресурсы, задавать стандарты качества\n- Строить взаимодействие со стейкхолдерами и погружаться в бизнес-домен\n- Организовывать процессы информирования и вовлечения команды в бизнес-контекст\n- Проводить первичную оценку инициатив и крупных проектов: определять объем работ и потребность в ресурсах\n- Адаптировать стратегию направления под задачи команды, обозначать риски её реализации с учётом контекста\n- Участвовать совместно с бизнесом в оценке проектов по срокам и ресурсам\n- Ставить стратегические цели команде, контролировать их выполнение и достижение результатов\n- Выстраивать процесс поставки ценности командой: контролировать сроки, прозрачность работы и удовлетворённость стейкхолдеров\n- Развивать культуру принятия решений на основе данных в продуктовых командах\n- Работать с аналитическими и управленческими инструментами для анализа данных, визуализации, планирования и контроля процессов\n\nТребования:\n- У вас есть опыт работы в продуктовой аналитике от 6 лет, из них не менее 3 лет в роли Head of Analytics с командами от 30 человек\n- У вас есть опыт построения и развития аналитики в сложных продуктах или платформах\n- У вас есть опыт внедрения и развития продуктов с применением технологий искусственного интеллекта\n- Знаете продуктовые метрики, A/B‑тестирование, экспериментальные, причинно-следственные и доказательные подходы к принятию решений\n- Умеете разрабатывать аналитическую стратегию и масштабировать ее на крупные команды\n- Умеете работать с SQL и Python, понимаете подходы анализа данных, анализа данных с элементами машинного обучения и построения моделей\n- Умеете развивать руководителей и усиливать команды через наставничество и делегирование\n- Понимаете принципы построения процессов с нуля и принятия решений в условиях неопределённости\n- Умеете сочетать стратегическое видение с операционным управлением", "date": "2026-07-02", "org": "tbank", "match_percent": 45, "match_fit": "Управленческий масштаб совпадает (портфель до 11 команд, 34 человека напрямую, найм и развитие руководителей), сильны стратегия, работа в неопределённости, построение процессов с нуля, data-driven культура, AI-продукты на бизнес-уровне и SQL/Python.", "match_gaps": "Жёсткий зазор по ядру: требуется опыт в продуктовой аналитике от 6 лет, из них 3+ года именно в роли Head of Analytics с командами 30+. Кандидат — Head of Product, а не Head of Analytics; он не возглавлял аналитическую функцию, что является центральным требованием вакансии."}, {"title": "Лид аналитики в направление этического комплаенса", "url": "https://www.tbank.ru/career/it/vacancy/moscow/leading-analytics-in-the-area-of-ethical-compliance/470ff560-3ea1-48c2-b85b-987c4c814dd7/", "description": "Описание:\nМы команда этического и антикоррупционного комплаенса. Работаем на стыке рисков, аналитики, продукта и ИТ: помогаем бизнесу принимать взвешенные решения, снижать системные риски и выстраивать устойчивые процессы.…\n\nОбязанности:\n- Руководить командой аналитиков: развивать, формировать стандарты, следить за качеством\n- Формировать аналитическую базу — от гипотез и моделей до управленческих выводов\n- Делать аналитику инструментом принятия решений, а не витриной отчетов\n- Обеспечивать расчет и интерпретацию рисков, в том числе в деньгах\n- Помогать продукту и бизнесу проверять гипотезы и решения\n- Интегрировать аналитику в продукт: СУР, автоматизацию, AI-инициативы\n- Интегрировать команду в аналитическое комьюнити компании\n\nТребования:\n- У вас есть опыт управления аналитиками или аналитической функцией\n- Есть сильный аналитический бэкграунд в дата-, риск- или бизнес-аналитике\n- Умеете формулировать сложные выводы простым языком для бизнеса и топ-менеджмента\n- Умеете выстраивать стандарты, процессы и развивать сотрудников\n- Критически мыслите и готовы спорить ради качества решений\n- Умеете держать баланс между глубиной, скоростью и бизнес-ценностью\n- Не боитесь брать ответственность и готовы формировать направление с нуля\n- Видите аналитику как профессию и систему, а не набор задач\n- Хотите стать лидером аналитического опыта\n- Будет плюсом опыт работы с продуктом, ИТ и кросс-функциональными командами", "date": "2026-07-02", "org": "tbank", "match_percent": 44, "match_fit": "Совпадает создание направления с нуля (сильный мотиватор), управление командами, донесение сложных выводов до топ-менеджмента, опыт регуляторики/комплаенса-смежных доменов (Госзапросы, антифрод), интеграция аналитики/AI в продукт. Оценка рисков в деньгах перекликается с расчётом эффектов и unit-экономикой.", "match_gaps": "Ядро — руководство именно аналитической функцией и сильный дата-/риск-аналитический бэкграунд, тогда как кандидат продуктовый руководитель; экспертной риск-/дата-аналитики как профессии в опыте нет. Комплаенс как домен — новый."}, {"title": "Руководитель продуктовой аналитики в Автокредитование", "url": "https://www.tbank.ru/career/it/vacancy/moscow/head-of-product-analytics-at-auto-loans/4499f18d-c61f-4cda-a89a-6f0404283948/", "description": "Описание:\nТ-Банк — один из лидеров рынка автокредитования. После слияния с Росбанком в 2025 году мы многократно увеличили свой потенциал: масштаб данных, партнерств и бизнес-возможностей. Теперь мы создаем не просто продукт, а новый рынок.…\n\nОбязанности:\n- Нести ответственность за продуктовую аналитику автокредитования\n- Проводить аналитические исследования и проверять гипотезы под ключ — от идеи до бизнес-эффекта\n- Развивать эксперименты, A/B-тесты и data-driven-подход к принятию решений\n- Управлять и развивать домены данных: качество, полноту, доступность, доверие\n- Развивать discovery-подход в команде\n- Формировать и реализовывать стратегию развития аналитической функции\n- Брейнштормить идеи вместе с продактами и запускать их в продакшен\n- Формировать стандарты рынка в автокредитовании и автоэкосистемах\n- Общаться с другими продуктовыми командами внутри экосистемы\n- Обмениваться лучшими практиками, масштабировать успешные подходы, привносить новые идеи в команду\n\nТребования:\n- У вас есть опыт управления аналитической командой от 3 лет, в том числе командой из 15+ человек\n- Умеете выбирать и формировать целевые метрики продукта и бизнеса\n- Умеете декомпозировать и строить дерево метрик\n- Отлично знаете статистику, есть опыт проведения A/B-экспериментов\n- Понимаете основы ML и как применять модели в продукте\n- Умеете превращать идеи в проверенные гипотезы и масштабируемые решения\n- Умеете договариваться, способны общаться с бизнесом, рисками и финансами на одном языке\n- Продуктовое мыслите, держите фокус на результате\n- Умеете развивать людей и команды\n- Готовы быть полноценным партнером для продакт-менеджеров, брать ответственность и влиять на стратегию", "date": "2026-07-02", "org": "tbank", "match_percent": 43, "match_fit": "Отличный банковский домен, управление командой 15+ человек (у кандидата 34 в прямом подчинении), построение целевых метрик и деревьев метрик, discovery, партнёрство с продактами, общение с бизнесом/рисками/финансами. Формирование стратегии функции и масштабирование практик — в опыте.", "match_gaps": "Ядро — ответственность за продуктовую АНАЛИТИКУ и управление доменами данных с экспертной статистикой, а кандидат — продуктовый лид, а не руководитель аналитической функции. Автокредитование как конкретный домен новое; роль позиционирует аналитика как партнёра для отдельных продакт-менеджеров."}, {"title": "Лид продуктовой аналитики в команду налично-денежного обращения", "url": "https://www.tbank.ru/career/it/vacancy/moscow/analytics-team-lead-for-cash-management-team/d1adb3bd-26ad-42b2-be2d-fd7deb7553df/", "description": "Описание:\nКоманда НДО управляет сетью из более чем 11 тысяч банкоматов по всей России. Мы отвечаем за доступность наличных, удобство интерфейсов, жизненный цикл устройств и инновационные сервисы: обмен валюты в банкоматах, доставку наличных, хранение ценностей и инвестиционное золото.…\n\nОбязанности:\n- Продумывать и внедрять продуктовые метрики: собирать, анализировать, визуализировать и интерпретировать данные\n- Формулировать гипотезы и проверять их с помощью A/B-тестов: настраивать эксперименты, собирать данные, проводить статистическую проверку, готовить выводы для продукта и руководства\n- Давать рекомендации по оптимизации текущих процессов и искать точки роста\n- Плотно общаться с бизнесом и погружаться в процессы: участвовать в планировании новых функций, изучать потребности клиентов\n- Анализировать влияние изменений на уровне продукта, метрик клиента и компании\n\nТребования:\n- У вас есть опыт работы продуктовым аналитиком от 3 лет\n- Работали с инструментами визуализации — Proteus, Tableau или Power BI\n- Уверенно владеете SQL: сложные запросы, оконные функции, работа с большими объемами данных и оптимизация\n- Владеете Python, знаете библиотеки для работы с данными — pandas, matplotlib, numpy и другие\n- Знаете Excel на продвинутом уровне: сводные таблицы, формулы и анализ данных\n- Разбираетесь в математической статистике и теории вероятностей, проводили A/B-тесты, использовали в работе статистические методы и критерии\n- Понимаете ключевые продуктовые и клиентские метрики\n- Умеете самостоятельно доводить до конца поставленные задачи\n- Структурно и системно мыслите, способны видеть, как решения влияют на бизнес", "date": "2026-07-02", "org": "tbank", "match_percent": 42, "match_fit": "Банковский домен полностью в профиле кандидата, а инструментарий совпадает: SQL, Python, матстатистика, A/B-тесты, продуктовые метрики и умение связывать решения с бизнесом. Тематика банкоматов и клиентских сервисов близка его опыту.", "match_gaps": "Это, по сути, IC-роль продуктового аналитика (требование — аналитик от 3 лет, hands-on Tableau/Proteus/pandas, без управл - Готовы самостоятельно выстраивать работу: ставить цели, планировать действия и доводить проекты до завершения\n- Будет плюсом опыт работы с аналитикой ML-продуктов", "date": "2026-07-02", "org": "tbank", "match_percent": 42, "match_fit": "Управление тремя командами и построение целевой структуры совпадает с портфельным опытом кандидата, а построение функции оценки экономического эффекта от ML близко к его сильной стороне — монетизация и экономика продукта. Есть A/B-тесты, статистика, SQL и организация работы с ML-командами.", "match_gaps": "Ядро — аналитическое руководство и ML-аналитика (evaluations, метрики качества моделей, data discovery), где у кандидата нет глубокой ML-экспертизы, и он не аналитик по роли. Требование опыта именно в аналитике частично не закрыто продуктовым бэкграундом."}, {"title": "Руководитель продуктовой аналитики — Compliance", "url": "https://www.tbank.ru/career/it/vacancy/moscow/rukovoditel-produktovoj-analitiki-compliance/5562ff30-87d3-4213-b69f-5a6d17d301f1/", "description": "Описание:\nCompliance — корпоративная функция, формирующая культуру и практику работы с рисками в компании.…\n\nОбязанности:\n- Руководить командой аналитики комплаенса: участвовать в найме и развивать сотрудников\n- Формировать и реализовывать стратегическое видение аналитики в комплаенсе\n- Выстраивать процессы аналитики для нескольких команд с разными доменами\n- Систематизировать проведение исследований и доставку аналитических решений до внутренних заказчиков\n- Развивать культуру принятия решений на основе данных\n- Повышать качество комплаенс‑продуктов с помощью аналитики\n- Поддерживать топ‑менеджмент в определении контекста и принятии решений на основе данных\n\nТребования:\n- У вас есть опыт управления аналитической командой 15+ человек от 3 лет\n- У вас есть опыт работы с рисками: кредитными, фрод‑рисками, комплаенсом или информационной безопасностью\n- Имеете опыт построения аналитической инфраструктуры,  понимаете принципы работы хранилищ данных\n-
