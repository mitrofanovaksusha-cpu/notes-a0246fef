 использованием SSETL и Airflow\n- Умеете выбирать целевые метрики бизнеса или продукта, проводить декомпозицию и строить дерево метрик\n- Глубоко разбираетесь в математической статистике и теории вероятностей, А/B-тестах, разных статистических методах и критериях\n- Знаете альтернативные методы проверки гипотез, включая ML-подходы, когортный анализ, синтетический контроль и другие\n- Есть опыт визуализации данных и построения дашбордов в BI-инструментах, включая Tableau, Python и Proteus", "date": "2026-07-02", "org": "tbank", "match_percent": 22, "match_fit": "Есть управление командой и понимание продуктовых исследований, приоритизации гипотез и работы с ML-инженерами. Техническая база (Python, SQL, OpenShift) присутствует на уровне навыков.", "match_gaps": "Вакансия сугубо техническая: проектирование пайплайнов данных (SSETL, Airflow), продвинутый Python (pandas, NumPy, sklearn, SciPy, prophet), CI/CD, BI-дашборды и глубокая матстатистика. Это hands-on data/ML-аналитик, у кандидата такого практического опыта нет."}, {"title": "Ведущий аналитик качества в команду Вселенной AI-ассистентов", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lead-quality-analyst-for-the-ai-assistants-team/2d6af51e-caf6-4333-ac9d-b70cbe8842ad/", "description": "Описание:\nМы работаем над новыми пользовательскими продуктами — AI-ассистентами на базе LLM. Пять ассистентов помогают клиентам в разных сферах жизни: финансах, инвестициях, шопинге, путешествиях. Еще есть Джуниор — детский ассистент.…\n\nОбязанности:\n- Создавать и прокачивать систему оценки AI-ассистентов — от создания корзинок с запросами и разработки метрик до анализа результатов и добавления фич в продукт\n- Организовывать разметку качества руками краудсорсеров и строить автоматизированные пайплайны с LLM-as-a-Judge\n- Искать инсайты в пользовательских диалогах, придумывать эксперименты и предлагать, как еще улучшить качество наших моделей\n- Собирать данные для алаймента собственной языковой модели Т-Банка под задачи ассистентов\n\nТребования:\n- У вас есть опыт на границе продуктовой аналитики и Data Science: чат-боты, рекламные аукционы, поисковые системы, генеративные технологии\n- Владеете SQL и Python на уверенном уровне, особенно Pandas\n- Умеете писать хороший аналитический продакшен-код\n- Хотите работать с текстовыми данными в LLM-продуктах", "date": "2026-07-02", "org": "tbank", "match_percent": 20, "match_fit": "Есть интерес к AI/LLM-направлению и опыт запуска продуктов на базе ML (страховой продукт, точность 87%). Понимает продуктовые метрики и качество моделей на концептуальном уровне.", "match_gaps": "Это индивидуальная роль на границе продуктовой аналитики и Data Science с production-кодом, уверенным Python/Pandas и SQL, работой с текстовыми данными в LLM. Кандидат — руководитель, а не hands-on аналитик, и опыта с LLM-продуктами и разметкой качества нет."}, {"title": "Старший менеджер по локализации (AI и автоматизация)", "url": "https://www.tbank.ru/career/it/vacancy/moscow/starshij-menedzher-po-lokalizacii-ai-i-avtomatizaciya/d9bb975f-271e-4b88-85ed-eebfa3569d35/", "description": "Описание:\nМы развиваем направление локализации в Т‑Банке. Локализуем мобильный банк, ATM, веб‑интерфейсы и продуктовые коммуникации, чтобы иностранным клиентам было удобно и понятно пользоваться нашими сервисами.…\n\nОбязанности:\n- Развивать контур LLM в локализации: подбирать и тестировать модели для языковых пар, оценивать качество по метрикам, разрабатывать и улучшать промпты, выстраивать пайплайны машинного перевода и постредактирования\n- Развивать систему контроля качества перевода на основе автоматических и экспертных метрик, анализировать ошибки и повышать точность оценки\n- Писать и поддерживать скрипты для обработки файлов локализации, интеграции с API и системами контроля версий\n- Разрабатывать и сопровождать пайплайны локализации: от подготовки файлов до интеграции с CAT‑ и TMS‑системами\n- Формулировать технические требования к развитию внутренней TMS и сопровождать задачи от проработки до внедрения\n- Автоматизировать ручные процессы команды и сокращать время вывода изменений\n- Взаимодействовать с лингвистами, менеджерами и продуктовыми командами для развития масштабируемых процессов локализации\n- Документировать процессы, решения и результаты на основе данных и метрик\n\nТребования:\n- У вас есть опыт работы с локализацией и понимание специфики локализационных процессов\n- У вас есть практический опыт работы с большими языковыми моделями: настройка промптов, тестирование моделей, оценка качества\n- Понимаете логику локализационного пайплайна и принципы работы CAT‑ и TMS‑систем\n- Знаете метрики качества машинного перевода и умеете интерпретировать их результаты\n- Умеете писать скрипты на Python или другом языке программирования: обработка JSON, XML, XLIFF, PO, работа с регулярными выражениями, интеграция с API и Git\n- Понимаете ограничения информационной безопасности при работе с большими языковыми моделями\n- Умеете выстраивать взаимодействие с разными ролями и учитывать потребности команды при внедрении технических решений", "date": "2026-07-02", "org": "tbank", "match_percent": 18, "match_fit": "Кандидат имеет опыт развития AI/LLM-направления и автоматизации процессов в Сбере, что частично пересекается с задачей автоматизации локализации через LLM. Есть навыки Python и построения масштабируемых процессов.", "match_gaps": "Полностью отсутствует профильный опыт локализации, работы с CAT/TMS-системами, метриками качества машинного перевода и форматами XLIFF/PO. Роль узкоспециализированная и операционно-инженерная, а не продуктово-руководящая; английский B1 может быть недостаточным."}, {"title": "Руководитель развития систем защиты", "url": "https://www.tbank.ru/career/it/vacancy/moscow/lead-securityengineer-infrastructure/caf80374-2773-4d85-b796-34e07999e8bb/", "description": "Описание:\nБезопасность — важная часть нашего бизнеса. Мы создаем продукты, следуя принципу Security by Design, и защищаем не только себя, но и партн // Файлы вакансий и кэш анализа теперь хранят блоки "функционал"/
// "требования" ЦЕЛИКОМ (без обрезки) — она нужна была только для показа
// на странице, а для LLM-анализа и самого файла обрезанный текст мог
// заодно спрятать важные детали. Поэтому обрезка до короткой версии
// теперь происходит здесь, на отрисовке, а не в python-скриптах сбора.
const DESC_MAX_ITEMS = 5;
const DESC_MAX_CHARS = 300;

function truncateBlockBody(body) {
  const lines = body.split('\n');
  const isBulletList = lines.length > 0 && lines.every(line => line.startsWith('- ') || line === '…');
  if (isBulletList) {
    if (lines.length > DESC_MAX_ITEMS) {
      return lines.slice(0, DESC_MAX_ITEMS).concat(['…']).join('\n');
    }
    return body;
  }
  if (body.length > DESC_MAX_CHARS) {
    return body.slice(0, DESC_MAX_CHARS).trimEnd() + '…';
  }
  return body;
}

function renderDescription(text) {
  if (!text) return '';
  return text.split(/\n\n+/).map(block => {
    const lines = block.split('\n');
    const first = lines[0] || '';
    if (first.endsWith(':') && lines.length > 1) {
      const title = first.slice(0, -1);
      const body = truncateBlockBody(lines.slice(1).join('\n'));
      return `<div class="desc-section"><div class="desc-section-title">${escapeHtml(title)}</div><div class="desc-section-body">${escapeHtml(body)}</div></div>`;
    }
    return `<div class="desc-section"><div class="desc-section-body">${escapeHtml(truncateBlockBody(block))}</div></div>`;
  }).join('');
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function matchBadge(v) {
  if (v.match_percent === null || v.match_percent === undefined) {
    return '<span class="match-badge pending">…</span>';
  }
  const p = v.match_percent;
  const cls = p >= 70 ? '' : (p >= 40 ? 'mid' : 'low');
  return `<span class="match-badge ${cls}">${p}%</span>`;
}

function matchDetails(v) {
  if (v.match_percent === null || v.match_percent === undefined) {
    return '<div class="match-pending-note">Процент соответствия и разбор по резюме будут рассчитаны в течение 4 часов.</div>';
  }
  return (
    `<div class="desc-section"><div class="desc-section-title">Чем подходит</div><div class="desc-section-body">${escapeHtml(v.match_fit || '')}</div></div>` +
    `<div class="desc-section"><div class="desc-section-title">Пробелы</div><div class="desc-section-body">${escapeHtml(v.match_gaps || '')}</div></div>`
  );
}

function computeStats(vacancies) {
  const stats = { total: vacancies.length, green: 0, mid: 0, low: 0 };
  vacancies.forEach(v => {
    if (v.match_percent === null || v.match_percent === undefined) return;
    const p = v.match_percent;
    if (p >= 70) stats.green++;
    else if (p >= 40) stats.mid++;
    else stats.low++;
  });
  return stats;
}

function renderSidebar(org) {
  const sidebar = document.getElementById('sidebar');
  if (!org) {
    sidebar.innerHTML = '';
    return;
  }
  const s = computeStats(org.vacancies);
  sidebar.innerHTML = `
    <div class="stat-panel">
      <div class="stat-row"><span class="stat-label">Всего</span><span class="stat-value">${s.total}</span></div>
      <div class="stat-row"><span class="stat-label"><span class="stat-dot green"></span></span><span class="stat-value">${s.green}</span></div>
      <div class="stat-row"><span class="stat-label"><span class="stat-dot mid"></span></span><span class="stat-value">${s.mid}</span></div>
      <div class="stat-row"><span class="stat-label"><span class="stat-dot low"></span></span><span class="stat-value">${s.low}</span></div>
    </div>
  `;
}

function renderTabs(activeSlug) {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  ORGS.forEach(org => {
    const btn = document.createElement('button');
    const empty = org.vacancies.length === 0;
    btn.className = 'tab' + (org.slug === activeSlug ? ' active' : '') + (empty ? ' tab-empty' : '');
    const badge = org.new_count > 0 ? ` <span class="badge">(${org.new_count})</span>` : '';
    btn.innerHTML = `${escapeHtml(org.label)}${badge}`;
    btn.onclick = () => showOrg(org.slug);
    tabs.appendChild(btn);
  });
  syncSidebarTop();
}

// Число рядов вкладок (а значит и высота шапки) зависит от ширины окна и
// длины названий компаний — не константа. Сайдбар (position: sticky)
// иначе прилипает поверх шапки на фиксированном отступе, который на
// каких-то ширинах экрана оказывается меньше реальной высоты шапки, и
// счётчики наезжают на названия компаний. Подгоняем отступ под реальный
// размер шапки на лету.
function syncSidebarTop() {
  const header = document.querySelector('header');
  const sidebar = document.getElementById('sidebar');
  if (header && sidebar) {
    sidebar.style.top = (header.offsetHeight + 20) + 'px';
  }
}
window.addEventListener('resize', syncSidebarTop);

function showOrg(slug) {
  renderTabs(slug);
  const org = ORGS.find(o => o.slug === slug);
  renderSidebar(org);
  const main = document.getElementById('main');
  main.innerHTML = '';
  if (!org || org.vacancies.length === 0) {
    main.innerHTML = '<div class="empty">Вакансий пока нет</div>';
    return;
  }
  org.vacancies.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    const header = document.createElement('div');
    header.className = 'card-header';
    header.innerHTML = `<span class="card-title-row">${matchBadge(v)}<span class="card-title">${escapeHtml(v.title)}</span></span><span class="card-date">${v.date}</span>`;
    header.onclick = () => card.classList.toggle('open');
    const body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML = `<a class="card-link" href="${escapeHtml(v.url)}" target="_blank" rel="noopener">${escapeHtml(v.url)}</a>` + matchDetails(v) + renderDescription(v.description);
    card.appendChild(header);
    card.appendChild(body);
    main.appendChild(card);
  });
}

if (ORGS.length > 0) {
  showOrg(ORGS[0].slug);
} else {
  document.getElementById('main').innerHTML = '<div class="empty">Пока нет данных — запустите monitor-скрипты</div>';
}
</script>
</body>
</html>
